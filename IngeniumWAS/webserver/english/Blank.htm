<script type="text/javascript">
function onLoad() {
	// in the normal situation, the topmostFrameSet is in the parent of our parent
	var myFrameset = parent.parent.document.all["topmostFrameSet"];

	// if we weren't in index.htm already, then the topmostFrameSet is in our parent
	if (myFrameset == null)	{
		myFrameset = parent.document.all["topmostFrameSet"];
	}

	if (myFrameset != null)	{
		// if menu is not displayed, toggle menu on
		if (myFrameset.cols == "0,*") {
			myFrameset.cols = "20%,*";
		}
	} 
	else {
		// navigate back to index.htm so we can see the menu
        // 23123 - added .. to path
		window.navigate("../english/index.htm");
	}
}
function onMenu(ctl) {
	// toggle menuserver frame off and on and show correct image
	myFrameset = parent.parent.window.document.all["topmostFrameSet"];
	if (myFrameset == null) {
	        myFrameset = parent.window.document.all["topmostFrameSet"];
    }

	if (myFrameset != null) {
		if (myFrameset.cols == "0,*") {
			myFrameset.cols = "20%,*";
			// 23123 - added .. to srcpath
			ctl.src = "../english/images/hidemenu.gif";
			ctl.alt = "Hide Menu";
        }
        else {
			myFrameset.cols = "0,*";
			// 23123 - added .. to src path
			ctl.src = "../english/images/showmenu.gif";
			ctl.alt = "Show Menu";
		}
	}
}
</script>
