<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1652-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy Id:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-REPL-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-REPL-SEQ-NUM" stype="Text" displayonly="yes">MIR-POL-REPL-SEQ-NUM</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-REPL-TYP-CD">Replacement Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-REPL-TYP-CD" id="MIR-POL-REPL-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-REPL-POL-ID">Replaced Policy Number:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-REPL-POL-ID" id="MIR-REPL-POL-ID" stype="Text" maxlength="20" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-REPL-CO-CLI-ID">Replaced Company Client Number:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-REPL-CO-CLI-ID" id="MIR-REPL-CO-CLI-ID" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-REPL-STAT-CD">Record Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-POL-REPL-STAT-CD" stype="Text" displayonly="yes">MIR-POL-REPL-STAT-CD</span>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-REPL-PRT-DT">Last Replacement Print Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-POL-REPL-PRT-DT" stype="Date" displayonly="yes">MIR-POL-REPL-PRT-DT</span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-REPL-OVRID-IND">Override Notification:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-POL-REPL-OVRID-IND" id="MIR-POL-REPL-OVRID-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
