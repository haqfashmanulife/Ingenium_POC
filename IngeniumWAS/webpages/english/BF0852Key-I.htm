        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-POL-PAYO-TYP-CD">Allocation Type:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-POL-PAYO-TYP-CD" id="MIR-DV-POL-PAYO-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CDI-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CDI-EFF-DT" id="MIR-CDI-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-SUPRES-ALLOC-NOTI-IND">Suppress Allocation Notification:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-SUPRES-ALLOC-NOTI-IND" id="MIR-SUPRES-ALLOC-NOTI-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel" />
                    <td class="celldatakey" />
                </tr>
            </table>
        </form>
