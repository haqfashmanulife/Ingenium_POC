<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1149-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-CIA-EFF-DT">Activity Effective Date:</label>
                <span id="MIR-CIA-EFF-DT" stype="Date" displayonly="yes">MIR-CIA-EFF-DT</span>
            </p>
            <p>
                <label for="MIR-POL-ID-BASE">Policy Id:</label>
                <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">Suffix:</label>
                <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
            </p>
            <table class="tabledisplay" genrows="0" keyfield="2">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-CFN-APROX-AMT-T[1]">Approximate Fund Value</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-FROM-FND-AMT-T[1]">From amount</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-FND-DESC-TXT-T[1]">Fund Description</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-TO-FND-AMT-T[1]">To amount</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-FIA-IN-ALLOC-PCT-T[1]">Percentage out</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-FIA-OUT-ALLOC-PCT-T[1]">Fund out</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <span id="MIR-DV-CFN-APROX-AMT-T[]" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-DV-CFN-APROX-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-FROM-FND-AMT-T[]" stype="Currency" elength="15" displayonly="yes">MIR-DV-FROM-FND-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-FND-DESC-TXT-T[]" stype="Text" displayonly="yes">MIR-DV-FND-DESC-TXT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-TO-FND-AMT-T[]" stype="Currency" elength="15" displayonly="yes">MIR-DV-TO-FND-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-FIA-IN-ALLOC-PCT-T[]" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-FIA-IN-ALLOC-PCT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-FIA-OUT-ALLOC-PCT-T[]" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-FIA-OUT-ALLOC-PCT-T[]</span>
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-SUPRES-CNFRM-IND">Confirmation:</label>
                <span id="MIR-SUPRES-CNFRM-IND" stype="Text" displayonly="yes">MIR-SUPRES-CNFRM-IND</span>
            </p>
            <p>
                <label for="MIR-DV-OWN-CLI-NM">Owner Name:</label>
                <span id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
