<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1032-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="splitBranch('MIR-BNK-BR-ID')">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="chkBnkAcctName();return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" value="" name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" jpnbranch="Branch" jpnsubbranch="SubBranch" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-BNK-NM">Bank Name:</label>
                    </td>
                    <td class="celldisplaykey" colspan="5">
                        <span id="MIR-BNK-NM" stype="Text" displayonly="yes">MIR-BNK-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-BNK-ID">Bank Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-ID" stype="Text" displayonly="yes">MIR-BNK-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="Branch">Branch Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="Branch" stype="Text" displayonly="yes">Branch</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="SubBranch">Sub Branch Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="SubBranch" stype="Text" displayonly="yes">SubBranch</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-BNK-ACCT-ID">Account Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-ACCT-ID" stype="Text" displayonly="yes">MIR-BNK-ACCT-ID</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-HLDR-NM">Accountholder Name:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-BNK-ACCT-HLDR-NM" id="MIR-BNK-ACCT-HLDR-NM" stype="Text" maxlength="50" mandatory="yes"
                               onkeypress="KanaKeyCheck()" 
                               onchange="onlyKatakana()" 
                               onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-TYP-CD">Account Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-BNK-ACCT-TYP-CD" id="MIR-BNK-ACCT-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-MICR-IND">Cheque from account is MICR-encoded:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-BNK-ACCT-MICR-IND" id="MIR-BNK-ACCT-MICR-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/JapaneseBranch.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
    <script src="../js/OnlyKana.js"></script>
</html>
