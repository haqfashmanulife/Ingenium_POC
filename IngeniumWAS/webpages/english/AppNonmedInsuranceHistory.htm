<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppNonmedInsuranceHistory</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoadCustom(); onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <div align="right">
                <table>
                    <tr>
                        <td class="celldisplaykeylabel">
                            <label for="MIR-DV-INSRD-CLI-NM">Applicant:</label>
                        </td>
                        <td class="celldisplaykey">
                            <span id="MIR-DV-INSRD-CLI-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-CLI-NM</span>
                        </td>
                    </tr>
                </table>
            </div>
            <br />
            <table class="tabledataentrynoborder">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-OINS-INFC-PEND-IND">Does the applicant have any existing or pending life insurance?</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="radio" name="MIR-OINS-INFC-PEND-IND" value="Y" stype="YesNoUnanswered" onclick="showHideLifeInforcePending(this);onYesNoUa('Yes')" onfocus="saveValue(); enterField(this)">Yes</input>
                        <input type="radio" name="MIR-OINS-INFC-PEND-IND" value="N" stype="YesNoUnanswered" onclick="showHideLifeInforcePending(this);onYesNoUa('No')" onfocus="saveValue(); enterField(this)">No</input>
                        <input type="radio" name="MIR-OINS-INFC-PEND-IND" value=" " stype="YesNoUnanswered" onclick="showHideLifeInforcePending(this);onYesNoUa('Ua')" onfocus="saveValue(); enterField(this)">Unanswered</input>
                    </td>
                </tr>
            </table>
            <span id="lifeInsuranceInforcePendingFields">
                <br />
                <table class="tabledataentry" genrows="6">
                    <tr>
                        <td class="celldataentryheading" colspan="9">Life Insurance Inforce / Pending Information</td>
                    </tr>
                    <tr>
                        <td class="celldataentryheading">
                            <label for="MIR-CLI-OINS-CO-NM-T[1]">Company Name</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-OINS-THIS-CO-IND-T[1]">This Company</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-OINS-INFC-PEND-CD-T[1]">Inforce / Pending</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-OINS-INS-TYP-CD-T[1]">Line of Business</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-OINS-BUS-PERS-CD-T[1]">Business / Personal</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-CLI-OINS-ISS-YR-T[1]">Issue Year</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-CLI-OINS-TOT-AMT-T[1]">Life Amount</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-CLI-OINS-ADB-AMT-T[1]">ADB Amount</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-OINS-WP-INFC-IND-T[1]">Waiver </label>
                        </td>
                    </tr>
                    <tr>
                        <td class="celllabeldataentry">
                            <input type="text" value=" " name="MIR-CLI-OINS-CO-NM-T[]" id="MIR-CLI-OINS-CO-NM-T[]" stype="Text" maxlength="15" onfocus="enterField(this)" size="15" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-OINS-THIS-CO-IND-T[]" id="MIR-OINS-THIS-CO-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-OINS-INFC-PEND-CD-T[]" id="MIR-OINS-INFC-PEND-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-OINS-INS-TYP-CD-T[]" id="MIR-OINS-INS-TYP-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-OINS-BUS-PERS-CD-T[]" id="MIR-OINS-BUS-PERS-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <input type="text" value=" " name="MIR-CLI-OINS-ISS-YR-T[]" id="MIR-CLI-OINS-ISS-YR-T[]" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" size="5" />
                        </td>
                        <td class="celllabeldataentry">
                            <input type="text" value=" " name="MIR-CLI-OINS-TOT-AMT-T[]" id="MIR-CLI-OINS-TOT-AMT-T[]" stype="Currency" elength="16" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <input type="text" value=" " name="MIR-CLI-OINS-ADB-AMT-T[]" id="MIR-CLI-OINS-ADB-AMT-T[]" stype="Currency" elength="14" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-OINS-WP-INFC-IND-T[]" id="MIR-OINS-WP-INFC-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                    </tr>
                </table>
            </span>
            <br />
            <table class="tabledataentrynoborder">
                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-CLI-INS-REFUS-IND">Has the applicant been refused for insurance or offered insurance with an extra premium within the last 6 months?</label>
                    </td>
                    <td class="celllabeldataentry" width="210">
                        <input type="radio" name="MIR-CLI-INS-REFUS-IND" value="Y" stype="YesNoUnanswered" onclick="showHideRefusedSubstandard(this);onYesNoUa('Yes')" onfocus="saveValue(); enterField(this)">Yes</input>
                        <input type="radio" name="MIR-CLI-INS-REFUS-IND" value="N" stype="YesNoUnanswered" onclick="showHideRefusedSubstandard(this);onYesNoUa('No')" onfocus="saveValue(); enterField(this)">No</input>
                        <input type="radio" name="MIR-CLI-INS-REFUS-IND" value=" " stype="YesNoUnanswered" onclick="showHideRefusedSubstandard(this);onYesNoUa('Ua')" onfocus="saveValue(); enterField(this)">Unanswered</input>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <span id="yearRefusedOrSubstandardLabel">
                            <label for="MIR-CLI-INS-REFUS-YR">Year insurance refused or offered with extra premium:</label>
                        </span>
                    </td>
                    <td class="celllabeldataentry" width="210">
                        <span id="yearRefusedOrSubstandardField">
                            <input type="text" value=" " name="MIR-CLI-INS-REFUS-YR" id="MIR-CLI-INS-REFUS-YR" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" size="4" />
                        </span>
                    </td>
                </tr>
            </table>
            <span id="refusedSubstandardInsuranceFields">
                <br />
                <table class="tabledataentry" genrows="2">
                    <tr>
                        <td class="celldataentryheading" colspan="3">Refused / Substandard Insurance Information</td>
                    </tr>
                    <tr>
                        <td class="celldataentryheading">
                            <label for="MIR-INS-REFUS-CO-1-NM-T[1]">Company Name</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-CLI-REFUS-CO-1-IND-T[1]">Insurance with This Company</label>
                        </td>
                        <td class="celldataentryheading">
                            <label for="MIR-REFUS-REASN-1-TXT-T[1]"> Reason Refused / Issued Substandard</label>
                        </td>
                    </tr>
                    <tr>
                        <td class="celllabeldataentry">
                            <input type="text" value=" " name="MIR-INS-REFUS-CO-1-NM-T[]" id="MIR-INS-REFUS-CO-1-NM-T[]" stype="Text" maxlength="15" onfocus="enterField(this)" size="15" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-CLI-REFUS-CO-1-IND-T[]" id="MIR-CLI-REFUS-CO-1-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                        <td class="celllabeldataentry">
                            <select name="MIR-REFUS-REASN-1-TXT-T[]" id="MIR-REFUS-REASN-1-TXT-T[]" size="1" stype="Selection" onfocus="enterField(this)" />
                        </td>
                    </tr>
                </table>
            </span>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/AppNonmedInsuranceHistory.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
