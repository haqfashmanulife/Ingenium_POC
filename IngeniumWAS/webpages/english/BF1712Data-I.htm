        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-OWN-CLI-NM">Owner Name:</label>
                    </td>
                    <td colspan="3" class="celldisplaykey">
                        <span id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PEND-DPOS-EFF-DT">Deposit Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PEND-DPOS-EFF-DT" stype="Date" displayonly="yes">MIR-PEND-DPOS-EFF-DT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PEND-DPOS-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PEND-DPOS-SEQ-NUM" stype="Text" displayonly="yes">MIR-PEND-DPOS-SEQ-NUM</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td colspan="4" class="celldataentryheading">
                        <label for="MIR-FND-ID-T[1]">Pending Deposit Reversal Details</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-DV-OS-DISB-IND">Update Outstanding Disbursement Account:</label>
                    </td>
                    <td colspan="3" class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-DV-OS-DISB-IND" id="MIR-DV-OS-DISB-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PEND-DPOS-AMT-T[1]">Amount:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-PEND-DPOS-AMT-T[1]" stype="Currency" elength="15" displayonly="yes">MIR-PEND-DPOS-AMT-T[1]</span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-REG-FND-SRC-CD-T[1]">Fund Source:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-REG-FND-SRC-CD-T[1]" stype="Text" displayonly="yes">MIR-REG-FND-SRC-CD-T[1]</span>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CVG-NUM-T[1]">Coverage Number:</label>
                    </td>
                    <td class="celllabeldataentry">

                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-FND-ID-T[1]">Fund:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-FND-ID-T[1]" stype="Text" displayonly="yes">MIR-FND-ID-T[1]</span>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PEND-DPOS-TAX-YR-T[1]">Tax Year:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-PEND-DPOS-TAX-YR-T[1]" stype="Year" displayonly="yes">MIR-PEND-DPOS-TAX-YR-T[1]</span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-PEND-DPOS-STAT-CD-T[1]">Deposit Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-PEND-DPOS-STAT-CD-T[1]" stype="Text" displayonly="yes">MIR-PEND-DPOS-STAT-CD-T[1]</span>
                    </td>
                </tr>
            </table>
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
