<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <!-- 23123 added .. to href path -->
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodymessage" onload="onLoad()">
        <input type="hidden" name="MORE-MESSAGES-IND" id="MORE-MESSAGES-IND"/>
        <!-- 23123 removed /servlet/ from href path -->
        <a name="More" style="display: none" href="pageserver?ProcessClassID=BF0090List&amp;PageReturn=Blank&amp;LocaleID=E" target="_window">
            <font face="Arial" size="1">More...</font>
        </a>

        <table class="tablemessage" genrows="0">
            <tr>
                <td class="cellmessage">
                    <!-- 23460 changed from -T-1 to -T[] -->
                    <div id="MESSAGES-T[]" />
                </td>
            </tr>
        </table>
    </body>
    <script>

function onLoad()

{

	// show more link if there are more than 5 messages

	if (document.getElementById("MORE-MESSAGES-IND").value == "Y")

	{

		document.getElementById("More").style.display = "";

	}

}

// If MessageFrame receives focus, force it to go to the Content Frame; otherwise

// other js will not take effect

//window.onfocus=loseFocus;

function loseFocus()

{	

	parent.window.frames["ContentFrame"].focus();

}

                    </script>
</html>
