<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>App Cash With Application</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad(); onLoadCustom()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="MIR-DV-PRCES-DT" id="MIR-DV-PRCES-DT" stype="Hidden" />
            <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-MPREM-AMT">Premium Required:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-MPREM-AMT" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-POL-MPREM-AMT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="tempCashAmount">Cash Paid:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="tempCashAmount" stype="Currency" elength="17" signed="yes" displayonly="yes">tempCashAmount</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentrynoborder">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="cashYesNo">Was Payment Submitted with this Application?</label>
                    </td>
                    <td class="celllabelleftalign">
                        <input type="radio" name="cashYesNo" value="Y" stype="YesNo" onclick="onClickCashWithApp(this)" onfocus="saveValue(); enterField(this)" />
                        Yes
                    </td>
                    <td class="celllabelleftalign">
                        <input type="radio" name="cashYesNo" value="N" stype="YesNo" onclick="onClickCashWithApp(this)" onfocus="saveValue(); enterField(this)" />
                        No
                    </td>
                </tr>
            </table>
            <div id="cashWithAppFields" style="display: none">
                <br />
                <table class="tabledataentry">
                    <tr>
                        <td colspan="4" class="celldataentryheading">Source of Initial Premium:</td>
                    </tr>
                    <tr>
                        <td class="celllabelrightalign">
                            <label for="MIR-DV-ENTR-CSH-AMT">Cash Amount:</label>
                        </td>
                        <td class="celllabelleftalign">
                            <input type="text" value=" " name="MIR-DV-ENTR-CSH-AMT" id="MIR-DV-ENTR-CSH-AMT" stype="Currency" mandatory="yes" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                        </td>
                        <td class="celllabelrightalign">
                            <label for="MIR-SUPRES-CNFRM-IND">Suppress confirmation statement:</label>
                        </td>
                        <td class="celllabelleftalign">
                            <input type="checkbox" value="Y" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                        </td>
                    </tr>
                    <tr>
                        <td class="celllabelrightalign">
                            <label for="MIR-CF-REG-FND-SRC-CD">Source of Deposit:</label>
                        </td>
                        <td class="celllabelleftalign">
                            <select name="MIR-CF-REG-FND-SRC-CD" id="MIR-CF-REG-FND-SRC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                        </td>
                    </tr>
                </table>
                <br />
                <table class="tabledataentrynoborder">
                    <tr>
                        <td class="celllabelrightalign">
                            <label for="NOCInOut">Is Payment Net of Commission?</label>
                        </td>
                        <td class="celllabelrightalign">
                            <input type="radio" name="NOCInOut" value="Y" stype="YesNo" onclick="onClickNOC(this)" onfocus="saveValue(); enterField(this)" />
                            Yes
                        </td>
                        <td class="celllabelrightalign">
                            <input type="radio" name="NOCInOut" value="N" stype="YesNo" onclick="onClickNOC(this)" onfocus="saveValue(); enterField(this)" />
                            No
                        </td>
                    </tr>
                </table>
                <div id="NOCTable" style="display: none">
                    <table class="tabledataentry">
                        <tr>
                            <td class="celllabelrightalign">
                                <label for="MIR-AGT-ID">Agent Name:</label>
                            </td>
                            <td class="celllabelleftalign">
                                <select name="MIR-AGT-ID" id="MIR-AGT-ID" size="1" stype="Selection" mandatory="yes" onfocus="enterField(this)"></select>
                            </td>
                            <td class="celllabelrightalign">
                                <label for="MIR-DV-POL-RCOMM-AMT">Retained Commission:</label>
                            </td>
                            <td class="celllabelleftalign">
                                <input type="text" value=" " name="MIR-DV-POL-RCOMM-AMT" id="MIR-DV-POL-RCOMM-AMT" stype="Currency" mandatory="yes" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                            </td>
                        </tr>
                    </table>
                </div>
<!--  END DIV FOR HIDING AGENT NET OF COMMISSION FIELDS  -->
            </div>
<!--  END DIV FOR HIDING CASH WITH APP FIELDS  -->
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/AppCwaJPVUL.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
