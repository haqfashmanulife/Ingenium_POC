<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1354-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ISS-EFF-DT">Policy Issue Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ISS-EFF-DT" id="MIR-POL-ISS-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ISS-DT-TYP-CD">Policy Issue Date Type:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-POL-ISS-DT-TYP-CD" id="MIR-POL-ISS-DT-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-AUTO-SETL-CD">Policy Settlement:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-AUTO-SETL-CD" id="MIR-DV-AUTO-SETL-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-SA-XFER-EFF-DT">Initial SA Effective Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-DV-SA-XFER-EFF-DT" id="MIR-DV-SA-XFER-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <!-- CHANGES STARTS FOR FEID11-ISSUE REVERSAL -->
                <tr>
                    <td class="celllabelrightalign">
				        <label for="MIR-DV-SUPRES-PCERT-IND">Suppress Policy Certificate :</label>
				    </td>
				    <td class="celllabeldataentry">
				        <input type="checkbox" value="Y" name="MIR-DV-SUPRES-PCERT-IND" id="MIR-DV-SUPRES-PCERT-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
				    </td>
                </tr>
                <!-- CHANGES ENDS FOR FEID11-ISSUE REVERSAL -->
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>

</html>
