    <head>

    <body class="bodyws" onLoad="onLoad()"> -->
    <body class="bodyws" onLoad="onLoad();InpTrimPolicy()">
<!--  UY3004 CHANGES ENDS HERE -->
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-PEND-DPOS-EFF-DT">Deposit Date:</label>
                <input type="text" value=" " name="MIR-PEND-DPOS-EFF-DT" id="MIR-PEND-DPOS-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-PEND-DPOS-SEQ-NUM">Sequence Number:</label>
                <input type="text" value=" " name="MIR-PEND-DPOS-SEQ-NUM" id="MIR-PEND-DPOS-SEQ-NUM" stype="Text" maxlength="3" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-POL-ID-BASE">Policy Id:</label>
                <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">Suffix:</label>
                <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
            </p>
            <table class="tabledisplay" genrows="12" keyfield="0">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-CVG-NUM-T[1]">Coverage Number</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-FND-ID-T[1]">Fund</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PEND-DPOS-AMT-T[1]">Amount</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PEND-DPOS-TAX-YR-T[1]">Tax Year</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-REG-FND-SRC-CD-T[1]">Fund Source</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-CVG-NUM-T[]" id="MIR-CVG-NUM-T[]" stype="Text" maxlength="2" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-FND-ID-T[]" id="MIR-FND-ID-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-PEND-DPOS-AMT-T[]" id="MIR-PEND-DPOS-AMT-T[]" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-PEND-DPOS-TAX-YR-T[]" id="MIR-PEND-DPOS-TAX-YR-T[]" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-REG-FND-SRC-CD-T[]" id="MIR-REG-FND-SRC-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            </p>
        </form>
