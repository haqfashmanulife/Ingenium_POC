<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppCompListJP</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Kanji names</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KA" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Katakana names</b></td>
				  </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ENTR-CO-NM">Company Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-ENTR-CO-NM" id="MIR-CLI-ENTR-CO-NM" stype="Text" maxlength="50" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-TAX-ID">Tax ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-TAX-ID" id="MIR-CLI-TAX-ID" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CITY-NM-TXT">City Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-CITY-NM-TXT" id="MIR-CLI-CITY-NM-TXT" stype="Text" maxlength="30" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-JP-ADDR-CD">Prefecture:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-JP-ADDR-CD" id="MIR-CLI-JP-ADDR-CD" stype="Text" maxlength="11" onfocus="enterField(this)" size="20" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-PSTL-CD">Postal Code:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-PSTL-CD" id="MIR-CLI-PSTL-CD" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CRNT-LOC-CD">Province:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CLI-CRNT-LOC-CD" id="MIR-CLI-CRNT-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay" genrows="0">
                <tr>
                    <td class="celldisplayheading">
                        <label for="SELECT-T[1]" />
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-SRCH-CLI-NM-T[1]">Full Name</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-ID-T[1]">Client ID</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-TAX-ID-T[1]">Tax ID</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-ADDR-LN-1-TXT-T[1]">Primary Address</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-CITY-NM-TXT-T[1]">City Name</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-PSTL-CD-T[1]">Postal Code</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-CRNT-LOC-CD-T[1]">Province</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-JP-ADDR-CD-T[1]">Prefecture</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-CLI-PREV-NM-IND-T[1]">AKA</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input stype="Indicator" type="checkbox" name="SELECT-T[]" id="SELECT-T[]" value=" " index="1" onclick="onListCheckBox()" />
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-SRCH-CLI-NM-T[]" stype="Text" displayonly="yes">MIR-DV-SRCH-CLI-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-ID-T[]" stype="Text" displayonly="yes">MIR-CLI-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-TAX-ID-T[]" stype="Text" displayonly="yes">MIR-CLI-TAX-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-ADDR-LN-1-TXT-T[]" stype="Text" displayonly="yes">MIR-CLI-ADDR-LN-1-TXT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-CITY-NM-TXT-T[]" stype="Text" displayonly="yes">MIR-CLI-CITY-NM-TXT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-PSTL-CD-T[]" stype="Text" displayonly="yes">MIR-CLI-PSTL-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-CRNT-LOC-CD-T[]" stype="Text" displayonly="yes">MIR-CLI-CRNT-LOC-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-JP-ADDR-CD-T[]" stype="Text" displayonly="yes">MIR-CLI-JP-ADDR-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <input type="checkbox" name="MIR-DV-CLI-PREV-NM-IND-T[]" id="MIR-DV-CLI-PREV-NM-IND-T[]" stype="Indicator" value="Y" disabled="yes" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
