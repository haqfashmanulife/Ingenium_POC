    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-INSRD-CLI-NM">Insured Name:</label>
                    </td>
                    <td class="celldisplaykey" colspan="5">
                        <span id="MIR-DV-INSRD-CLI-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ID">Client ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ID" stype="Text" displayonly="yes">MIR-CLI-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-FLD-ID">Base Question Field Name:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-FLD-ID" stype="Text" displayonly="yes">MIR-FLD-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-APP-FORM-TYP-ID">Application Form Type:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-APP-FORM-TYP-ID" stype="Text" displayonly="yes">MIR-APP-FORM-TYP-ID</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-SBSDRY-CO-ID" stype="Text" displayonly="yes">MIR-SBSDRY-CO-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-LOC-GR-ID">Location Group:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-LOC-GR-ID" stype="Text" displayonly="yes">MIR-LOC-GR-ID</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelleftalign">
                        <label for="QuestionText">Question:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="QuestionText" stype="Text" displayonly="yes">QuestionText</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading">Question</td>
                    <td class="celldataentryheading">
                        <label for="MIR-DV-QSTN-RESP-TXT-001">Response</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Name of physician?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-001" id="MIR-DV-QSTN-RESP-TXT-001" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Date of onset?</td>
                    <td class="celllabeldataentry">
<!-- 

The field below is not defined as a date field in the S-step but is in the HTML.  This is to prevent the user at the presentation level to
put in a bad date instead of having the user enter a bad date, go to the server, come back with an error message.
This may be removed when round tripping is introduced with the UIGEN (future consideration).

-->
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-002" id="MIR-DV-QSTN-RESP-TXT-002" stype="Date" onblur="validateField(this)" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">What was the diagnosis?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-003" id="MIR-DV-QSTN-RESP-TXT-003" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Did/do you receive any treatment for this?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-004" id="MIR-DV-QSTN-RESP-TXT-004" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
