<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarListsClaim</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="openButton" id="openButton" src="../english/images/but_open.gif" onclick="onClickedActionButton('ACTION_OPEN')" width="72" height="27" tabindex="1" alt="Open" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="closeButton" id="closeButton" src="../english/images/but_close.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_CLOSE')" width="72" height="27" tabindex="2" alt="Close" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="reopenButton" id="reopenButton" src="../english/images/but_reopen.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_REOPEN')" width="72" height="27" tabindex="3" alt="Reopen" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="deleteButton" id="deleteButton" src="../english/images/but_del.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_DELETE')" width="72" height="27" tabindex="4" alt="Delete" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../english/images/but_can.gif" onclick="onClickedActionButton('ACTION_BACK')" width="72" height="27" tabindex="5" alt="Cancel" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="moreButton" id="moreButton" src="../english/images/but_more.gif" onclick="onClickedActionButton('ACTION_MORE')" width="72" height="27" tabindex="6" alt="More" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
            </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
</html>
