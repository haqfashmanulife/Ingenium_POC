<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9001-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-SECUR-CLAS-ID">Security Class:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-SECUR-CLAS-ID" id="MIR-SECUR-CLAS-ID" size="1" stype="Selection" onfocus="enterField(this)" tabindex="1"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-SESN-CTL-ONLY-IND">Display Session Control Only:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-DV-SESN-CTL-ONLY-IND" id="MIR-DV-SESN-CTL-ONLY-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" tabindex="2" />
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                            <label for="MIR-DV-SESN-TOT-SESN-CTL">Total Number of Sessions with Session Control:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-DV-SESN-TOT-SESN-CTL" stype="Text" displayonly="yes">MIR-DV-SESN-TOT-SESN-CTL</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                            <label for="MIR-DV-SESN-TOT-ALL">Total Number of Sessions (Approx):</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-DV-SESN-TOT-ALL" stype="Text" displayonly="yes">MIR-DV-SESN-TOT-ALL</span>
                    </td>
                </tr>
            </table> 
            <br />
            <table class="tabledisplay" genrows="0" keyfield="1">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-SECUR-CLAS-ID-T[1]">Security Class</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-SESN-CTL-IND-T[1]">Session Control Indicator</label>
                    </td>
                    <td class="celldisplayheading">
                            <label for="MIR-MAX-SESN-NUM-T[1]">Maximum Sessions</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-SESN-TOT-T[1]">Number of Active Sessions</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <span id="MIR-SECUR-CLAS-ID-T[]" stype="Text" displayonly="yes">MIR-SECUR-CLAS-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-SESN-CTL-IND-T[]" stype="Indicator" displayonly="yes">MIR-SESN-CTL-IND-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-MAX-SESN-NUM-T[]" stype="Text" displayonly="yes">MIR-MAX-SESN-NUM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-SESN-TOT-T[]" stype="Text" displayonly="yes">MIR-DV-SESN-TOT-T[]</span>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
