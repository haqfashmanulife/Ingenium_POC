    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

     <body class="bodyws" onLoad="onLoad();SubInpTrimPolicy()">
<!--  UY3004 CHANGES ENDS HERE -->
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-OWN-CLI-NM">Recipient      Client Name:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-USTX-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-USTX-EFF-DT" stype="Date" displayonly="yes">MIR-USTX-EFF-DT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-USTX-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-USTX-SEQ-NUM" stype="Text" displayonly="yes">MIR-USTX-SEQ-NUM</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Client Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ID">Recipient Client Number:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ID" id="MIR-CLI-ID" stype="Text" maxlength="10" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-TAX-ID">Tax Identifier:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-TAX-ID" id="MIR-CLI-TAX-ID" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-TAXBL-EVNT-CD">Tax Reporting Event:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-USTX-TAXBL-EVNT-CD" id="MIR-USTX-TAXBL-EVNT-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-FORM-TYP-CD">Tax Form Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-USTX-FORM-TYP-CD" id="MIR-USTX-FORM-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Amount Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-GRS-DSTRB-AMT">Gross Distribution:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-USTX-GRS-DSTRB-AMT" id="MIR-USTX-GRS-DSTRB-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-INT-AMT">Interest Amount:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-USTX-INT-AMT" id="MIR-USTX-INT-AMT" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-TAXBL-AMT">Taxable Gross Distribution Amount:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-USTX-TAXBL-AMT" id="MIR-USTX-TAXBL-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-FED-TAXWH-AMT">Federal Tax Withheld:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-USTX-FED-TAXWH-AMT" id="MIR-USTX-FED-TAXWH-AMT" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-ACB-AMT">Adjusted Cost Basis:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-USTX-ACB-AMT" id="MIR-USTX-ACB-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry"></td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Reporting Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-TYP-CD">Address Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-ADDR-TYP-CD" id="MIR-CLI-ADDR-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-IRS-DSTRB-CD">Distribution Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-USTX-IRS-DSTRB-CD" id="MIR-USTX-IRS-DSTRB-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-ORIG-FORM-CD">Tax Record Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-USTX-ORIG-FORM-CD" id="MIR-USTX-ORIG-FORM-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-STAT-CD">Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-USTX-STAT-CD" id="MIR-USTX-STAT-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-GRS-DSTRB-PCT">Percentage of Total Distribution:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" name="MIR-USTX-GRS-DSTRB-PCT" id="MIR-USTX-GRS-DSTRB-PCT" stype="Percent" elength="3" decimals="0" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Indicators</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-TOT-DSTRB-CD">U.S. Tax      Record Reflects the Total Policy Distributions:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-USTX-TOT-DSTRB-CD" stype="Text" displayonly="yes">MIR-USTX-TOT-DSTRB-CD</span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-IRA-SEP-IND">Policy is an IRA or SEP:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-USTX-IRA-SEP-IND" id="MIR-USTX-IRA-SEP-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-USTX-TAX-DTRMN-IND">Taxable      Amount Determined:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-USTX-TAX-DTRMN-IND" id="MIR-USTX-TAX-DTRMN-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
            </table>
