<body class="bodyws" >

  </tr>
</table>

</table>

</tr>
</table>

<table border="0" width="100%" class="tabledisplay">

        </td>
      <td width="25%" class="celltitle">
    <input type="radio" name="MIR-SRCH-CD" value="NKADOB" stype="YesNoUnanswered"  onclick="onClickSrchCd()" onfocus="saveValue(); enterField(this)" > Name KANA + Date Of Birth </input>
        </td>
      <td width="25%" class="celltitle"></td>
      <td width="25%" class="celltitle"></td>
    </tr>
    <tr>

      <td width="25%" class="celltitle">
        <input type="radio" name="MIR-SRCH-TYP-CD" value="P" stype="YesNo" onclick="onClickSrchTypCd()" onfocus="saveValue();enterField(this)" > Prospect</input>
        </td>
      <td width="25%" class="celltitle">
      <input type="radio" name="MIR-SRCH-CD" value="NKJDOB" stype="YesNoUnanswered"  onclick="onClickSrchCd()" onfocus="saveValue(); enterField(this)" > Name Kanji + Date Of Birth</input>

      <td width="25%" class="celltitle"></td>
      <td width="25%" class="celltitle"></td>
    </tr>

      <td width="25%" class="celltitle">
      </td>
      <td width="25%" class="celltitle">

  </tr>
</table>

</table>

		<label for="MIR-DV-CLI-BTH-MO-FROM"><font size="2">MM </font></label>
		<select name="MIR-DV-CLI-BTH-DY-FROM" id="MIR-DV-CLI-BTH-DY-FROM" size="1" stype="Selection" onfocus="enterField(this)" ></select>
		<label for="MIR-DV-CLI-BTH-DY-FROM"><font size="2">DD</font></label></td>
    <td width="19%" class="celltitle"><label for="MIR-DV-CLI-BTH-DT-2">Date of Birth To:</label></td>
	<td width="31%" class="celldisplay3">
		<input type="text" value=" " name="MIR-DV-CLI-BTH-YR-TO" id="MIR-DV-CLI-BTH-YR-TO" stype="Text" size ="2" maxlength="4" onfocus="enterField(this)"/>
		<label for="MIR-DV-CLI-BTH-YR-TO"><font size="2">YYYY </font></label>
		<select name="MIR-DV-CLI-BTH-MO-TO" id="MIR-DV-CLI-BTH-MO-TO" size="1" stype="Selection" onfocus="enterField(this)" ></select>
		<label for="MIR-DV-CLI-BTH-MO-TO"><font size="2">MM </font></label>
		<select name="MIR-DV-CLI-BTH-DY-TO" id="MIR-DV-CLI-BTH-DY-TO" size="1" stype="Selection" onfocus="enterField(this)" ></select>
		<label for="MIR-DV-CLI-BTH-DY-TO"><font size="2">DD</font></label></td>
  </tr>
</table>
<!-- MP0054 ENDS HERE -->

    <input type="text" value=" " name="MIR-PRT1-CLI-PSTL-CD" id="MIR-PRT1-CLI-PSTL-CD" stype="Text" maxlength="3"  size="5" onfocus="enterField(this)"/>
