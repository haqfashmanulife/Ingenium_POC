<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1742-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PLAN-ID">Plan:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PLAN-ID" stype="Text" displayonly="yes">MIR-PLAN-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-SBSDRY-CO-ID" stype="Text" displayonly="yes">MIR-SBSDRY-CO-ID</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-LOC-GR-ID">Location Group:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-LOC-GR-ID" stype="Text" displayonly="yes">MIR-LOC-GR-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-FND-ID">Fund:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-FND-ID" stype="Text" displayonly="yes">MIR-FND-ID</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PLAN-FND-REQIR-CD">Fund Required:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-PLAN-FND-REQIR-CD" id="MIR-PLAN-FND-REQIR-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-MIN-OPN-AMT">Minimum Amount to Open Fund:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MIN-OPN-AMT" id="MIR-MIN-OPN-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-MIN-REMN-AMT">Minimum Remaining Fund Value:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MIN-REMN-AMT" id="MIR-MIN-REMN-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-DV-FREE-LK-FND-CD">Free Look Fund Designation:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-DV-FREE-LK-FND-CD" id="MIR-DV-FREE-LK-FND-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-MUT-EXCL-IND">Fund is mutually exclusive with other funds for this plan:</label>
                    </td>
                    <td class="celllabelrightalign">
                        <input type="checkbox" value="Y" name="MIR-MUT-EXCL-IND" id="MIR-MUT-EXCL-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PSUR-ALLOW-IND">Partial surrenders allowed:</label>
                    </td>
                    <td class="celllabelrightalign">
                        <input type="checkbox" value="Y" name="MIR-PSUR-ALLOW-IND" id="MIR-PSUR-ALLOW-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
