<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0082-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-REF-ID">Source Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-REF-ID" stype="Text" displayonly="yes">MIR-MSG-REF-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-REF-NUM">Message Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-REF-NUM" stype="Text" displayonly="yes">MIR-MSG-REF-NUM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-LANG-CD">Language:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-LANG-CD" stype="Text" displayonly="yes">MIR-MSG-LANG-CD</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-SECUR-CLAS-CD">Security Class Level:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-SECUR-CLAS-CD" stype="Text" displayonly="yes">MIR-MSG-SECUR-CLAS-CD</span>
                    </td>
                </tr>
            </table>
            <br />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-MSG-SEVRTY-CD">Message Severity Level:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-MSG-SEVRTY-CD" id="MIR-MSG-SEVRTY-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celllabelleftalign">
                        <label for="MIR-MSG-AUD-IND">Message is to be audited:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-MSG-AUD-IND" id="MIR-MSG-AUD-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelleftalign">
                        <label for="MIR-MSG-GUI-IND">Display message to users?:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-MSG-GUI-IND" id="MIR-MSG-GUI-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-MSG-TXT">Message Text:</label>
                    </td>
                    <td class="celllabeldataentry" colspan="5">
                        <input type="text" value=" " name="MIR-MSG-TXT" id="MIR-MSG-TXT" stype="Text" maxlength="120" onfocus="enterField(this)" size="100" />
                    </td>
                </tr>
            </table>
        </form>
