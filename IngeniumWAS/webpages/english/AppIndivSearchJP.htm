<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppIndivSearchJP</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <script>

function onLoad()

{

	setEmperorDate("MIR-CLI-BTH-DT");

}

</script>
    </head>
    <body class="bodyws" onload="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Kanji names</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KA" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Katakana names</b></td>
				  </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ENTR-SUR-NM">Last Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-ENTR-SUR-NM" id="MIR-CLI-ENTR-SUR-NM" stype="Text" maxlength="25" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ENTR-GIV-NM">First Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-ENTR-GIV-NM" id="MIR-CLI-ENTR-GIV-NM" stype="Text" maxlength="25" onfocus="enterField(this)" size="20" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-TAX-ID">Tax ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-TAX-ID" id="MIR-CLI-TAX-ID" stype="Text" maxlength="9" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-SEX-CD">Sex:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CLI-SEX-CD" id="MIR-CLI-SEX-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-BTH-DT">Birth Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-BTH-DT" id="MIR-CLI-BTH-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" emperorDate="myEmperorDate" size="20" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="myEmperorDate">Emperor Date:</label>
                    </td>
                    <td>
                        <select name="myEmperorDate" id="myEmperorDate" stype="EmperorDate" onblur="validateField(this)" onfocus="enterField(this)" serverDate="MIR-CLI-BTH-DT">
                            <option value="" />
                            <option value="M">Meiji</option>
                            <option value="T">Taisho</option>
                            <option value="S">Showa</option>
                            <option value="H">Heisei</option>
<!-- 015550 CHANGES START HERE -->
                            <option value="R">Reiwa</option>
<!-- 015550 CHANGES ENDS HERE -->
                        </select>
                        <input type="text" maxlength="2" size="2" elength="2" name="myEmperorDate" id="myEmperorDate" stype="EmperorDate" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" serverDate="MIR-CLI-BTH-DT" />
                        <input type="text" maxlength="2" size="2" elength="2" name="myEmperorDate" id="myEmperorDate" stype="EmperorDate" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" serverDate="MIR-CLI-BTH-DT" />
                        <input type="text" maxlength="2" size="2" elength="2" name="myEmperorDate" id="myEmperorDate" stype="EmperorDate" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" serverDate="MIR-CLI-BTH-DT" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CITY-NM-TXT">City Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-CITY-NM-TXT" id="MIR-CLI-CITY-NM-TXT" stype="Text" maxlength="30" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-JP-ADDR-CD">Prefecture:</label>
                    </td>
                    <td>
                        <input type="text" name="MIR-CLI-JP-ADDR-CD" id="MIR-CLI-JP-ADDR-CD" stype="Text" maxlength="11" onfocus="enterField(this)" size="20" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-PSTL-CD">Postal Code:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-PSTL-CD" id="MIR-CLI-PSTL-CD" stype="Text" maxlength="9" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CRNT-LOC-CD">Province:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CLI-CRNT-LOC-CD" id="MIR-CLI-CRNT-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/EmperorDates.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
