<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1190-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoadPolicyClientKeys('ReqtType')">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="onSubmitPolicyClientKeys('ReqtType');return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table>
              <tr>
                <td CLASS="celldatakey" width="15"><input type="radio" value="1" name="ReqtType" onclick="showHidePolicyClientKeys(this)" /></td>
                <td CLASS="celldatakey" width="200"><b>Underwriting
                  Requirements</b></td>
                <td CLASS="celldatakey" width="15"><input type="radio" name="ReqtType" value="2" onclick="showHidePolicyClientKeys(this)" /></td>
                <td CLASS="celldatakey"><b>Issue
                  Requirements</b></td>
              </tr>
            </table>
            <br />
            <TABLE CLASS="tabledatakey">
                <TR id="ClientKeys" style="display: none">
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-CLI-ID">Client ID:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-ID" id="MIR-CLI-ID" stype="Text" maxlength="10" onfocus="enterField(this)" mandatory="choice: none" />
                    </TD>
                    <TD CLASS="celldatakeylabel"></TD>
                    <TD CLASS="celldatakey"></TD>
                </TR>
                <TR id="PolicyKeys" style="display: none">
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" onfocus="enterField(this)" mandatory="choice: none" />
                    </TD>
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </TD>
                </TR>
                <TR>
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-REQIR-ID">Requirement:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <select name="MIR-REQIR-ID" id="MIR-REQIR-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </TD>
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-CPREQ-SEQ-NUM">Sequence Number:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <input type="text" value=" " name="MIR-CPREQ-SEQ-NUM" id="MIR-CPREQ-SEQ-NUM" stype="Text" maxlength="3" onfocus="enterField(this)" />
                    </TD>
                </TR>
                <TR>
                    <TD CLASS="celldatakeylabel">
                        <label for="MIR-CPREQ-CREAT-DT">Creation Date:</label>
                    </TD>
                    <TD CLASS="celldatakey">
                        <input type="text" value=" " name="MIR-CPREQ-CREAT-DT" id="MIR-CPREQ-CREAT-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </TD>
                    <TD CLASS="celldatakeylabel"></TD>
                    <TD CLASS="celldatakey"></TD>
                </TR>
            </TABLE>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/PolicyClientKeys.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
