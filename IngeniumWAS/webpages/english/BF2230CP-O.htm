<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF2230CP-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="setEmperorDateLoop('MIR-CLI-BTH-DT-T[',50);">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ"  onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Kanji names</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KA"  onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Katakana names</b></td>
          </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-INDV-SUR-NM">Last Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-INDV-SUR-NM" id="MIR-CLI-INDV-SUR-NM" stype="Text" maxlength="25" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-INDV-GIV-NM">First Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-INDV-GIV-NM" id="MIR-CLI-INDV-GIV-NM" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay" genrows="0" keyfield="1">
                <tr>
                    <td class="celldisplayheading">
                        <label for="SELECT-T[1]" />
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-ID-T[1]">Client Number</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-INDV-SUR-NM-T[1]">Last Name</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-INDV-GIV-NM-T[1]">First Name</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-BTH-DT-T[1]">Birth Date</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="myEmperorDate-T[1]">Emperor Date</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-SEX-CD-T[1]">Sex Code</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-LANG-CD-T[1]">Language</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input stype="Indicator" type="checkbox" name="SELECT-T[]" id="SELECT-T[]" value=" " index="1" onclick="onListCheckBox()" />
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-ID-T[]" stype="Text" displayonly="yes">MIR-CLI-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-INDV-SUR-NM-T[]" stype="Text" displayonly="yes">MIR-CLI-INDV-SUR-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-INDV-GIV-NM-T[]" stype="Text" displayonly="yes">MIR-CLI-INDV-GIV-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-BTH-DT-T[]" stype="Date" displayonly="yes" emperorDate="myEmperorDate">MIR-CLI-BTH-DT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="myEmperorDate-T[]" displayonly="yes">myEmperorDate</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-SEX-CD-T[]" stype="Text" displayonly="yes">MIR-CLI-SEX-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-LANG-CD-T[]" stype="Text" displayonly="yes">MIR-CLI-LANG-CD-T[]</span>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/EmperorDates.js"></script>
    <script src="../js/EmperorDateLoop.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
