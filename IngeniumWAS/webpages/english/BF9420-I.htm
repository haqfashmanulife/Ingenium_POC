<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>BF9420-I</title>
<link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
</head>
<body class="bodyws">
<form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
    <input type="hidden" name="index" id="index" stype="Hidden" />
    <input type="hidden" name="action" id="action" stype="Hidden" />
    <table class="tabledatakey">
        <tr>
            <td class="celldatakeylabel">
                <label for="MIR-MCL-ACCT-BASE-ID">GL Account #:</label>
            </td>
            <td class="celldatakey">
                <select name="MIR-MCL-ACCT-BASE-ID" id="MIR-MCL-ACCT-BASE-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </td>
            <td class="celldatakeylabel">
                <label for="MIR-OPER-CAT-CD">Operation Category:</label>
            </td>
            <td class="celldatakey">
                <select name="MIR-OPER-CAT-CD" id="MIR-OPER-CAT-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </td>
        </tr>
        <tr>
            <td class="celldatakeylabel">
                <label for="MIR-FROM-ACCT-YR">From Year:</label>
            </td>
            <td class="celldatakey">
                <input type="text" value=" " name="MIR-FROM-ACCT-YR" id="MIR-FROM-ACCT-YR" stype="Year" mandatory="yes"  onfocus="enterField(this)" onblur="validateField(this)" onkeypress ="NumberKeyCheck()"/>
            </td>
            <td class="celldatakeylabel">
                <label for="MIR-FROM-ACCT-MO">From Month:</label>
            </td>
            <td class="celldatakey">
                <input type="text" value=" " name="MIR-FROM-ACCT-MO" id="MIR-FROM-ACCT-MO" stype="Month" mandatory="yes"  onfocus="enterField(this)" onblur="validateField(this)" onkeypress ="NumberKeyCheck()"/>
            </td>
        </tr>
        <tr>
            <td class="celldatakeylabel">
                <label for="MIR-TO-ACCT-YR">To Year:</label>
            </td>
            <td class="celldatakey">
                <input type="text" value=" " name="MIR-TO-ACCT-YR" id="MIR-TO-ACCT-YR" stype="Year" mandatory="yes"  onfocus="enterField(this)" onblur="validateField(this)" onkeypress ="NumberKeyCheck()"/>
            </td>
            <td class="celldatakeylabel">
                <label for="MIR-TO-ACCT-MO">To Month:</label>
            </td>
            <td class="celldatakey">
                <input type="text" value=" " name="MIR-TO-ACCT-MO" id="MIR-TO-ACCT-MO" stype="Month" mandatory="yes"  onfocus="enterField(this)" onblur="validateField(this)" onkeypress ="NumberKeyCheck()"/>
            </td>
        </tr>
    </table>
</form>
</body>
<script src="../js/ActionHandlers.js"></script>
<script src="../js/MessagesEnglish.js"></script>
<script src="../js/MessageFunctions.js"></script>
<script src="../js/ClientLevelEdits.js"></script>
<script src="../js/GlobalUserMethods.js"></script>
</html>
