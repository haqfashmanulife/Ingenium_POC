<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1990-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CO-ID">Individual Company:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CO-ID" id="MIR-CO-ID" size="1" stype="Selection" onfocus="enterField(this)" onchange="disableEnableCoIdCheckBox(this)" tabindex="1"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-CO-ID-IND">All Companies:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-DV-CO-ID-IND" id="MIR-DV-CO-ID-IND" stype="Indicator" onclick="disableEnableCoIdSelBox(this); onCheckBox()" onfocus="enterField(this)" tabindex="2" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-USER-ID">Individual User ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-USER-ID" id="MIR-USER-ID" stype="Text" maxlength="8" onfocus="enterField(this)" size="20" onchange="disableEnableUserIdCheckBox(this)" readonly="yes" tabindex="3" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-USER-ID-IND">All Users:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-DV-USER-ID-IND" id="MIR-DV-USER-ID-IND" stype="Indicator" onclick="disableEnableUserIdText(this); onCheckBox()" onfocus="enterField(this)" tabindex="4" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/UserSession.js"></script>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
