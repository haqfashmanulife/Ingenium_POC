<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1141-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-CIA-EFF-DT">Activity Effective Date:</label>
                <span id="MIR-CIA-EFF-DT" stype="Date" displayonly="yes">MIR-CIA-EFF-DT</span>
            </p>
            <p>
                <label for="MIR-POL-ID-BASE">Policy Id:</label>
                <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">Suffix:</label>
                <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
            </p>
            <table class="tabledisplay" genrows="0" keyfield="0">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-CVG-NUM-T[1]">Coverage Number</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-CFN-APROX-AMT-T[1]">Approximate Fund Value</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-FIA-OUT-ALLOC-PCT-T[1]">Percentage Out</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-FND-ID-T[1]">Fund ID</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PLAN-ID-T[1]">Type of Plan</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <span id="MIR-CVG-NUM-T[]" stype="Text" displayonly="yes">MIR-CVG-NUM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-CFN-APROX-AMT-T[]" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-DV-CFN-APROX-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-FIA-OUT-ALLOC-PCT-T[]" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-FIA-OUT-ALLOC-PCT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-FND-ID-T[]" stype="Text" displayonly="yes">MIR-FND-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PLAN-ID-T[]" stype="Text" displayonly="yes">MIR-PLAN-ID-T[]</span>
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-CIA-SRC-DEST-CD">Destination of Surrender Amount:</label>
                <span id="MIR-CIA-SRC-DEST-CD" stype="Text" displayonly="yes">MIR-CIA-SRC-DEST-CD</span>
            </p>
            <p>
                <label for="MIR-CIA-TAXWH-IND">Bypass the tax withholding process:</label>
                <input type="checkbox" name="MIR-CIA-TAXWH-IND" id="MIR-CIA-TAXWH-IND" stype="Indicator" value="Y" disabled="yes" />
            </p>
            <p>
                <label for="MIR-DV-CIA-REASN-CD">DV_CIA_REASN_CD:</label>
                <span id="MIR-DV-CIA-REASN-CD" stype="Text" displayonly="yes">MIR-DV-CIA-REASN-CD</span>
            </p>
            <p>
                <label for="MIR-SUPRES-CNFRM-IND">Suppress confirmation statement:</label>
                <input type="checkbox" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" value="Y" disabled="yes" />
            </p>
            <p>
                <label for="MIR-CIA-LOAD-AMT">Charges:</label>
                <span id="MIR-CIA-LOAD-AMT" stype="Currency" elength="16" decimals="0" signed="yes" displayonly="yes">MIR-CIA-LOAD-AMT</span>
            </p>
            <p>
                <label for="MIR-DV-OWN-CLI-NM">Owner Name:</label>
                <span id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
