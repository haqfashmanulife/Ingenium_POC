<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9960-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="../Print.css" media="print" />
    </head>
    <body class="bodyws" onload="onLoad(); onLoadCustom()">
        <form action="/ingenium/servlet/pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="MIR-SEL-TYP-CD" id="MIR-SEL-TYP-CD" stype="Hidden" />
            <tr>
            <td class="celldatakeylabel">
                <label for="MIR-INQ-TYP-CD">Inquiry Method</label>
            </td>
            </tr>
            <br></br>
            <br></br>
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-INQ-TYP-CD" value="1" onclick="onClickPAInquiry(this)" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Policy Number</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-INQ-TYP-CD" value="2" onclick="onClickPAInquiry(this)" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Client Name</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-INQ-TYP-CD" value="3" onclick="onClickPAInquiry(this)" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Policy List For Agent</b></td>
                </tr>
            </table>
            <br></br>
            <div id="policyFields" style="display: none">
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="no" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1"  onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            </div>
            <br></br>
            <div id="nameFields" style="display: none">
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KA"  onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Katakana names</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ"  onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>Search for Kanji names</b></td>
                </tr>
            </table>
            <br></br>
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-INDV-SUR-NM">Last Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-INDV-SUR-NM" id="MIR-CLI-INDV-SUR-NM" stype="Text" maxlength="25" mandatory="no" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-INDV-GIV-NM">First Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-INDV-GIV-NM" id="MIR-CLI-INDV-GIV-NM" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            </div>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/BF9960-I.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
