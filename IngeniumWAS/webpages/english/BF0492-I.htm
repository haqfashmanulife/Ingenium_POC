<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0492-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="saveCountryCodeDeflt()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="chkSamakatabu(); return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-CLI-NM">Client Name:</label>
                    </td>
                    <td colspan="5" class="celldisplaykey">
                        <span id="MIR-DV-CLI-NM" stype="Text" displayonly="yes">MIR-DV-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ID">Client Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ID" stype="Text" displayonly="yes">MIR-CLI-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ADDR-TYP-CD">Address Type:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ADDR-TYP-CD" stype="Text" displayonly="yes">MIR-CLI-ADDR-TYP-CD</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ADDR-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ADDR-SEQ-NUM" stype="Text" displayonly="yes">MIR-CLI-ADDR-SEQ-NUM</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="4">Address</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-ADDR-EFF-DT-NUM">Address Effective Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-ADDR-EFF-DT-NUM" id="MIR-ADDR-EFF-DT-NUM" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-ADDR-END-DT-NUM">End Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-ADDR-END-DT-NUM" id="MIR-ADDR-END-DT-NUM" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-YR-DUR">Years at Address:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-YR-DUR" id="MIR-CLI-ADDR-YR-DUR" stype="Text" maxlength="3" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-STAT-CD-T[1]">Address Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-ADDR-STAT-CD-T[1]" id="MIR-CLI-ADDR-STAT-CD-T[1]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-LOC-CD">Address Code:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LOC-CD" id="MIR-CLI-ADDR-LOC-CD" stype="Text" maxlength="8" onfocus="enterField(this)" size="21" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-CRNT-LOC-CD">Location Code:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-CLI-CRNT-LOC-CD" stype="Text" displayonly="yes">MIR-CLI-CRNT-LOC-CD</span>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-PSTL-CD">Postal Code:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-PSTL-CD" id="MIR-CLI-PSTL-CD" stype="Text" maxlength="9" onfocus="enterField(this)" size="20"/>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-CTRY-CD">Country:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-CTRY-CD" id="MIR-CLI-CTRY-CD" size="1" stype="Selection" onfocus="enterField(this)" onclick="CountryJapan(this)" onchange="CountryJapan(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="2">Kanji Address</td>
                    <td class="celldisplayheading" colspan="2">Katakana Address</td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-CLI-PREFCT-TXT-T[1]">Address:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-PREFCT-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-PREFCT-TXT-T[1]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-KA-PREFCT-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-KA-PREFCT-TXT-T[1]</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel" />
 
                    <td class="celldisplay">
                        <span id="MIR-CLI-CITY-NM-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-CITY-NM-TXT-T[1]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-KA-CITY-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-KA-CITY-TXT-T[1]</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel" />
                    <td class="celldisplay">
                        <span id="MIR-CLI-ADDR-LN-1-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-ADDR-LN-1-TXT-T[1]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CLI-KA-NGHBRHD-TXT-T[1]" stype="Text" displayonly="yes">MIR-CLI-KA-NGHBRHD-TXT-T[1]</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-ADDL-TXT-T[1]">Samakata-bu:</label>
                    </td>
                    <td class="celllabeldataentry" colspan="3">
                        <input type="text" value=" " name="MIR-CLI-ADDR-ADDL-TXT-T[1]" id="MIR-CLI-ADDR-ADDL-TXT-T[1]" stype="Text" maxlength="72"
                               onfocus="enterField(this)" 
                               onkeypress="KanaKeyCheck()" 
                               onchange="onlyKatakana()" 
                               size="72" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-CNTCT-TXT">Contact Information:</label>
                    </td>
                    <td class="celllabeldataentry" colspan="3">
                        <input type="text" value=" " name="MIR-CLI-ADDR-CNTCT-TXT" id="MIR-CLI-ADDR-CNTCT-TXT" stype="Text" maxlength="50" onfocus="enterField(this)" size="50" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
    <script src="../js/OnlyKana.js"></script>
    <script src="../js/CountryJapan.js"></script>
