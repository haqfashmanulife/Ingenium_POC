<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1801Key-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy Id:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CVG-NUM">Coverage Number:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CVG-NUM" id="MIR-CVG-NUM" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-EFF-DT">Activity Effective Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CIA-EFF-DT" id="MIR-CIA-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DPOS-OVRID-EFF-DT">Override Payment Effective Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-DPOS-OVRID-EFF-DT" id="MIR-DPOS-OVRID-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-CIA-DPOS-CD">Nature of Deposit:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-CIA-DPOS-CD" id="MIR-DV-CIA-DPOS-CD" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-FIA-FND-TRXN-AMT">Amount:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-FIA-FND-TRXN-AMT" id="MIR-FIA-FND-TRXN-AMT" stype="Currency" elength="15" signed="yes" mandatory="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-SRC-DEST-CD">Deposit Amount Source:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CIA-SRC-DEST-CD" id="MIR-CIA-SRC-DEST-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-REG-FND-SRC-CD">Registered Fund Source:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CIA-REG-FND-SRC-CD" id="MIR-CIA-REG-FND-SRC-CD" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-COMM-PRCES-IND">Override Default Commissions:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-CIA-COMM-PRCES-IND" id="MIR-CIA-COMM-PRCES-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-LOAD-FORCE-IND">Load Force Indicator:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-CIA-LOAD-FORCE-IND" id="MIR-CIA-LOAD-FORCE-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-SUPRES-CNFRM-IND">Suppress confirmation statement:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-LOAD-AMT">Front-end Load Charges:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CIA-LOAD-AMT" id="MIR-CIA-LOAD-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CF-TAX-YR">Tax Year:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CF-TAX-YR" id="MIR-CF-TAX-YR" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
