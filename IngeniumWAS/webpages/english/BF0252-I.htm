<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0252-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Policy Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-ISS-EFF-DT">Policy Issue Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-POL-ISS-EFF-DT" id="MIR-POL-ISS-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-DB-OPT-CD">Death Benefit Option:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-DB-OPT-CD" id="MIR-POL-DB-OPT-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-DV-LMPSM-AMT">Lump Sum Amount Added:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-LMPSM-AMT" id="MIR-DV-LMPSM-AMT" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-BILL-MODE-CD">Premium Mode:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-BILL-MODE-CD" id="MIR-POL-BILL-MODE-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Interest Rate</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-INIT-DPOS-INT-PCT">Interest Rate for Initial Deposit:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" name="MIR-INIT-DPOS-INT-PCT" id="MIR-INIT-DPOS-INT-PCT" stype="Percent" elength="7" decimals="4" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CVG-GUAR-INT-PCT">Interest Guaranteed Period - Interest Rate:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" name="MIR-CVG-GUAR-INT-PCT" id="MIR-CVG-GUAR-INT-PCT" stype="Percent" elength="7" decimals="4" signed="yes" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Premium</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PLAN-PERI-PREM-AMT">Planned Premium:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-PLAN-PERI-PREM-AMT" id="MIR-PLAN-PERI-PREM-AMT" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-UL-INIT-PREM-AMT">Intended Initial Premium:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-UL-INIT-PREM-AMT" id="MIR-UL-INIT-PREM-AMT" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
