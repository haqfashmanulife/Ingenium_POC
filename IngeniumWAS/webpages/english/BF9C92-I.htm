<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9C92-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                 </tr>
                 <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PBRQ-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PBRQ-EFF-DT" stype="Date" displayonly="yes">MIR-PBRQ-EFF-DT</span>
                    </td>
                 </tr>
                 <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-POL-FUT-ACTV-TYP-CD">Activity Type:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-DV-POL-FUT-ACTV-TYP-CD" stype="Text" displayonly="yes">MIR-DV-POL-FUT-ACTV-TYP-CD</span>
                    </td>
               </tr>
            </table>

            <table class="tabledisplay">
                <tr>
                    <td colspan="4" class="celldisplayheading">
                        <a name="General billing Information">Future Billing Information</a>
                    </td>
                </tr>

                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-POL-FUT-BILL-TYP-CD"> Billing Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-FUT-BILL-TYP-CD" id="MIR-POL-FUT-BILL-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>

                    <td class="celllabelrightalign">
                        <label for="MIR-POL-FUT-BILL-MODE-CD"> Premium Mode:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-FUT-BILL-MODE-CD" id="MIR-POL-FUT-BILL-MODE-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>

                <tr>

                    <td class="celllabelleftalign">
                        <label for="MIR-POL-FUT-PAC-DRW-DY">Deposit Day:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-POL-FUT-PAC-DRW-DY" id="MIR-POL-FUT-PAC-DRW-DY" stype="Day" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>

                    <td class="celllabelrightalign">
                        <label for="MIR-POL-FUT-ACTV-STAT-CD">Activity Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-POL-FUT-ACTV-STAT-CD" id="MIR-POL-FUT-ACTV-STAT-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                 </tr>
                   <!--FFF10P CHANGES BEGIN-->
                    <tr>
                      <td class="celllabelleftalign">
                        <label for="MIR-FUT-SCHD-ADV-PMT-DUR">Scheduled Advanced Premium Payment Frequency:</label>
                      </td>
                      <td class="celllabeldataentry">
                        <select name="MIR-FUT-SCHD-ADV-PMT-DUR" id="MIR-FUT-SCHD-ADV-PMT-DUR" size="1" stype="Selection" onfocus="enterField(this)"></select>
                      </td>
<!--UYS133 CHANGE STARTS HERE -->
<!--                   <td class="celllabelleftalign" />
                       <td class="celllabeldataentry" />-->
                    <td class="celllabelleftalign">
                        <label for="MIR-PD-GR-TYP-CD">PD group size:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-PD-GR-TYP-CD" stype="Text" displayonly="yes">MIR-PD-GR-TYP-CD</span>
                    </td>
<!--UYS133 CHANGE ENDS HERE -->
                     </tr>
                   <!--FFF10P CHANGES END-->
             </table>

            <table class="tabledisplay">
                <tr>
                    <td colspan="4" class="celldisplayheading">
                        <a name="Payor Information">Payor Information</a>
                    </td>
                </tr>

                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-DV-FUT-PAYR-CLI-ID"> Payor Client ID</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-FUT-PAYR-CLI-ID" id="MIR-DV-FUT-PAYR-CLI-ID" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>

                    <td class="celllabelrightalign">
                        <label for="MIR-DV-FUT-PAYR-SUB-CD">Account Type</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-DV-FUT-PAYR-SUB-CD" id="MIR-DV-FUT-PAYR-SUB-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>

                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-DV-FUT-PAYR-ADDR-CD">Payor Client Address Type</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-DV-FUT-PAYR-ADDR-CD" id="MIR-DV-FUT-PAYR-ADDR-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>

                </tr>

             </table>

            <table class="tabledisplay">
                <tr>
                    <td colspan="4" class="celldisplayheading">
                        <a name="Payroll Deduction Relationships">Payroll Deduction Relationships</a>
                    </td>
                </tr>

                <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-DV-FUT-LBILL-CLI-ID"> Client ID</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-FUT-LBILL-CLI-ID" id="MIR-DV-FUT-LBILL-CLI-ID" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-DV-FUT-LBILL-CLI-NM">Payroll Deduction Name</label>
                    </td>

                    <td class="celllabeldataentry">
                        <span id="MIR-DV-FUT-LBILL-CLI-NM" stype="Text" displayonly="yes">MIR-DV-FUT-LBILL-CLI-NM</span>
                    </td>
                 </tr>

                 <tr>
                    <td class="celllabelleftalign">
                        <label for="MIR-DV-FUT-LBILL-ADDR-CD"> Address Type</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-DV-FUT-LBILL-ADDR-CD" id="MIR-DV-FUT-LBILL-ADDR-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>

                </tr>

             </table>

            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
