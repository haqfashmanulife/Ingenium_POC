<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF8001NB-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PLAN-ID">Plan ID:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-PLAN-ID" id="MIR-PLAN-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ISS-LOC-CD">Issue Location:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-POL-ISS-LOC-CD" id="MIR-POL-ISS-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel" align="left">
                        <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-SBSDRY-CO-ID" id="MIR-SBSDRY-CO-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-APP-SIGN-DT">Application Signed Date:</label>
                    </td>
                    <td class="celldatakey" align="left">
                        <input type="text" value=" " name="MIR-POL-APP-SIGN-DT" id="MIR-POL-APP-SIGN-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
            </table>
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-CNVR-TYP-CD">Policy Source:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-POL-CNVR-TYP-CD" id="MIR-POL-CNVR-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
           </table>

            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="MIR-POL-APPL-CTL-CD" id="MIR-POL-APPL-CTL-CD" stype="Hidden" />
        </form>
      
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
