<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1441-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-POL-ID-BASE">Policy Id:</label>
                <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">Suffix:</label>
                <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-POL-LOAN-SEQ-NUM">Sequence Number:</label>
                <input type="text" value=" " name="MIR-POL-LOAN-SEQ-NUM" id="MIR-POL-LOAN-SEQ-NUM" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <table class="tabledisplay" genrows="2" keyfield="4">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-ACCT-BASE-ID-T[1]">Account Number</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-ACCT-CRNT-LOC-CD-T[1]">Current Location</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-ACCT-ISS-LOC-CD-T[1]">Issue Location</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-AGT-ID-T[1]">Agent ID</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BR-OR-DEPT-ID-T[1]">Branch</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-ACCT-DESC-TXT-T[1]">Accounting Description</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-AGT-REASN-CD-T[1]">Reason for Agent Accounting Entry</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-POL-LOAN-CR-AMT-T[1]">Credit</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-DV-POL-LOAN-DR-AMT-T[1]">Debit</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-SBSDRY-CO-ID-T[1]">Sub Company</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-ACCT-BASE-ID-T[]" id="MIR-ACCT-BASE-ID-T[]" stype="Text" maxlength="6" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-ACCT-CRNT-LOC-CD-T[]" id="MIR-ACCT-CRNT-LOC-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-ACCT-ISS-LOC-CD-T[]" id="MIR-ACCT-ISS-LOC-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-AGT-ID-T[]" id="MIR-AGT-ID-T[]" stype="Text" maxlength="6" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-BR-OR-DEPT-ID-T[]" id="MIR-BR-OR-DEPT-ID-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-DV-ACCT-DESC-TXT-T[]" id="MIR-DV-ACCT-DESC-TXT-T[]" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-DV-AGT-REASN-CD-T[]" id="MIR-DV-AGT-REASN-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-DV-POL-LOAN-CR-AMT-T[]" id="MIR-DV-POL-LOAN-CR-AMT-T[]" stype="Currency" elength="13" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-DV-POL-LOAN-DR-AMT-T[]" id="MIR-DV-POL-LOAN-DR-AMT-T[]" stype="Currency" elength="13" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldisplay">
                        <select name="MIR-SBSDRY-CO-ID-T[]" id="MIR-SBSDRY-CO-ID-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-LOAN-AMT">Loan Amount Requested:</label>
                <input type="text" value=" " name="MIR-LOAN-AMT" id="MIR-LOAN-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-LOAN-DT">Effective Date:</label>
                <input type="text" value=" " name="MIR-LOAN-DT" id="MIR-LOAN-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-POL-MISC-SUSP-AMT">Miscellaneous Suspense:</label>
                <input type="text" value=" " name="MIR-POL-MISC-SUSP-AMT" id="MIR-POL-MISC-SUSP-AMT" stype="Currency" elength="17" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-POL-OS-DISB-AMT">Outstanding Disbursements:</label>
                <input type="text" value=" " name="MIR-POL-OS-DISB-AMT" id="MIR-POL-OS-DISB-AMT" stype="Currency" elength="17" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-POL-PREM-SUSP-AMT">Premium Suspense:</label>
                <input type="text" value=" " name="MIR-POL-PREM-SUSP-AMT" id="MIR-POL-PREM-SUSP-AMT" stype="Currency" elength="17" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-SUPRES-CNFRM-IND">Suppress confirmation statement:</label>
                <input type="checkbox" value="Y" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
            </p>
            <p>
                <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
