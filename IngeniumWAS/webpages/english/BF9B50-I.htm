<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9B50-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>

    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" stype="Hidden" />
            <input type="hidden" name="action" stype="Hidden" />
            <table class="tabledatakey" >
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-PLAN-FAMILY-ID">Plan Family:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-PLAN-FAMILY-ID" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-UW-FORM-ID">Criteria for underwriting:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-UW-FORM-ID" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-SEX-CD">Sex:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CLI-SEX-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-HLTH-CHKUP-DT">Date of health checkup:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-HLTH-CHKUP-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" size="20" tabindex="4" />
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-CLI-AGE">Client Age:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-CLI-AGE" stype="Text" elength="3" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="3"  />
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-EYE-OBSERV-CD">Visual acuity examination:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-EYE-OBSERV-CD" stype="Selection" onfocus="enterField(this)" ></select>
                        Left:<input type="text" name="MIR-LFT-EYE-CORR" stype="Text"  onfocus="enterField(this)" size="4" />
                        Right:<input type="text" name="MIR-RHT-EYE-CORR" stype="Text"  onfocus="enterField(this)" size="4" />
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-SMOKER-CD">Smoking, present/absent:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-SMOKER-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>
            </table>
            <table class="tabledatakey" >
            <tr>
            <td>
            <table class="tabledatakey" >
                <tr>
                    <td rowspan="3" class="celldisplayheading">
                       <span>Physical constitution</span>
                    </td>

                    <td class="celldisplayheading">
                          <label for="MIR-CLI-HT">Height:</label>
                    </td>

                    <td class="celldatakey">
                          <input type="text" name="MIR-CLI-HT" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />cm
                    </td>
                 </tr>

                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-CLI-WT">Weight:</label>
                      </td>
                      <td class="celldatakey">
                          <input type="text" name="MIR-CLI-WT" stype="Text" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />kg
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-WAIST-CIR">Abdominal Circumference:</label>
                      </td>
                      <td class="celldatakey">
                          <input type="text" name="MIR-WAIST-CIR" stype="Text" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />cm
                     </td>
                  </tr>
            </table>
            </td>
            <td>
            <table class="tabledatakey" >
               <tr>
                    <td class="celldisplayheading">
                        <label>Auditory acuity test:</label>
                    </td>
                    <td class="celldatakey">
                    Left 1000Hz:<select name="MIR-LFT-EAR-KHZ" stype="Selection" onfocus="enterField(this)"></select>
                    Right 1000Hz:<select name="MIR-RHT-EAR-KHZ" stype="Selection" onfocus="enterField(this)"></select>
                    Left 4000Hz:<select name="MIR-LFT-EAR-4KHZ" stype="Selection" onfocus="enterField(this)"></select>
                    Right 4000Hz:<select name="MIR-RHT-EAR-4KHZ" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
               </tr>
               <tr>
                    <td class="celldisplayheading">
                        <label>Blood Pressure:</label>
                    </td>
                    <td class="celldatakey">
                    Sistolic:<input type="text" name="MIR-SIST-BP" stype="Text"  onfocus="enterField(this)" size="4" />
                    Diastolic:<input type="text" name="MIR-DIAST-BP" stype="Text"  onfocus="enterField(this)" size="4" />
                    </td>
                </tr>
            </table>
            </td>
            </tr>
            <tr>
            <td>
            <table class="tabledatakey" >
                <tr>
                    <td rowspan="3" class="celldisplayheading">
                       <span>Urinalysis</span>
                    </td>

                    <td class="celldisplayheading">
                          <label for="MIR-URIC-PRO">Uric protein:</label>
                    </td>

                    <td class="celldatakey">
                        <select name="MIR-URIC-PRO" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                 </tr>

                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-URIC-SUG">Urinary sugar:</label>
                      </td>
                      <td class="celldatakey">
                        <select name="MIR-URIC-SUG" stype="Selection" onfocus="enterField(this)" ></select>
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-URIC-OB">Urinary occult blood:</label>
                      </td>
                      <td class="celldatakey">
                        <select name="MIR-URIC-OB" stype="Selection" onfocus="enterField(this)" ></select>
                     </td>
                  </tr>
            </table>
            </td>
            <td>
            <table class="tabledatakey" >
                <tr>
                    <td rowspan="3" class="celldisplayheading">
                       <span>Anemia test</span>
                    </td>

                    <td class="celldisplayheading">
                          <label for="MIR-HT-VALU">Ht (hematocrit):</label>
                    </td>

                    <td class="celldatakey">
                          <input type="text" name="MIR-HT-VALU" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />% Enter to the first decimal point
                    </td>
                 </tr>

                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-HB-CD">Hb (hemoglobin):</label>
                      </td>
                      <td class="celldatakey">
                        <select name="MIR-HB-CD" stype="Selection" onfocus="enterField(this)" ></select>
                        Value:<input type="text" name="MIR-HB-VALU" stype="Text"  onfocus="enterField(this)" size="4" />
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-RBC-CD">Red blood cell count:</label>
                      </td>
                      <td class="celldatakey">
                        <select name="MIR-RBC-CD" stype="Selection" onfocus="enterField(this)" ></select>
                        Value:<input type="text" name="MIR-RBC-VALU" stype="Text"  onfocus="enterField(this)" size="4" />
                     </td>
                  </tr>
            </table>
            </td>
            </tr>
            <tr>
            <td>
            <table class="tabledatakey" >
                <tr>
                    <td rowspan="3" class="celldisplayheading">
                       <span>Liver function</span>
                    </td>

                    <td class="celldisplayheading">
                          <label for="MIR-AST-VALU">AST (GOT):</label>
                    </td>

                    <td class="celldatakey">
                        <input type="text" name="MIR-AST-VALU" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />
                        U/L:<input type="text" name="MIR-AST-MAX" stype="Text" onfocus="enterField(this)" size="4" />
                    </td>
                 </tr>

                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-ALT-VALU">ALT (GPT):</label>
                      </td>
                      <td class="celldatakey">
                        <input type="text" name="MIR-ALT-VALU" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />
                        U/L:<input type="text" name="MIR-ALT-MAX" stype="Text"  onfocus="enterField(this)" size="4" />
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-GT-VALU">g-GT (g-GTP):</label>
                      </td>
                      <td class="celldatakey">
                        <input type="text" name="MIR-GT-VALU" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />
                        U/L:<input type="text" name="MIR-GT-MAX" stype="Text"  onfocus="enterField(this)" size="4" />
                     </td>
                  </tr>
            </table>
            </td>
            <td>
            <table class="tabledatakey">
                <tr>
                    <td rowspan="4" class="celldisplayheading">
                       <span>Lipids test</span>
                    </td>

                    <td class="celldisplayheading">
                          <label for="MIR-TOT-CHOL">Total cholesterol (T-cho):</label>
                    </td>

                    <td class="celldatakey">
                        <input type="text" name="MIR-TOT-CHOL" stype="Text" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />mg/dl
                    </td>
                 </tr>

                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-HDL-CHOL">HDL cholesterol:</label>
                      </td>
                      <td class="celldatakey">
                        <input type="text" name="MIR-HDL-CHOL" stype="Text" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />mg/dl
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-LDL-CHOL">LDL cholesterol:</label>
                      </td>
                      <td class="celldatakey">
                        <input type="text" name="MIR-LDL-CHOL" stype="Text"  onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />mg/dl
                     </td>
                  </tr>
                 <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-NEU-LIPID">Neutral lipid:</label>
                      </td>
                      <td class="celldatakey">
                        <input type="text" name="MIR-NEU-LIPID" stype="Text" onkeypress="TextKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="4"  />mg/dl
                     </td>
                  </tr>
            </table>
            </td>
            </tr>
            </table>
            <table class="tabledatakey">
                <tr>
                      <td class="celldisplayheading">
                          <label for="MIR-CHST-XRAY-CD">Chest X-ray examination:</label>
                      </td>
                      <td class="celldatakey">
                        <select name="MIR-CHST-XRAY-CD" stype="Selection" onfocus="enterField(this)" ></select>
                     </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-ECG-CD">ECG :</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-ECG-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-HBA1C-CD">Blood sugar level or HbA1c:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-HBA1C-CD" stype="Selection" onfocus="enterField(this)" ></select>
                        Value:<input type="text" name="MIR-HBA1C-VALU" stype="Text"  onfocus="enterField(this)" size="4" />
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-STOM-XRAY-CD">Stomach X-ray or Gastrofiberscopy:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-STOM-XRAY-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-WHTBC-VALU">White blood cell count:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-WHTBC-VALU" stype="Text"  onfocus="enterField(this)" size="4" />1/ml
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-ABD-ECO-CD">Abdominal echography:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-ABD-ECO-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PLT-VALU">Platelet counts:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-PLT-VALU" stype="Text" onfocus="enterField(this)" size="4" />10/ml4
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-FO-BLD-CD">Fecal occult blood test:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-FO-BLD-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-HBS-ANT-CD">HBs antigen:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-HBS-ANT-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-OCU-FUND-CD">Ocular fundus examination:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-OCU-FUND-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-HCV-ANT-CD">HCV antibody:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-HCV-ANT-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-OTHR-ABNM-CD">Abnormality other than the above items:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-OTHR-ABNM-CD" stype="Selection" onfocus="enterField(this)" ></select>
                    </td>
                </tr>
            </table>

        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
