<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarPreviousOKMoreConfirmCancel</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../english/images/but_prev.gif" onclick="onClickedActionButton('ACTION_BACK')" width="72" height="27" tabindex="2" alt="Previous" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="OKButton" id="OKButton" src="../english/images/but_ok.gif" onclick="onClickedActionButton('ACTION_OK')" width="72" height="27" tabindex="2" alt="OK" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton">
                 <input type="image" name="moreButton" id="moreButton" src="../english/images/but_more.gif" onclick="onClickedActionButton('ACTION_MORE')" width="72" height="27" tabindex="2" alt="More" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="confirmButton" id="confirmButton" src="../english/images/but_conf.gif" onclick="onClickedActionButton('ACTION_NEXT')" width="72" height="27" tabindex="2" alt="Confirm" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="cancelButton" id="cancelButton" src="../english/images/but_can.gif" onclick="onClickedActionButton('ACTION_CANCEL')" width="72" height="27" tabindex="2" alt="Cancel" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
            </tr>
        </table>

    <script src="../js/ButtonBar.js"></script>
