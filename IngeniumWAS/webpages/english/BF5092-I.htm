<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF5092-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="splitBranch('MIR-BNK-BR-ID');onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="updateBranch('Branch'); return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" value="" name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" jpnbranch="Branch" jpnsubbranch="SubBranch" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-BNK-ID">Bank Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-ID" stype="Text" displayonly="yes">MIR-BNK-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="Branch">Branch Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="Branch" stype="Text" displayonly="yes">Branch</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="SubBranch">Sub Branch Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="SubBranch" stype="Text" displayonly="yes">SubBranch</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-BNK-ACCT-ID">Account Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-ACCT-ID" stype="Text" displayonly="yes">MIR-BNK-ACCT-ID</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PAC-DRW-IDT-NUM">PAC Withdrawal Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PAC-DRW-IDT-NUM" stype="Date" displayonly="yes">MIR-PAC-DRW-IDT-NUM</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PAC-DRW-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PAC-DRW-SEQ-NUM" stype="Text" displayonly="yes">MIR-PAC-DRW-SEQ-NUM</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-SBSDRY-CO-ID" stype="Text" displayonly="yes">MIR-SBSDRY-CO-ID</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PAC-DRW-TOT-AMT">PAC Amount:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-PAC-DRW-TOT-AMT" id="MIR-PAC-DRW-TOT-AMT" stype="Currency" elength="11" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-PAC-DRW-STAT-CD">Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-PAC-DRW-STAT-CD" id="MIR-PAC-DRW-STAT-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PAC-DRW-CREAT-CD">Type of PAC Draw:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-PAC-DRW-CREAT-CD" stype="Text" displayonly="yes">MIR-PAC-DRW-CREAT-CD</span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-PAC-DRW-RETRN-CD">PAC Draw Reversal Reason:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-PAC-DRW-RETRN-CD" id="MIR-PAC-DRW-RETRN-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
        </form>
    </body>
