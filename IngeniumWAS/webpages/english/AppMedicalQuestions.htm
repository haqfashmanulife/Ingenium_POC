    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <div align="right">
                <table>
                    <tr>
                        <td class="celldisplaykeylabel">
                            <label for="MIR-DV-INSRD-CLI-NM">Applicant:</label>
                        </td>
                        <td class="celldisplaykey">
                            <span id="MIR-DV-INSRD-CLI-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-CLI-NM</span>
                        </td>
                    </tr>
                    <tr>
                        <td class="celldisplaykeylabel">
                            <label for="MIR-FLD-ID">Base Question Field Name:</label>
                        </td>
                        <td class="celldisplaykey">
                            <span id="MIR-FLD-ID" stype="Text" displayonly="yes">MIR-FLD-ID</span>
                        </td>
                    </tr>
                </table>
            </div>
            <br />
            <table class="tabledataentrynoborder">
                <tr>
                    <td class="celllabelleftalign">
                        <label for="QuestionText">Question:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="QuestionText" stype="Text" displayonly="yes">QuestionText</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading">Question</td>
                    <td class="celldataentryheading">
                        <label for="MIR-DV-QSTN-RESP-TXT-001">Response</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Name of physician?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-001" id="MIR-DV-QSTN-RESP-TXT-001" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Date of onset?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-002" id="MIR-DV-QSTN-RESP-TXT-002" maxlength="20" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">What was the diagnosis?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-003" id="MIR-DV-QSTN-RESP-TXT-003" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">Did/do you receive any treatment for this?</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-QSTN-RESP-TXT-004" id="MIR-DV-QSTN-RESP-TXT-004" stype="Text" maxlength="20" onfocus="enterField(this)" />
                    </td>
                </tr>
