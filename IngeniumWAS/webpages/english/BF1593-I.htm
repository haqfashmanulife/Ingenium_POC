<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1593-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-DPOS-TRM-DY-DUR">Deposit Term - Days:</label>
                <input type="text" value=" " name="MIR-DPOS-TRM-DY-DUR" id="MIR-DPOS-TRM-DY-DUR" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-DPOS-TRM-MO-DUR">Deposit Term - Months:</label>
                <input type="text" value=" " name="MIR-DPOS-TRM-MO-DUR" id="MIR-DPOS-TRM-MO-DUR" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-INT-RT-EFF-DT">Effective Date:</label>
                <input type="text" value=" " name="MIR-INT-RT-EFF-DT" id="MIR-INT-RT-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-INT-RT-ID">Plan:</label>
                <select name="MIR-INT-RT-ID" id="MIR-INT-RT-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-INT-RT-MAX-AMT">Maximum Amount:</label>
                <input type="text" value=" " name="MIR-INT-RT-MAX-AMT" id="MIR-INT-RT-MAX-AMT" stype="Currency" elength="13" decimals="0" mandatory="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
