<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppAddressUpdate</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-CLI-NM">Client Name:</label>
                    </td>
                    <td colspan="5" class="celldisplaykey">
                        <span id="MIR-DV-CLI-NM" stype="Text" displayonly="yes">MIR-DV-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ID">Client Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ID" stype="Text" displayonly="yes">MIR-CLI-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ADDR-TYP-CD">Address Type:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ADDR-TYP-CD" stype="Text" displayonly="yes">MIR-CLI-ADDR-TYP-CD</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ADDR-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ADDR-SEQ-NUM" stype="Text" displayonly="yes">MIR-CLI-ADDR-SEQ-NUM</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-ADDR-EFF-DT-NUM">Address Effective Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-ADDR-EFF-DT-NUM" id="MIR-ADDR-EFF-DT-NUM" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-ADDR-END-DT-NUM">End Date:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-ADDR-END-DT-NUM" id="MIR-ADDR-END-DT-NUM" stype="Text" maxlength="10" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-RES-TYP-CD">Residence Type:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-RES-TYP-CD" id="MIR-CLI-RES-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-RES-NUM-T[1]">Apt/Unit #:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-RES-NUM-T[1]" id="MIR-CLI-RES-NUM-T[1]" stype="Text" maxlength="5" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-LN-1-TXT-T[1]">Address:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LN-1-TXT-T[1]" id="MIR-CLI-ADDR-LN-1-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-PSTL-ADDR-LN-1-TXT">Line 1 Options:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-PSTL-ADDR-LN-1-TXT" id="MIR-PSTL-ADDR-LN-1-TXT" size="1" stype="Selection" onfocus="enterField(this)" onchange="AddrKJLine1()"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LN-2-TXT-T[1]" id="MIR-CLI-ADDR-LN-2-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-PSTL-ADDR-LN-2-TXT">Line 2 Options:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-PSTL-ADDR-LN-2-TXT" id="MIR-PSTL-ADDR-LN-2-TXT" size="1" stype="Selection" onfocus="enterField(this)" onchange="AddrKJLine2()"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LN-3-TXT-T[1]" id="MIR-CLI-ADDR-LN-3-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-CITY-NM-TXT-T[1]">City:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-CITY-NM-TXT-T[1]" id="MIR-CLI-CITY-NM-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-CRNT-LOC-CD">Province:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-CRNT-LOC-CD" id="MIR-CLI-CRNT-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                        <span id="refreshButtonspan" style="display: none">
                            <input type="image" name="refreshButton" id="refreshButton" border="0" src="../english/images/refresh.gif" align="bottom" width="70" height="26" onclick="doRefresh()" />
                        </span>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-CTRY-CD">Country:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-CTRY-CD" id="MIR-CLI-CTRY-CD" size="1" stype="Selection" onfocus="enterField(this)" onchange="refreshButtonspan.style.display='';" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-PSTL-CD-T[1]">Postal Code:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-PSTL-CD" id="MIR-CLI-PSTL-CD" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-JP-ADDR-CD-T[1]">Prefecture:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-JP-ADDR-CD-T[1]" id="MIR-CLI-JP-ADDR-CD-T[1]" stype="Text" maxlength="11" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-ADDL-TXT-T[1]">Additional Information:</label>
                    </td>
                    <td class="celllabeldataentry" colspan="3">
                        <input type="text" value=" " name="MIR-CLI-ADDR-ADDL-TXT-T[1]" id="MIR-CLI-ADDR-ADDL-TXT-T[1]" stype="Text" maxlength="60" onfocus="enterField(this)" size="60" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-YR-DUR">Years at Address:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-ADDR-YR-DUR" id="MIR-CLI-ADDR-YR-DUR" stype="Text" maxlength="3" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ADDR-STAT-CD-T[1]">Address Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-ADDR-STAT-CD-T[1]" id="MIR-CLI-ADDR-STAT-CD-T[1]" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
    <script src="../js/AppAddrLine.js"></script>
</html>
