<html>

    <body class="bodyws" onLoad="onLoad();UwgResultCheck()">

        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel"><label for="MIR-POL-ID-BASE">Policy ID:</label></td>
                    <td class="celldisplaykey"><span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span></td>
                    <td class="celldisplaykeylabel"><label for="MIR-POL-ID-SFX">Suffix:</label></td>
                    <td class="celldisplaykey"><span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span></td>
                </tr>

                <tr>
                <td class="celldisplaykeylabel"><label for="MIR-INFO-STAT-CD">Information status:</label></td>
                <td class="celldisplaykey"><span id="MIR-INFO-STAT-CD" stype="Text" displayonly="yes">MIR-INFO-STAT-CD</span></td>
                    <td class="celldisplaykeylabel"><label for="MIR-PRCES-DT">Processing Date:</label></td>
                    <td class="celldisplaykey"><span id="MIR-PRCES-DT" stype="Date" displayonly="yes">MIR-PRCES-DT</span></td>
                </tr>
            </table>


        <br />
      <table class="tabledisplay">
          <tr>
            <td class="celldatakeylabel"><label for="MIR-INSRD-CLI-ID">Insured Client Number:</label></td>
              <td class="celldisplaykey"><span id="MIR-INSRD-CLI-ID" stype="Text" elength="10"   displayonly="yes">MIR-INSRD-CLI-ID</span></td>
              <td class="celldatakeylabel">
            <label for="MIR-OVRDU-PREM-AMT">Delinquent Premium:</label>
            </td>
            <td class="celldatakey">
            <input type="text" value=" " name="MIR-OVRDU-PREM-AMT" id="MIR-OVRDU-PREM-AMT" stype="Currency" elength="15" onkeypress ="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" />
                </td>
          </tr>
          <tr>
                <td class="celldatakeylabel"><label for="MIR-DV-INSRD-NM">Insured Name:</label></td>
              <td class="celldisplaykey"><span id="MIR-DV-INSRD-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-NM</span></td>
              <td class="celldatakeylabel">
<!-- CHANGES FOR R15533 STARTS FROM HERE -->
   <!--    <label for="MIR-OVRDU-INT-AMT">Delinquent Interest:</label> -->
   <label for="MIR-OVRDU-INT-AMT">Delinquent Interest/Fractional amount of FRA currency exchange:</label>
        </td>
        <td class="celldatakey">
        <input type="text" value=" " name="MIR-OVRDU-INT-AMT" id="MIR-OVRDU-INT-AMT" stype="Currency" elength="15"  signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20"/>
                </td>
<!-- CHANGES FOR R15533 END FROM HERE -->
          </tr>
          <tr>
              <td class="celldatakeylabel">
              <label for="MIR-SELF-DSCLSRE-DT">Self Disclosure Date:</label>
        </td>
          <td class="celldatakey">
        <input type="text" value=" " name="MIR-SELF-DSCLSRE-DT" id="MIR-SELF-DSCLSRE-DT" stype="Date"   onfocus="enterField(this)" onblur="validateField(this)"/>
                </td>
                <td class="celldatakeylabel">
        <label for="MIR-TOT-REQIR-AMT ">Total Amount to be paid:</label>
        </td>
        <td class="celldatakey">
        <input type="text" value=" " name="MIR-TOT-REQIR-AMT" id="MIR-TOT-REQIR-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20"/>
        </td>
          </tr>

          <tr>
            <td class="celldatakeylabel">
        <label for="MIR-APCHD-LOC-CD">Approached Location:</label>
        </td>
        <td class="celldatakey">
        <select name="MIR-APCHD-LOC-CD" id="MIR-APCHD-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
                </td>
                <td class="celldatakeylabel">
        <label for="MIR-PREM-DUE-MO-NUM">Premium Due Month:</label>
        </td>
        <td class="celldatakey">
        <input type="text" value=" " name="MIR-PREM-DUE-MO-NUM" id="MIR-PREM-DUE-MO-NUM" stype="Text" maxlength="7" onfocus="enterField(this)" onblur="validateField(this)"/>
                </td>
          </tr>

          <tr>
               <td class="celldatakeylabel">
         <label for="MIR-UWG-RSLT-CD">Underwriting Result:</label>
         </td>
         <td class="celldatakey">
         <!-- ATU668 Changes starts here -->
         <!--
         <select name="MIR-UWG-RSLT-CD" id="MIR-UWG-RSLT-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
          -->
         <select name="MIR-UWG-RSLT-CD" id="MIR-UWG-RSLT-CD" size="1" stype="Selection" onfocus="enterField(this)" onchange="UwgResultCheck()"></select>
         <!-- ATU668 Changes ends here -->
         </td>
         <td class="celldatakeylabel">
         <label for="MIR-PREM-DUE-QTY">Number of Premiums Due:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-PREM-DUE-QTY" id="MIR-PREM-DUE-QTY" stype="Number" elength="03" onkeypress ="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)"/>
                 </td>
          </tr>

          <tr>
               <td class="celldatakeylabel">
         <label for="MIR-EXCL-INFO-TXT">Exclusion Information:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-EXCL-INFO-TXT" id="MIR-EXCL-INFO-TXT" stype="Text" maxlength="30"   onfocus="enterField(this)"/>
         </td>
         <!-- NWLLR3 Changes starts here -->
         <!-- <td class="celldatakeylabel">
         <label for="MIR-DV-EXP-DT">Expiry Date:</label>
         </td>
         <td class="celldatakey">
         <span id="MIR-DV-EXP-DT" stype="Date" elength="10"   displayonly="yes">MIR-DV-EXP-DT</span></td> -->
         <td class="celldatakeylabel">
         <label for="MIR-REINST-XPRY-DT">Expiry Date:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-REINST-XPRY-DT" id="MIR-REINST-XPRY-DT" stype="Date"   onfocus="enterField(this)" onblur="validateField(this)"/>
         </td>
         <!-- NWLLR3 Changes ends here -->
          </tr>

          <tr>
              <td class="celldatakeylabel">
         <label for="MIR-UWG-DT">Underwriting Date:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-UWG-DT" id="MIR-UWG-DT" stype="Date"   onfocus="enterField(this)" onblur="validateField(this)"/>
         </td>
         <td class="celldatakeylabel">
         <label for="MIR-REINST-DT">Reinstatement Date:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-REINST-DT" id="MIR-REINST-DT" stype="Date"   onfocus="enterField(this)" onblur="validateField(this)"/>
                 </td>
        </tr>

         <!-- C13892 Changes starts here -->
         <tr>
         <td class="celldatakeylabel">
         <label for="MIR-LAPS-DT">Lapse Date:</label>
         </td>
         <td class="celldatakey">
         <input type="text" value=" " name="MIR-LAPS-DT" id="MIR-LAPS-DT" stype="Date"   onfocus="enterField(this)" onblur="validateField(this)"/>

        </tr>
