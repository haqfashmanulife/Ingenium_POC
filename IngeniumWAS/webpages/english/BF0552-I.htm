<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0552-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-INSRD-CLI-NM">Insured Name:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-DV-INSRD-CLI-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-CLI-NM</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PREV-UPDT-DT">Date Last Changed:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PREV-UPDT-DT" stype="Date" displayonly="yes">MIR-PREV-UPDT-DT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-ID">Client Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ID" stype="Text" displayonly="yes">MIR-CLI-ID</span>
                    </td>
                    <td class="celldisplaykeylabel" />
                    <td class="celldisplaykey"></td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Basic Insurance Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-OINS-INFC-PEND-IND">Other Insurance Inforce / Pending:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-INFC-PEND-IND" id="MIR-OINS-INFC-PEND-IND" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-SPOUS-INS-AMT">Spouse Insured Amount:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-SPOUS-INS-AMT" id="MIR-CLI-SPOUS-INS-AMT" stype="Currency" elength="16" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-INS-REFUS-IND">Ever Had Insurance Refused / Offered with Extra Premium:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-INS-REFUS-IND" id="MIR-CLI-INS-REFUS-IND" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-INS-REFUS-YR">Year Refused:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-INS-REFUS-YR" id="MIR-CLI-INS-REFUS-YR" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" size="20" />
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry" genrows="6">
                <tr>
                    <td class="celldataentryheading" colspan="5">Life Insurance Inforce / Pending</td>
                </tr>
                <tr>
                    <td class="celldataentryheading">
                        <label for="MIR-CLI-OINS-CO-NM-T[1]">Company Name</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-OINS-INFC-PEND-CD-T[1]">Inforce / Pending</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-OINS-THIS-CO-IND-T[1]">Insurance with This Company</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-OINS-BUS-PERS-CD-T[1]">Business / Personal</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-CLI-OINS-ISS-YR-T[1]">Year Issued</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-OINS-CO-NM-T[]" id="MIR-CLI-OINS-CO-NM-T[]" stype="Text" maxlength="15" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-INFC-PEND-CD-T[]" id="MIR-OINS-INFC-PEND-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-THIS-CO-IND-T[]" id="MIR-OINS-THIS-CO-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-BUS-PERS-CD-T[]" id="MIR-OINS-BUS-PERS-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-OINS-ISS-YR-T[]" id="MIR-CLI-OINS-ISS-YR-T[]" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" size="20" />
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry" genrows="6">
                <tr>
                    <td class="celldataentryheading" colspan="4">Life Insurance Inforce / Pending (Continued)</td>
                </tr>
                <tr>
                    <td class="celldataentryheading">
                        <label for="MIR-OINS-INS-TYP-CD-T[1]">Line of Business</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-CLI-OINS-TOT-AMT-T[1]">Total Insurance Amount</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-CLI-OINS-ADB-AMT-T[1]">ADB Amount</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-OINS-WP-INFC-IND-T[1]">Waiver of Premium</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-INS-TYP-CD-T[]" id="MIR-OINS-INS-TYP-CD-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-OINS-TOT-AMT-T[]" id="MIR-CLI-OINS-TOT-AMT-T[]" stype="Currency" elength="16" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" />
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-OINS-ADB-AMT-T[]" id="MIR-CLI-OINS-ADB-AMT-T[]" stype="Currency" elength="14" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" />
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OINS-WP-INFC-IND-T[]" id="MIR-OINS-WP-INFC-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry" genrows="2">
                <tr>
                    <td class="celldataentryheading" colspan="3">Refused / Substandard Insurance Information</td>
                </tr>
                <tr>
                    <td class="celldataentryheading">
                        <label for="MIR-INS-REFUS-CO-1-NM-T[1]">Company Name</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-CLI-REFUS-CO-1-IND-T[1]">Insurance with This Company</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-REFUS-REASN-1-TXT-T[1]">Reason Refused / Issued Substandard</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-INS-REFUS-CO-1-NM-T[]" id="MIR-INS-REFUS-CO-1-NM-T[]" stype="Text" maxlength="15" onfocus="enterField(this)" size="20" />
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-REFUS-CO-1-IND-T[]" id="MIR-CLI-REFUS-CO-1-IND-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-REFUS-REASN-1-TXT-T[]" id="MIR-REFUS-REASN-1-TXT-T[]" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
