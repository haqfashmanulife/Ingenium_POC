<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1785Key-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="splitBranch('MIR-BNK-BR-ID');onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="updateBranch('Branch'); return(onSubmit());">
            <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" value="" name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" jpnbranch="Branch" jpnsubbranch="SubBranch" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CVG-NUM">Coverage Number:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CVG-NUM" id="MIR-CVG-NUM" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CIA-EFF-DT" id="MIR-CIA-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-REASN-CD">Surrender Reason:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CIA-REASN-CD" id="MIR-CIA-REASN-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-SRC-DEST-CD">Destination of Surrender Amount:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CIA-SRC-DEST-CD" id="MIR-CIA-SRC-DEST-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-LOAD-AMT">Surrender Charge:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CIA-LOAD-AMT" id="MIR-CIA-LOAD-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-LOAD-FORCE-IND">Surrender Charge Override:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-CIA-LOAD-FORCE-IND" id="MIR-CIA-LOAD-FORCE-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CIA-TAXWH-IND">Bypass Tax Withholding Process:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-CIA-TAXWH-IND" id="MIR-CIA-TAXWH-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-SUPRES-CNFRM-IND">Suppress Confirmation Statement:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-REDC-FACE-IND">Override Automatic Face Reduction:</label>
                    </td>
                    <td class="celldatakey"><input type="checkbox" value="Y" name="MIR-DV-REDC-FACE-IND" id="MIR-DV-REDC-FACE-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                    </td>
                    <td class="celldatakey">
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">Bank Account Information</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-HLDR-NM">Account Holder Name:</label>
                    </td>
                    <td colspan="3" class="celllabelleftalign">
                        <input type="text" value=" " name="MIR-BNK-ACCT-HLDR-NM" id="MIR-BNK-ACCT-HLDR-NM" stype="Text" maxlength="50" onfocus="enterField(this)" size="50" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-TYP-CD">Account Type:</label>
                    </td>
                    <td class="celllabelleftalign">
                        <select name="MIR-BNK-ACCT-TYP-CD" id="MIR-BNK-ACCT-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ID">Bank ID:</label>
                    </td>
                    <td class="celllabelleftalign">
                        <input type="text" value=" " name="MIR-BNK-ID" id="MIR-BNK-ID" stype="Text" maxlength="4" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="Branch">Branch ID:</label>
                    </td>
                    <td class="celllabelleftalign">
                        <input type="text" value=" " name="Branch" id="Branch" stype="Text" maxlength="3" onfocus="enterField(this)" size="20" branch="MIR-BNK-BR-ID" jpnsubbranch="SubBranch" onblur="updateBranch('Branch')" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="SubBranch">Sub Branch:</label>
                    </td>
                    <td class="celllabelleftalign">
                        <input type="text" value=" " name="SubBranch" id="SubBranch" stype="text" maxlength="2" onfocus="enterField(this)" size="20" branch="MIR-BNK-BR-ID" jpnbranch="Branch" onblur="updateBranch('SubBranch')" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-ACCT-ID">Bank Account Number:</label>
                    </td>
                    <td class="celllabelleftalign" colspan="3">
                        <input type="text" value=" " name="MIR-BNK-ACCT-ID" id="MIR-BNK-ACCT-ID" stype="Text" maxlength="17" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/JapaneseBranch.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
