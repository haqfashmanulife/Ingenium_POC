<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9C91SM-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad();SubInpTrimPolicy()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                 </tr>
                 <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-PBRQ-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-PBRQ-EFF-DT" stype="Date" displayonly="yes">MIR-PBRQ-EFF-DT</span>
                    </td>
                 </tr>
                 <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-POL-FUT-ACTV-TYP-CD">Activity Type:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-DV-POL-FUT-ACTV-TYP-CD" stype="Text" displayonly="yes">MIR-DV-POL-FUT-ACTV-TYP-CD</span>
                    </td>
               </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-FUT-ACTV-STAT-CD">Activity Status:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-POL-FUT-ACTV-STAT-CD" stype="Text" displayonly="yes">MIR-POL-FUT-ACTV-STAT-CD</span>
                    </td>
                </tr>
            </table>
                   <table class="tabledatakey">
                <tr>
                   <td class="celldataentryheading" colspan="4">Kanji Name</td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-SUR-NM">Payee's Last Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-SUR-NM" id="MIR-PAYE-SUR-NM" stype="Text" maxlength="25"   onfocus="enterField(this)"/>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-GIV-NM">Payee's First Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-GIV-NM" id="MIR-PAYE-GIV-NM" stype="Text" maxlength="25"   onfocus="enterField(this)"/>
                    </td>
                </tr>

                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-CO-NM">Company Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-CO-NM" id="MIR-PAYE-CO-NM" stype="Text" maxlength="50"   onfocus="enterField(this)"/>
                    </td>
                </tr>
            </table>
            <br />

            <table class="tabledatakey">
                <tr>
                    <td class="celldataentryheading" colspan="4">Address</td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ADDR-LOC-CD">Address Code:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LOC-CD" id="MIR-CLI-ADDR-LOC-CD" stype="Text" maxlength="8"   onfocus="enterField(this)"/>
                    </td>
                </tr>
                <tr>
                   <td class="celldatakeylabel">
                        <label for="MIR-CLI-PSTL-CD">Postal Code:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-CLI-PSTL-CD" stype="Text" displayonly="yes">MIR-CLI-PSTL-CD</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-CLI-ADDR">Kanji Address:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-DV-CLI-ADDR" stype="Text" displayonly="yes">MIR-DV-CLI-ADDR</span>
                    </td>
                    <td class="celldatakeylabel">
                         <label for="MIR-CLI-ADDR-ADDL-TXT">Samakata-bu:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-ADDR-ADDL-TXT" id="MIR-CLI-ADDR-ADDL-TXT" stype="Text" maxlength="60"   onfocus="enterField(this)"/>
                    </td>
                </tr>
            </table>
                <br />

            <table class="tabledatakey">
                <tr>
                    <td class="celldataentryheading" colspan="4">Bank Detail</td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-ID">Bank Number:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-ID" id="MIR-BNK-ID" stype="Text" maxlength="4"   onfocus="enterField(this)"/>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-NM">Bank Name:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-NM" stype="Text" displayonly="yes">MIR-BNK-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-BR-ID">Branch Number:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" stype="Text" maxlength="3"   onfocus="enterField(this)"/>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-BR-NM">Branch Name:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-BR-NM" stype="Text" displayonly="yes">MIR-BNK-BR-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-ACCT-TYP-CD">Account Type:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-BNK-ACCT-TYP-CD" id="MIR-BNK-ACCT-TYP-CD" stype="Selection" maxlength="3"   onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-ACCT-ID">Bank Account Number:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-ACCT-ID" id="MIR-BNK-ACCT-ID" stype="Text" maxlength="7"   onfocus="enterField(this)"/>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-ACCT-HLDR-NM">Account Holder Name:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-ACCT-HLDR-NM" id="MIR-BNK-ACCT-HLDR-NM" stype="Text" maxlength="50"
                               onkeypress="KanaKeyCheck()"
                               onchange="onlyKatakana()"
                               onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            <br />


            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
    <script src="../js/Policytrim.js"></script>
</html>
