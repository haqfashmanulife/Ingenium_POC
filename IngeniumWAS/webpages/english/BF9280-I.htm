<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9280-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PSTL-CD">Postal code:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value="" name="MIR-PSTL-CD" id="MIR-PSTL-CD" stype="Text" maxlength="09" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            <br />
            <br />
            <br />
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-KJ-PREFCT-TXT">Prefecture:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value="" name="MIR-KJ-PREFCT-TXT" id="MIR-KJ-PREFCT-TXT" stype="Text" maxlength="11" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-KJ-CITY-TXT">City:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value="" name="MIR-KJ-CITY-TXT" id="MIR-KJ-CITY-TXT" stype="Text" maxlength="30" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-KJ-NGHBRHD-TXT">Town/Area:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value="" name="MIR-KJ-NGHBRHD-TXT" id="MIR-KJ-NGHBRHD-TXT" stype="Text" maxlength="30" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
