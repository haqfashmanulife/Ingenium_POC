<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>BF9081-I</title>
<link rel="stylesheet" type="text/css" href="../english/Ingenium.css"/>
</head>
<body class="bodyws">
<form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">

<input type="hidden" name="action" id="action" stype="Hidden"/>


<table width="100%" id="table1" class="tabledatakey">
	<tr>
            <td class="celldatakeylabel" width="25%">
		<label for="MIR-BNFT-CAT-CD">Benefit Category:</label>
            </td>
            <td width="25%">
                <select name="MIR-BNFT-CAT-CD" id="MIR-BNFT-CAT-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes">
                </select>
            </td>
            <td class="celldatakeylabel" width="25%">
		<label for="MIR-BNFT-NM-ID">Benefit Name:</label>
            </td>
		<td width="25%">
                   <select name="MIR-BNFT-NM-ID" id="MIR-BNFT-NM-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes">
                   </select>
            </td>
	</tr>
</table>
</form>
</body>
