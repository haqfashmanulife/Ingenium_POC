<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9B30-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-CLI-NM">Owner Name:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-DV-CLI-NM" stype="Text" displayonly="yes">MIR-DV-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">Policy ID:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">Suffix:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-LOAN-SEQ-NUM">Sequence Number:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-LOAN-SEQ-NUM" stype="Text" displayonly="yes">MIR-POL-LOAN-SEQ-NUM</span>
                    </td>
                    <td class="celldisplaykeylabel">
                    <!-- Q06039 changes begin -->
                        <label for="MIR-POL-LOAN-EFF-DT">APL Date:</label>
                    <!-- Q06039 changes end -->
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-LOAN-EFF-DT" stype="Date" displayonly="yes">MIR-POL-LOAN-EFF-DT</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-POL-LOAN-STAT-CD">Status:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-LOAN-STAT-CD" stype="Text" displayonly="yes">MIR-POL-LOAN-STAT-CD</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-POL-LOAN-TRXN-CD">Category:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-LOAN-TRXN-CD" stype="Text" displayonly="yes">MIR-POL-LOAN-TRXN-CD</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-LOAN-PD-DUR">Paid duration:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-LOAN-PD-DUR" stype="Text" elength="5" displayonly="yes">MIR-LOAN-PD-DUR</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-LOAN-INCR-DECR-AMT">APL premium:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-LOAN-INCR-DECR-AMT" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-LOAN-INCR-DECR-AMT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-APL-DPOS-QTY">Number of APL deposits:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-APL-DPOS-QTY" stype="Text" elength="03" displayonly="yes">MIR-APL-DPOS-QTY</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-LOAN-INT-AMT">Interest amount (Capitalization):</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-LOAN-INT-AMT" stype="Currency" elength="15" displayonly="yes">MIR-LOAN-INT-AMT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-LOAN-BAL-AMT">Balance of APL:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-LOAN-BAL-AMT" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-LOAN-BAL-AMT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-LOAN-PRCES-DT">Process Date:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-LOAN-PRCES-DT" stype="Date" displayonly="yes">MIR-LOAN-PRCES-DT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-PREV-UPDT-USER-ID">User ID:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PREV-UPDT-USER-ID" stype="Text" elength="8" displayonly="yes">MIR-PREV-UPDT-USER-ID</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-NXT-INT-CAP-YM">Next interest capitalization Year/Month:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-NXT-INT-CAP-YM" stype="Text" elength="7" displayonly="yes">MIR-NXT-INT-CAP-YM</span>
                    </td>
                </tr>

            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
