<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1590-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-INT-RT-ID">Plan:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-INT-RT-ID" stype="Text" displayonly="yes">MIR-INT-RT-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-INT-RT-MAX-AMT">Maximum Amount:</label>
                    </td>
                    <td class="celldisplaykey" colspan="2">
                        <span id="MIR-INT-RT-MAX-AMT" stype="Currency" elength="13" decimals="0" displayonly="yes">MIR-INT-RT-MAX-AMT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-INT-RT-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-INT-RT-EFF-DT" stype="Date" displayonly="yes">MIR-INT-RT-EFF-DT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-DPOS-TRM-MO-DUR">Deposit Term:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-DPOS-TRM-MO-DUR" stype="Text" displayonly="yes">MIR-DPOS-TRM-MO-DUR</span>
                              months
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-DPOS-TRM-DY-DUR" stype="Text" displayonly="yes">MIR-DPOS-TRM-DY-DUR</span>
                              days
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="4">Interest Rate</td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-INIT-DPOS-INT-PCT"> Initial Deposit:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-INIT-DPOS-INT-PCT" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-INIT-DPOS-INT-PCT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-ROLOVR-INT-PCT"> Rollover Deposit:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-ROLOVR-INT-PCT" stype="Percent" elength="7" decimals="4" signed="yes" displayonly="yes">MIR-ROLOVR-INT-PCT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-MKTVAL-ADJ-INT-PCT"> Market Value Adjustment:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-MKTVAL-ADJ-INT-PCT" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-MKTVAL-ADJ-INT-PCT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-ASSUMED-INT-PCT"> Assumed Interest Rate:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-ASSUMED-INT-PCT" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-ASSUMED-INT-PCT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-AVG-ASSET-YLD-PCT"> Average Asset Yield Rate:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-AVG-ASSET-YLD-PCT" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-AVG-ASSET-YLD-PCT</span>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
