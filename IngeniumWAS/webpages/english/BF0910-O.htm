<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0910-O</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />

    <body class="bodyws" onLoad="onLoad()">

                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-AGT-ID" stype="Text" displayonly="yes">MIR-AGT-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-USTM-EFF-YR">Tax Year:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-USTM-EFF-YR" stype="Year" displayonly="yes">MIR-USTM-EFF-YR</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-USTM-EFF-DT">Effective Date:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-USTM-EFF-DT" stype="Date" displayonly="yes">MIR-USTM-EFF-DT</span>
                    </td>
                    <td class="celldisplaykeylabel">

                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CLI-TAX-ID">Tax Identification Number:</label>

                    <td class="celldisplaykey">
                        <span id="MIR-CLI-TAX-ID" stype="Text" displayonly="yes">MIR-CLI-TAX-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">

                    <td class="celldisplaykey">
                        <span id="MIR-CLI-ID" stype="Text" displayonly="yes">MIR-CLI-ID</span>

            <table class="tabledatadisplay">
