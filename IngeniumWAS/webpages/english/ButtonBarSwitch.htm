<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarSwitch</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="changeButton" id="changeButton" src="../english/images/but_chng.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item','ACTION_CHNGMULTI')" width="72" height="27" tabindex="6" alt="Change"/>
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="calculateButton" id="calculateButton" src="../english/images/but_calculate.gif" onclick="onClickedActionButton('ACTION_CALCULATE')" width="72" height="27" tabindex="4" alt="Calculate" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../english/images/but_can.gif" onclick="onClickedActionButton('ACTION_BACK')" width="72" height="27" tabindex="5" alt="Cancel" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
            </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
</html>
