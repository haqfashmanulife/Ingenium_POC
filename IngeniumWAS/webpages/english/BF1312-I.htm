<html>
    <head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1312-I</title>
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-ID-ASIGN-IND">Use automatic client number assignment:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-CLI-ID-ASIGN-IND" id="MIR-CLI-ID-ASIGN-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-CLI-ID-TRY-NUM">Maximum Client Number Attempts:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-CLI-ID-TRY-NUM" id="MIR-MAX-CLI-ID-TRY-NUM" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-CLI-ON-CVG-QTY">Maximum Clients/Coverage:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-CLI-ON-CVG-QTY" id="MIR-MAX-CLI-ON-CVG-QTY" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-CLI-ON-POL-QTY">Maximum
      Non-Insured Clients/Policy:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-CLI-ON-POL-QTY" id="MIR-MAX-CLI-ON-POL-QTY" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-CLI-SRCH-QTY">Maximum Search List Size:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-CLI-SRCH-QTY" id="MIR-MAX-CLI-SRCH-QTY" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-PERS-MDRT-AMT">Maximum Personal MDRT Credits:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-PERS-MDRT-AMT" id="MIR-MAX-PERS-MDRT-AMT" stype="Currency" elength="15" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-DV-MAX-POL-CVG-QTY">Maximum Coverages/Policy:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-MAX-POL-CVG-QTY" id="MIR-DV-MAX-POL-CVG-QTY" stype="Text" maxlength="2" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-MIB-COMUN-TYP-CD">Type of Connection to MIB:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-MIB-COMUN-TYP-CD" id="MIR-MIB-COMUN-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-SESN-XPRY-DUR">Session Expiry Period:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-SESN-XPRY-DUR" id="MIR-SESN-XPRY-DUR" stype="Text" maxlength="3" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesEnglish.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
