<html>
    <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../english/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarListsPFCP</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="polDetailButton" id="polDetailButton" src="../english/images/but_polDetail.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_POLD')" width="72" height="27" tabindex="1" alt="Retrieve Policy Details" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="fndDetailButton" id="fndDetailButton" src="../english/images/but_fndDetail.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_FNDD')" width="72" height="27" tabindex="2" alt="Retrieve Fund Details" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="cancelButton" id="cancelButton" src="../english/images/but_can.gif" onclick="onClickedActionButton('ACTION_CANCEL')" width="72" height="27" tabindex="3" alt="Cancel" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../english/images/but_previous.gif" onclick="onClickedActionButton('ACTION_PREV')" width="72" height="27" tabindex="5" alt="Previous Page" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
           </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
</html>
