<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>Signatures/Agent Info</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body onload="onLoadCustom()" class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-MIB-SIGN-CD">医療情報局署名確認済み</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="radio" name="MIR-POL-MIB-SIGN-CD" value="Y" stype="YesNo" onclick="onYesNoUa('Yes')" onfocus="saveValue();enterField(this)" />
                        はい   
        
                        <input type="radio" name="MIR-POL-MIB-SIGN-CD" value="N" stype="YesNo" onclick="onYesNoUa('No')" onfocus="saveValue();enterField(this)" />
                        いいえ
		
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-APP-SIGN-IND">申込書署名（捺印）確認済み</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="radio" id="signaturesReceived" name="MIR-POL-APP-SIGN-IND" value="Y" stype="YesNo" onclick="onClickSigsReceived(this)" onfocus="saveValue();enterField(this)" />
                        はい   
        
                        <input type="radio" id="signaturesReceived" name="MIR-POL-APP-SIGN-IND" value="N" stype="YesNo" onclick="onClickSigsReceived(this)" onfocus="saveValue();enterField(this)" />
                        いいえ
		
                    </td>
                </tr>
                <tr id="dateSignedSection">
                    <td class="celllabelrightalign">署名（捺印）日:</td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-POL-APP-SIGN-DT" id="MIR-POL-APP-SIGN-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-POL-ISS-LOC-CD">保険証券発行地:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-POL-ISS-LOC-CD" stype="Text" displayonly="yes">MIR-POL-ISS-LOC-CD</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="AgentSplitCommission">契約には募集手数料の適用あり</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="radio" name="AgentSplitCommission" value="Y" stype="YesNo" onclick="onClickSplitCommissions(this);onYesNoUa('Yes')" onfocus="saveValue();enterField(this)" />
                        はい   
                        
                        <input type="radio" name="AgentSplitCommission" value="N" stype="YesNo" onclick="onClickSplitCommissions(this);onYesNoUa('No')" onfocus="saveValue();enterField(this)" />
                        いいえ
                
                    </td>
                </tr>
            </table>
            <table class="tabledataentry" genrows="3" keyfield="0" id="SplitCommissionTable">
                <tr>
                    <td class="celldataentryheading">
                        <label for="MIR-DV-AGT-CLI-NM-T[1]">募集人名</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-AGT-ID-T[1]">募集人ID</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-POL-AGT-SHR-PCT-T[1]">募集人シェア</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="AgentSearchLink-T[1]" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">
                        <span id="MIR-DV-AGT-CLI-NM-T[]" stype="Text" displayonly="yes">MIR-DV-AGT-CLI-NM-T[]</span>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-AGT-ID-T[]" id="MIR-AGT-ID-T[]" stype="Text" maxlength="6" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" name="MIR-POL-AGT-SHR-PCT-T[]" id="MIR-POL-AGT-SHR-PCT-T[]" stype="Percent" elength="5" decimals="2" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                    <td class="celllabeldataentry">
                        <a name="AgentSearchLink-T[]" href="a" action="GoToAgentSearch" index="1" onclick="onAction();return(false);" onfocus="enterField(this)">募集人検索</a>
                    </td>
                </tr>
            </table>
            <div id="agentIdTable">
                <p>
                    当契約申込には、契約者    
 <span class="fieldbold" id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>    
のクライアントプロフィールに基づき、  
                    <span class="fieldbold" id="MIR-DV-AGT-NM" stype="Text" displayonly="yes">MIR-DV-AGT-NM</span>  
                    が募集人として自動的に登録されました 
 
                </p> 
                <table class="tabledataentry"> 
                    <tr> 
                        <td class="celldataentryheading"> 
                            <label for="MIR-DV-SERV-AGT-NM">保全担当募集人名</label> 
                        </td> 
                        <td class="celldataentryheading"> 
                            <label for="MIR-SERV-AGT-ID">募集人ID</label> 
                        </td> 
                        <td class="celldataentryheading"> 
                            <label for="MIR-SERV-BR-ID">所属支店</label> 
                        </td> 
                        <td class="celldataentryheading" /> 
                    </tr> 
                    <tr> 
                        <td class="celllabeldataentry"> 
                            <span id="MIR-DV-SERV-AGT-NM" stype="Text" displayonly="yes">MIR-DV-SERV-AGT-NM</span> 
                        </td> 
                        <td class="celllabeldataentry"> 
                            <input type="text" value=" " name="MIR-SERV-AGT-ID" id="MIR-SERV-AGT-ID" stype="Text" maxlength="6" onfocus="enterField(this)" /> 
                        </td> 
                        <td class="celllabeldataentry"> 
                            <select name="MIR-SERV-BR-ID" id="MIR-SERV-BR-ID" size="1" stype="Selection" onfocus="enterField(this)" /> 
                        </td> 
                        <td class="celllabeldataentry"> 
                            <a name="AgentSearchLink" href="a" action="GoToAgentSearchService" onclick="onAction();return(false);" onfocus="enterField(this)">募集人検索</a> 
                        </td> 
                    </tr> 
                </table> 
            </div> 
            <br /> 
            <table class="tabledataentry"> 
                <tr> 
                    <td class="celllabelrightalign"> 
                        <label for="MIR-POL-INS-PURP-CD">保険目的:</label> 
                    </td> 
                    <td class="celllabeldataentry"> 
                        <select name="MIR-POL-INS-PURP-CD" id="MIR-POL-INS-PURP-CD" size="1" stype="Selection" onfocus="enterField(this)" /> 
                    </td> 
                </tr> 
                <tr> 
                    <td class="celllabelleftalign"> 
                        <label for="MIR-POL-COMNT-TXT">追記:</label> 
                    </td> 
                    <td class="celllabeldataentry"> 
                        <input type="text" value=" " name="MIR-POL-COMNT-TXT" id="MIR-POL-COMNT-TXT" stype="Text" maxlength="50" size="50" onfocus="enterField(this)" onblur="validateField(this)" /> 
                    </td> 
                </tr> 
            </table> 
        </form> 
    </body> 
    <script src="../js/ActionHandlers.js"></script> 
    <script src="../js/MessageFunctions.js"></script> 
    <script src="../js/MessagesJapanese.js"></script> 
    <script src="../js/ClientLevelEdits.js"></script> 
    <script src="../js/AppSignatures.js"></script> 
    <script src="../js/GlobalUserMethods.js"></script> 
</html>
