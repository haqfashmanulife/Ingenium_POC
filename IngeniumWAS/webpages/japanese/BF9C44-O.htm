                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">枝番:</label>
                    </td>

                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">

                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CVG-NUM" stype="Text" displayonly="yes">MIR-CVG-NUM</span>

                    </td>
               </tr>

   <br />

                    <td class="celldisplayheading">
