<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF5096-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-BNK-ACCT-ID">口座番号:</label>
                <input type="text" value=" " name="MIR-BNK-ACCT-ID" id="MIR-BNK-ACCT-ID" stype="Text" maxlength="17" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-BNK-BR-ID">支店番号:</label>
                <input type="text" value=" " name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" stype="Text" maxlength="5" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-BNK-ID">銀行（金融機関）番号:</label>
                <input type="text" value=" " name="MIR-BNK-ID" id="MIR-BNK-ID" stype="Text" maxlength="4" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-PAC-DRW-IDT-NUM">保険料口座振替日:</label>
                <input type="text" value=" " name="MIR-PAC-DRW-IDT-NUM" id="MIR-PAC-DRW-IDT-NUM" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-PAC-DRW-SEQ-NUM">シーケンスナンバー:</label>
                <input type="text" value=" " name="MIR-PAC-DRW-SEQ-NUM" id="MIR-PAC-DRW-SEQ-NUM" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-PAC-DRW-RETRN-CD">口座振替リバース事由:</label>
                <select name="MIR-PAC-DRW-RETRN-CD" id="MIR-PAC-DRW-RETRN-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            </p>
        </form>
    </body>
