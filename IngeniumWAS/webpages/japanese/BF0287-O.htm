                    </td>

                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-SBSDRY-CO-ID">子会社:</label>
                    </td>

                        <span id="MIR-SBSDRY-CO-ID" stype="Text" displayonly="yes">MIR-SBSDRY-CO-ID</span>

                    <td class="celldisplaykeylabel">

                        <span id="MIR-LBILL-EFF-DT" stype="Date" displayonly="yes">MIR-LBILL-EFF-DT</span>

                        <span id="MIR-TOT-CRNT-SNDRY-AMT" stype="Currency" elength="17" displayonly="yes">MIR-TOT-CRNT-SNDRY-AMT</span>
