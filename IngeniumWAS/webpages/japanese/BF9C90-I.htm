<html>

        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">枝番:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PBRQ-EFF-DT">処理日:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PBRQ-EFF-DT" id="MIR-PBRQ-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-POL-FUT-ACTV-TYP-CD">処理タイプ:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-POL-FUT-ACTV-TYP-CD" id="MIR-DV-POL-FUT-ACTV-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
                    </td>
			   </tr>
<!-- 27549A CHANGE STARTS HERE -->
                <tr>					
                    <td class="celldatakeylabel">
                      <label for="MIR-ATO-NOT-APPL-IND">ATO非該当:</label>
			        </td>
			        <td class="celldatakey">
	                  <input type="checkbox" value="Y" name="MIR-ATO-NOT-APPL-IND" id="MIR-ATO-NOT-APPL-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
				</tr>	
<!-- 27549A CHANGE ENDS HERE -->			   
            </table>
        </form>
