<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>Add a New Business Process - Output</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplaylabel">
                        <p class="celldisplaylabel">
                            <label for="MIR-ETBL-VALU-ID">ビジネスフローID</label><label for="MIR-ETBL-VALU-ID">:</label>
                        </p>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-ETBL-VALU-ID" stype="Text" displayonly="yes">MIR-ETBL-VALU-ID</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-ETBL-DESC-TXT">ビジネスプロセス名:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-ETBL-DESC-TXT" stype="Text" displayonly="yes">MIR-ETBL-DESC-TXT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-ETBL-LANG-CD">言語:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-ETBL-LANG-CD" stype="Text" displayonly="yes">MIR-ETBL-LANG-CD</span>
                    </td>
                    <td class="celldisplaylabel" />
                    <td class="celldisplay" />
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-SECUR-CLAS-ID">セキュリティクラス:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-SECUR-CLAS-ID" stype="Text" displayonly="yes">MIR-SECUR-CLAS-ID</span>
                    </td>
                    <td class="celldisplaylabel" />
                    <td class="celldisplay" />
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-BPF-SECUR-GR-CD">セキュリティグループ:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BPF-SECUR-GR-CD" stype="Text" displayonly="yes">MIR-BPF-SECUR-GR-CD</span>
                    </td>
                    <td class="celldisplaylabel" />
                    <td class="celldisplay" />
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-BPF-SECUR-LVL-NUM">セキュリティレベル:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BPF-SECUR-LVL-NUM" stype="Number" elength="3" decimals="0" displayonly="yes">MIR-BPF-SECUR-LVL-NUM</span>
                    </td>
                    <td class="celldisplaylabel" />
                    <td class="celldisplay" />
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-MSG-SECUR-CLAS-CD">メッセージクラス:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-MSG-SECUR-CLAS-CD" stype="Text" displayonly="yes">MIR-MSG-SECUR-CLAS-CD</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-BPF-SECUR-AUD-IND">変更記録を参照する:</label>

                    <td class="celldisplay">
                        <input type="checkbox" name="MIR-BPF-SECUR-AUD-IND" id="MIR-BPF-SECUR-AUD-IND" stype="Indicator" value="Y" disabled="yes" />

                <tr>
                    <td class="celldisplaylabel" colspan="2">
                        <a name="AddOtherLanguageDescriptionsLink" href="a" action="AddOtherLanguageDescriptions" onclick="onAction();return(false);" onfocus="enterField(this)">ビジネスプロセス名の他言語記述追加</a>

                    <td class="celldisplaylabel" colspan="2">
                        <a name="AddOtherSecurityClassesLink" href="a" action="AddOtherSecurityClasses" onclick="onAction();return(false);" onfocus="enterField(this)">セキュリティクラスを追加指定</a>
                    </td>
                </tr>
            </table>
        </form>
    </body>

    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
