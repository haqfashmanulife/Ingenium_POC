function onLoad()

{

  // show more link if there are more than 5 messages

  if ((document.getElementById("MESSAGES-T[6]").outerText != "") || (document.getElementById("MORE-MESSAGES-IND").value == "Y"))
  {
    document.getElementById("More").style.display = "";
  }

}

// If MessageFrame receives focus, force it to go to the Content Frame; otherwise
