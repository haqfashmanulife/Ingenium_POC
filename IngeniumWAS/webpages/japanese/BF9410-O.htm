<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>BF9410-O</title>
<link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
</head>
<body class="bodyws">
<form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
    <input type="hidden" name="index" id="index" stype="Hidden" />
    <input type="hidden" name="action" id="action" stype="Hidden" />
    <table>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-MCL-GL-NUM-TXT">GL勘定番号:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-MCL-GL-NUM-TXT" stype="Text" displayonly="yes">MIR-DV-MCL-MCL-GL-NUM-TXT</span>
            </td>
            <td class="celldisplaykeylabel">
                <label for="MIR-ACCT-YR">年:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-ACCT-YR" stype="Year" displayonly="yes">MIR-ACCT-YR</span>
            </td>
        </tr>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-OPER-CAT-CD-TXT">業務区分:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-OPER-CAT-CD-TXT" stype="Text" displayonly="yes">MIR-DV-OPER-CAT-CD-TXT</span>
            </td>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-DT-MTH-TXT">月:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-DT-MTH-TXT" stype="Text" displayonly="yes">MIR-DV-DT-MTH-TXT</span>
            </td>
        </tr>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-MCL-GL-NM-TXT">GL勘定名:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-MCL-GL-NM-TXT" stype="Text" displayonly="yes">MIR-DV-MCL-GL-NM-TXT</span>
            </td>
        </tr>
    </table>
    <br />
    <table class="tabledisplay" genrows="0" >
        <tr>
            <td class="celldisplayheading"><label for="MIR-DV-DY-NUM-T[1]">日</label></td>
            <td class="celldisplayheading"><label for="MIR-ACCT-BAL-DR-AMT-T[1]">借方</label></td>
            <td class="celldisplayheading"><label for="MIR-ACCT-BAL-CR-AMT-T[1]">貸方</label></td>
        </tr>
        <tr>
            <td class="celldisplay"><span id="MIR-DV-DY-NUM-T[]" stype="Text" displayonly="yes">MIR-DV-DY-NUM-T[]</span></td>
            <td class="celldisplay"><span id="MIR-ACCT-BAL-DR-AMT-T[]" stype="Currency" elength="17" displayonly="yes">MIR-ACCT-BAL-DR-AMT-T[]</span></td>
            <td class="celldisplay"><span id="MIR-ACCT-BAL-CR-AMT-T[]" stype="Currency" elength="17" displayonly="yes">MIR-ACCT-BAL-CR-AMT-T[]</span></td>
        </tr>
    </table>
