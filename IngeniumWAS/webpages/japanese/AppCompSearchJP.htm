<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppCompSearchJP</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="celldatakey">
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>通常表記の氏名を検索する</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KA" stype="YesNo" onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>カタカナ表記の氏名を検索する</b></td>
				  </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ENTR-CO-NM">会社名:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-ENTR-CO-NM" id="MIR-CLI-ENTR-CO-NM" stype="Text" maxlength="50" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-TAX-ID">納税者番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-TAX-ID" id="MIR-CLI-TAX-ID" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CITY-NM-TXT">市/区/郡:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-CITY-NM-TXT" id="MIR-CLI-CITY-NM-TXT" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-JP-ADDR-CD">都道府県:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-JP-ADDR-CD" id="MIR-CLI-JP-ADDR-CD" stype="Text" maxlength="30" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-PSTL-CD">郵便番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-PSTL-CD" id="MIR-CLI-PSTL-CD" stype="Text" maxlength="9" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-CRNT-LOC-CD">州/国:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-CLI-CRNT-LOC-CD" id="MIR-CLI-CRNT-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
