<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1942-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-SECUR-CLAS-ID">セキュリティクラス:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-SECUR-CLAS-ID" stype="Text" displayonly="yes">MIR-SECUR-CLAS-ID</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-SECUR-LVL-CD">セキュリティクラスレベル:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-SECUR-LVL-CD" id="MIR-SECUR-LVL-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes" tabindex="1"></select>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-SECUR-CNFD-ACCS-CD">機密アクセス:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-SECUR-CNFD-ACCS-CD" id="MIR-SECUR-CNFD-ACCS-CD" size="1" stype="Selection" onfocus="enterField(this)" tabindex="2"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-SECUR-CLAS-MAX-AMT">セキュリティ最高額:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-SECUR-CLAS-MAX-AMT" id="MIR-SECUR-CLAS-MAX-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" tabindex="3" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-SECUR-CLAS-UWG-AMT">保険引受最高金額:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-SECUR-CLAS-UWG-AMT" id="MIR-SECUR-CLAS-UWG-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20" tabindex="4" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CTL-ACCT-ACCS-IND">アカウントアクセス権:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-CTL-ACCT-ACCS-IND" id="MIR-CTL-ACCT-ACCS-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" tabindex="5" />
                    </td>
                    <td class="celllabelrightalign"></td>
                    <td class="celllabeldataentry"></td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                            <label for="MIR-SESN-CTL-IND">ユーザーセッションコントロールインジケータ:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-SESN-CTL-IND" id="MIR-SESN-CTL-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" tabindex="6" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-MAX-SESN-NUM">最大ユーザーセッション数:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-MAX-SESN-NUM" id="MIR-MAX-SESN-NUM" stype="Text" maxlength="5" onfocus="enterField(this)" tabindex="7"/>
                    </td>

                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
