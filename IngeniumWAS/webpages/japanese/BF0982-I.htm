    <body class="bodyws" onload="splitBranch('MIR-BNK-BR-ID')">

            <input type="hidden" value="" name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" jpnbranch="Branch" jpnsubbranch="SubBranch" />

                        <label for="MIR-BNK-ID">銀行番号:</label>

                    <td class="celldisplaykeylabel">

                    </td>

                    <td class="celldisplaykey">
                        <span id="SubBranch" stype="Text" displayonly="yes">SubBranch</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>

                        <label for="MIR-BNK-NM">銀行（金融機関）名:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-BNK-NM" id="MIR-BNK-NM" stype="Text" maxlength="36" mandatory="yes" onfocus="enterField(this)" size="30" tabindex="1" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-BNK-BR-NM">支店名:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-BNK-BR-NM" id="MIR-BNK-BR-NM" stype="Text" maxlength="36" mandatory="yes" onfocus="enterField(this)" size="30" tabindex="2" />

            <table class="tabledataentry">

                    <td class="celllabeldataentry"></td>-->

                    </td>
                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-FRGN-CRCY-REMIT-IND" id="MIR-FRGN-CRCY-REMIT-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" tabindex="9" />

            <!-- M245K3 Changes ends here-->
