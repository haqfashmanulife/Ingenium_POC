<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1213-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-DPOS-TRM-DY-DUR">積立期間 - 日数:</label>
                <input type="text" value=" " name="MIR-DPOS-TRM-DY-DUR" id="MIR-DPOS-TRM-DY-DUR" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-DPOS-TRM-MO-DUR">積立期間 - 月数:</label>
                <input type="text" value=" " name="MIR-DPOS-TRM-MO-DUR" id="MIR-DPOS-TRM-MO-DUR" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-DV-END-RTBL-AGE-DUR">終了年齢/期間:</label>
                <input type="text" value=" " name="MIR-DV-END-RTBL-AGE-DUR" id="MIR-DV-END-RTBL-AGE-DUR" stype="Number" elength="3" decimals="0" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
            </p>
            <p>
                <label for="MIR-LOC-GR-ID">所在地グループ:</label>
                <select name="MIR-LOC-GR-ID" id="MIR-LOC-GR-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-AGE">発行時/満年齢:</label>
                <input type="text" value=" " name="MIR-RTBL-AGE" id="MIR-RTBL-AGE" stype="Text" maxlength="3" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-RTBL-AGE-DUR">開始年齢/期間:</label>
                <input type="text" value=" " name="MIR-RTBL-AGE-DUR" id="MIR-RTBL-AGE-DUR" stype="Number" elength="3" decimals="0" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
            </p>
            <p>
                <label for="MIR-RTBL-DB-OPT-CD">死亡給付オプション:</label>
                <select name="MIR-RTBL-DB-OPT-CD" id="MIR-RTBL-DB-OPT-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-ID">付加保険料率テーブルID:</label>
                <select name="MIR-RTBL-ID" id="MIR-RTBL-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-RTBL-IDT-NUM">発効日:</label>
                <input type="text" value=" " name="MIR-RTBL-IDT-NUM" id="MIR-RTBL-IDT-NUM" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-RTBL-JNT-LIFE-CD">連生保険タイプ:</label>
                <select name="MIR-RTBL-JNT-LIFE-CD" id="MIR-RTBL-JNT-LIFE-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-PAR-CD">配当オプション:</label>
                <select name="MIR-RTBL-PAR-CD" id="MIR-RTBL-PAR-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-PNSN-QUALF-CD">年金適格コード:</label>
                <select name="MIR-RTBL-PNSN-QUALF-CD" id="MIR-RTBL-PNSN-QUALF-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-RT-TYP-CD">料率タイプ:</label>
                <select name="MIR-RTBL-RT-TYP-CD" id="MIR-RTBL-RT-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-RTBL-SEX-CD">性別:</label>
                <select name="MIR-RTBL-SEX-CD" id="MIR-RTBL-SEX-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-SMKR-CD">喫煙者ステータス:</label>
                <select name="MIR-RTBL-SMKR-CD" id="MIR-RTBL-SMKR-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-STBL-1-CD">補助テーブル1:</label>
                <select name="MIR-RTBL-STBL-1-CD" id="MIR-RTBL-STBL-1-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-STBL-2-CD">補助テーブル2:</label>
                <select name="MIR-RTBL-STBL-2-CD" id="MIR-RTBL-STBL-2-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-STBL-3-CD">補助テーブル3:</label>
                <select name="MIR-RTBL-STBL-3-CD" id="MIR-RTBL-STBL-3-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RTBL-STBL-4-CD">補助テーブル4:</label>
                <select name="MIR-RTBL-STBL-4-CD" id="MIR-RTBL-STBL-4-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
