<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF5102-O</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-BNK-ACCT-ID">口座番号:</label>
                <span id="MIR-BNK-ACCT-ID" stype="Text" displayonly="yes">MIR-BNK-ACCT-ID</span>
            </p>
            <p>
                <label for="MIR-BNK-BR-ID">支店番号:</label>
                <span id="MIR-BNK-BR-ID" stype="Text" displayonly="yes">MIR-BNK-BR-ID</span>
            </p>
            <p>
                <label for="MIR-BNK-ID">銀行番号:</label>
                <span id="MIR-BNK-ID" stype="Text" displayonly="yes">MIR-BNK-ID</span>
            </p>
            <p>
                <label for="MIR-PAC-DRWD-DUE-DT">保険料払込締切日:</label>
                <span id="MIR-PAC-DRWD-DUE-DT" stype="Date" displayonly="yes">MIR-PAC-DRWD-DUE-DT</span>
            </p>
            <p>
                <label for="MIR-PAC-DRW-IDT-NUM">保険料口座振替日:</label>
                <span id="MIR-PAC-DRW-IDT-NUM" stype="Date" displayonly="yes">MIR-PAC-DRW-IDT-NUM</span>
            </p>
            <p>
                <label for="MIR-PAC-DRW-SEQ-NUM">シーケンス番号:</label>
                <span id="MIR-PAC-DRW-SEQ-NUM" stype="Text" displayonly="yes">MIR-PAC-DRW-SEQ-NUM</span>
            </p>
            <p>
                <label for="MIR-POL-ID-BASE">証券番号:</label>
                <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">枝番:</label>
                <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
            </p>
            <table class="tabledisplay" genrows="0">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-LOAN-AMT-T[1]">貸付金返済</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-MPREM-AMT-T[1]">特約保険料</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-REDRW-IND-T[1]">この払込は再振替</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-SNDRY-AMT-T[1]">雑勘定額</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-SUSP-AMT-T[1]">保険料仮勘定額</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRWD-STAT-CD-T[1]">ステータス</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAC-DRW-TOT-AMT-T[1]">保険料口座振替額</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRWD-LOAN-AMT-T[]" stype="Currency" elength="13" displayonly="yes">MIR-PAC-DRWD-LOAN-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRWD-MPREM-AMT-T[]" stype="Currency" elength="13" displayonly="yes">MIR-PAC-DRWD-MPREM-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <input type="checkbox" name="MIR-PAC-DRWD-REDRW-IND-T[]" id="MIR-PAC-DRWD-REDRW-IND-T[]" stype="Indicator" value="Y" disabled="yes" />
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRWD-SNDRY-AMT-T[]" stype="Currency" elength="13" displayonly="yes">MIR-PAC-DRWD-SNDRY-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRWD-SUSP-AMT-T[]" stype="Currency" elength="13" signed="yes" displayonly="yes">MIR-PAC-DRWD-SUSP-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRWD-STAT-CD-T[]" stype="Text" displayonly="yes">MIR-PAC-DRWD-STAT-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAC-DRW-TOT-AMT-T[]" stype="Currency" elength="11" signed="yes" displayonly="yes">MIR-PAC-DRW-TOT-AMT-T[]</span>
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
