<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
        <title></title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="103" class="cellbutton">
                    <input type="image" name="openButton" id="openButton" src="../japanese/images/but_open.gif" onclick="onClickedActionButton('ACTION_OPEN')" width="103" height="26" tabindex="1" alt="開く" defaultButton="yes" />
                </td>
                <td width="103" class="cellbutton" />
                <td width="103" class="cellbutton">
                    <input type="image" name="closeButton" id="closeButton" src="../japanese/images/but_close.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_CLOSE')" width="103" height="26" tabindex="2" alt="閉じる" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="reopenButton" id="reopenButton" src="../japanese/images/but_reopen.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_REOPEN')" width="103" height="26" tabindex="3" alt="再表示" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="deleteButton" id="deleteButton" src="../japanese/images/but_del.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_DELETE')" width="103" height="26" tabindex="4" alt="削除" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../japanese/images/but_can.gif" onclick="onClickedActionButton('ACTION_BACK')" width="103" height="26" tabindex="5" alt="キャンセル" />
                </td>
                <td width="116" class="cellbutton">
                    <input type="image" name="moreButton" id="moreButton" src="../japanese/images/but_more.gif" onclick="onClickedActionButton('ACTION_MORE')" width="116" height="26" tabindex="6" alt="さらに表示･･･" />
                </td>
                <td width="103" class="cellbutton" />
                <td width="103" class="cellbutton" />
            </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
