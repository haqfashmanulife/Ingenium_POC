<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0232-O</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-CHQ-ID">参照番号:</label>
                <span id="MIR-CHQ-ID" stype="Text" displayonly="yes">MIR-CHQ-ID</span>
            </p>
            <p>
                <label for="MIR-SBSDRY-CO-ID">子会社:</label>
                <span id="MIR-SBSDRY-CO-ID" stype="Text" displayonly="yes">MIR-SBSDRY-CO-ID</span>
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-CHQ-AMT">金額:</label>
                <span id="MIR-CHQ-AMT" stype="Currency" elength="17" displayonly="yes">MIR-CHQ-AMT</span>
            </p>
            <p>
                <label for="MIR-CHQ-CRCY-CD">通貨:</label>
                <span id="MIR-CHQ-CRCY-CD" stype="Text" displayonly="yes">MIR-CHQ-CRCY-CD</span>
            </p>
            <p>
                <label for="MIR-CHQ-DT">日付:</label>
                <span id="MIR-CHQ-DT" stype="Date" displayonly="yes">MIR-CHQ-DT</span>
            </p>
            <p>
                <label for="MIR-CHQ-MICR-NUM">MICR番号:</label>
                <span id="MIR-CHQ-MICR-NUM" stype="Text" displayonly="yes">MIR-CHQ-MICR-NUM</span>
            </p>
            <p>
                <label for="MIR-CHQ-PAYE-1-TXT">受取人(1):</label>
                <span id="MIR-CHQ-PAYE-1-TXT" stype="Text" displayonly="yes">MIR-CHQ-PAYE-1-TXT</span>
            </p>
            <p>
                <label for="MIR-CHQ-PAYE-2-TXT">受取人(2):</label>
                <span id="MIR-CHQ-PAYE-2-TXT" stype="Text" displayonly="yes">MIR-CHQ-PAYE-2-TXT</span>
            </p>
            <p>
                <label for="MIR-CHQ-PD-OR-CNCL-DT">小切手支払/キャンセル日:</label>
                <span id="MIR-CHQ-PD-OR-CNCL-DT" stype="Date" displayonly="yes">MIR-CHQ-PD-OR-CNCL-DT</span>
            </p>
            <p>
                <label for="MIR-CHQ-SRC-CD">支払対象:</label>
                <span id="MIR-CHQ-SRC-CD" stype="Text" displayonly="yes">MIR-CHQ-SRC-CD</span>
            </p>
            <p>
                <label for="MIR-CHQ-STAT-CD">ステータス:</label>
                <span id="MIR-CHQ-STAT-CD" stype="Text" displayonly="yes">MIR-CHQ-STAT-CD</span>
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
