<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0621-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-CF-REG-FND-SRC-CD">積立源:</label>
                <select name="MIR-CF-REG-FND-SRC-CD" id="MIR-CF-REG-FND-SRC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-CVG-NUM">保障番号:</label>
                <input type="text" value=" " name="MIR-CVG-NUM" id="MIR-CVG-NUM" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-DV-CF-CLI-TRXN-AMT">総出入額:</label>
                <input type="text" value=" " name="MIR-DV-CF-CLI-TRXN-AMT" id="MIR-DV-CF-CLI-TRXN-AMT" stype="Currency" elength="15" mandatory="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-DV-CF-EFF-DT">発効日:</label>
                <input type="text" value=" " name="MIR-DV-CF-EFF-DT" id="MIR-DV-CF-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-DV-CF-REASN-CD">処理事由:</label>
                <select name="MIR-DV-CF-REASN-CD" id="MIR-DV-CF-REASN-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-DV-CF-TAX-YR">会計年:</label>
                <input type="text" value=" " name="MIR-DV-CF-TAX-YR" id="MIR-DV-CF-TAX-YR" stype="Year" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
            </p>
            <p>
                <label for="MIR-POL-ID-BASE">証券番号:</label>
                <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-POL-ID-SFX">枝番:</label>
                <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
            </p>
            <table class="tabledisplay" genrows="3">
                <tr>
                    <td class="celldisplayheading">
                        <label for="MIR-AGT-1-ID-T[1]">募集人ID</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CFAGT-SHR-1-PCT-T[1]">手数料割当</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-CF-CPREM-1-AMT-T[1]">手数料支払対象保険料額</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-COMM-RT-TBAC-1-ID-T[1]">支払手数料率</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-OVRID-1-ID-T[1]">上乗せ手数料状況</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-AGT-1-ID-T[]" id="MIR-AGT-1-ID-T[]" stype="Text" maxlength="6" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" name="MIR-CFAGT-SHR-1-PCT-T[]" id="MIR-CFAGT-SHR-1-PCT-T[]" stype="Percent" elength="5" decimals="2" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-CF-CPREM-1-AMT-T[]" id="MIR-CF-CPREM-1-AMT-T[]" stype="Currency" elength="13" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-COMM-RT-TBAC-1-ID-T[]" id="MIR-COMM-RT-TBAC-1-ID-T[]" stype="Text" maxlength="5" onfocus="enterField(this)" />
                    </td>
                    <td class="celldisplay">
                        <input type="text" value=" " name="MIR-OVRID-1-ID-T[]" id="MIR-OVRID-1-ID-T[]" stype="Text" maxlength="2" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-CF-DPOS-TRM-DY-DUR">積立期間 - 日数:</label>
                <input type="text" value=" " name="MIR-CF-DPOS-TRM-DY-DUR" id="MIR-CF-DPOS-TRM-DY-DUR" stype="Text" maxlength="3" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-CF-DPOS-TRM-MO-DUR">積立期間 - 月数:</label>
                <input type="text" value=" " name="MIR-CF-DPOS-TRM-MO-DUR" id="MIR-CF-DPOS-TRM-MO-DUR" stype="Text" maxlength="3" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-CF-FND-TRXN-AMT">正味積立額:</label>
                <input type="text" value=" " name="MIR-CF-FND-TRXN-AMT" id="MIR-CF-FND-TRXN-AMT" stype="Currency" elength="15" signed="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-CF-INT-PCT">利率/ユニットコスト:</label>
                <input type="text" name="MIR-CF-INT-PCT" id="MIR-CF-INT-PCT" stype="Percent" elength="7" decimals="4" signed="yes" value="" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
            </p>
            <p>
                <label for="MIR-ROLOVR-CF-DT">GIAロールオーバー日:</label>
                <input type="text" value=" " name="MIR-ROLOVR-CF-DT" id="MIR-ROLOVR-CF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-DPOS-OVRID-EFF-DT">変更後支払発効日:</label>
                <input type="text" value=" " name="MIR-DPOS-OVRID-EFF-DT" id="MIR-DPOS-OVRID-EFF-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            </p>
            <p>
                <label for="MIR-SUPRES-CNFRM-IND">確認通知は不要:</label>
                <input type="checkbox" value="Y" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
