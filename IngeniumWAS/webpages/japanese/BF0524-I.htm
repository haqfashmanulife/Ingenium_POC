<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0524-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">枝番:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-TRXN-EFF-DT">処理日:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-TRXN-EFF-DT" id="MIR-POL-TRXN-EFF-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-ACCT-TRXN-AMT">金額:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-DV-ACCT-TRXN-AMT" id="MIR-DV-ACCT-TRXN-AMT" stype="Currency" elength="13" signed="yes" mandatory="yes" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-SURR-TYP-CD">金額タイプ:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-SURR-TYP-CD" id="MIR-DV-SURR-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-DV-CHQ-CREAT-IND">小切手を作成する:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="checkbox" value="Y" name="MIR-DV-CHQ-CREAT-IND" id="MIR-DV-CHQ-CREAT-IND" stype="Indicator" onclick="onCheckBox()" onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
