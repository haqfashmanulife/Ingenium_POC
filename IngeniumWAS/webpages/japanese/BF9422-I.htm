<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>BF9422-I</title>
<link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />

<body class="bodyws">
<form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
    <input type="hidden" name="action" id="action" stype="Hidden"/>
    <input type="hidden" name="index" id="index" stype="Hidden"/>
    <table>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-MCL-GL-NUM-TXT">GL勘定番号:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-MCL-GL-NUM-TXT" stype="Text" displayonly="yes">MIR-DV-MCL-GL-NUM-TXT</span>
            </td>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-DT-FROM-TXT">から:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-DT-FROM-TXT" stype="Text" displayonly="yes">MIR-DV-DT-FROM-TXT</span>
            </td>
        </tr>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-OPER-CAT-CD">業務区分:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-OPER-CAT-CD-TXT" stype="Text" displayonly="yes">MIR-DV-OPER-CAT-CD-TXT</span>
            </td>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-DT-TO-TXT">まで:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-DT-TO-TXT" stype="Text" displayonly="yes">MIR-DV-DT-TO-TXT</span>
            </td>
        </tr>
        <tr>
            <td class="celldisplaykeylabel">
                <label for="MIR-DV-MCL-GL-NM-TXT">GL勘定名:</label>
            </td>
            <td class="celldisplaykey">
                <span id="MIR-DV-MCL-GL-NM-TXT" stype="Text" displayonly="yes">MIR-DV-MCL-GL-NM-TXT</span>
            </td>
        </tr>
                 
    </table>

    <table class="tabledisplay" genrows="0" >
        <tr>
            <td class="celldisplayheading"><label for="MIR-ACCT-YR-T[1]">年</label></td>
            <td class="celldisplayheading"><label for="MIR-DV-MO-NM-TXT-T[1]">月</label></td>
            <td class="celldisplayheading"><label for="MIR-ACCT-BAL-DR-AMT-T[1]">借方</label></td>
            <td class="celldisplayheading"><label for="MIR-ACCT-BAL-CR-AMT-T[1]">貸方</label></td>
        </tr>
        <tr>
            <td class="celldisplay"><span id="MIR-ACCT-YR-T[]" stype="Text" displayonly="yes">MIR-ACCT-YR-T[]</span>
            </td>
            <td class="celldisplay"><span id="MIR-DV-MO-NM-TXT-T[]" stype="Text" displayonly="yes">MIR-DV-MO-NM-TXT-T[]</span>
            </td>
            <td class="celldisplay"><input type="text" value=" " name="MIR-ACCT-BAL-DR-AMT-T[]" id="MIR-ACCT-BAL-DR-AMT-T[]" stype="Currency" elength="17" onkeypress ="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)"/>
            </td>
            <td class="celldisplay"><input type="text" value=" " name="MIR-ACCT-BAL-CR-AMT-T[]" id="MIR-ACCT-BAL-CR-AMT-T[]" stype="Currency" elength="17" onkeypress ="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)"/>
            </td>
        </tr>
    </table>
</form>
