<html>
    <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarCRUDOkCancel</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" >
                    <input type="image" name="addButton" id="addButton" src="../japanese/images/but_add.gif" onclick="onClickedActionButton('ACTION_ADD')" width="72" height="27" tabindex="1" alt="追加" />
                </td>
                <td width="72" class="cellbutton" >
                    <input type="image" name="inquireButton" id="inquireButton" src="../japanese/images/but_retr.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_INQUIRE')" width="72" height="27" tabindex="2" alt="検索" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="searchButton" id="searchButton" src="../japanese/images/but_srch.gif" onclick="onClickedActionButton('ACTION_SEARCH')" width="72" height="27" alt="検索" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton" >
                    <input type="image" name="updateButton" id="updateButton" src="../japanese/images/but_upd.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_UPDATE')" width="72" height="27" tabindex="3" alt="更新" />
                </td>
                <td width="72" class="cellbutton" >
                    <input type="image" name="deleteButton" id="deleteButton" src="../japanese/images/but_del.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_DELETE')" width="72" height="27" tabindex="4" alt="削除" />
                </td>
                <td width="72" class="cellbutton" >
                    <input type="image" name="okButton" id="okButton" src="../japanese/images/but_ok.gif" onclick="onClickedActionButton('ACTION_OK')" width="72" height="27" tabindex="6" alt="OK" />
                </td>
                <td width="72" class="cellbutton" >
                    <input type="image" name="cancelButton" id="cancelButton" src="../japanese/images/but_can.gif" onclick="onClickedActionButton('ACTION_BACK')" width="72" height="27" tabindex="5" alt="キャンセル" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
