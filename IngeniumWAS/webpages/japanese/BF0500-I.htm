    <head>

    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-UWAR-BUS-CLAS-CD">商品種別:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-UWAR-BUS-CLAS-CD" id="MIR-UWAR-BUS-CLAS-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-BR-ID">保全担当支店:</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-BR-ID" id="MIR-BR-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-UWAR-ALPHA-CD">アルファベット順:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-UWAR-ALPHA-CD" id="MIR-UWAR-ALPHA-CD" stype="Text" maxlength="1" onfocus="enterField(this)" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-UWAR-TCR-AMT">金額:</label>
                    </td>

                        <input type="text" value=" " name="MIR-UWAR-TCR-AMT" id="MIR-UWAR-TCR-AMT" stype="Currency" elength="13" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />

            <input type="hidden" name="action" id="action" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
        </form>
    </body>
