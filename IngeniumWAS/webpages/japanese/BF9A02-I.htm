<body class="bodyws">
<form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">

<table class="tabledisplaykey">
	<tr>
		<td class="celldisplaykeylabel">
			<label for="MIR-LOC-GR-ID">所在地グループ:</label>
		</td>
		<td class="celldisplaykey">
			<span id="MIR-LOC-GR-ID" stype="Text" displayonly="yes">MIR-LOC-GR-ID</span>
		</td>
		<td class="celldisplaykeylabel">
			<label for="MIR-PAYO-PLAN-MTHD-CD">支払方法:</label>
		</td>
		<td class="celldisplaykey">
			<span id="MIR-PAYO-PLAN-MTHD-CD" stype="Text" displayonly="yes">MIR-PAYO-PLAN-MTHD-CD</span>
		</td>
	</tr>
	<tr>
		<td class="celldisplaykeylabel">
			<label for="MIR-PLAN-ID">プラン:</label>
		</td>
		<td class="celldisplaykey">
			<span id="MIR-PLAN-ID" stype="Text" displayonly="yes">MIR-PLAN-ID</span>
		</td>
	</tr>
</table>
<br />

<p>
	<input type="hidden" name="action" id="action" stype="Hidden"/>
</p>

<table class="tabledataentry">
	<tr>
		<td class="celllabelrightalign">
			<label for="MIR-PAYO-PLAN-LEAD-DUR">リードタイム:</label>
		</td>
		<td class="celllabeldataentry">
			<input type="text" value="000" name="MIR-PAYO-PLAN-LEAD-DUR" id="MIR-PAYO-PLAN-LEAD-DUR" stype="Text" maxlength="3"   onfocus="enterField(this)"/>
		</td>
    		<td class="celllabelrightalign">
    			<label for="MIR-PLAN-MTHD-DFLT-IND">デフォルト:</label>
    		</td>
    		<td class="celllabeldataentry">
    			<input type="checkbox" value="Y" name="MIR-PLAN-MTHD-DFLT-IND" id="MIR-PLAN-MTHD-DFLT-IND" stype="Indicator"    onclick="onCheckBox()"  onfocus="enterField(this)"/>
    		</td>
	</tr>
	<tr>
		<td class="celllabelrightalign">
			<label for="MIR-PAYO-PLAN-LEAD-MTHD-CD">リードタイム方法、方式:</label>
		</td>
		<td class="celllabeldataentry">
			<select name="MIR-PAYO-PLAN-LEAD-MTHD-CD" id="MIR-PAYO-PLAN-LEAD-MTHD-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
		</td>
		<td class="celllabelrightalign">
			<label for="MIR-LEAD-TIME-TYP-CD">リードタイムタイプ:</label>
		</td>
		<td class="celllabeldataentry">
			<select name="MIR-LEAD-TIME-TYP-CD" id="MIR-LEAD-TIME-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" ></select>
		</td>
	</tr>
</table>


</form>
</body>
