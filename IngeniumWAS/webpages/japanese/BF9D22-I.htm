    </head>
    <body class="bodyws">
            <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
             <input type="hidden" name="index" id="index" stype="Hidden" />
             <input type="hidden" name="action" id="action" stype="Hidden" />
             <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                       <label for="MIR-POL-ID-BASE">証券番号</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" mandatory="yes" onfocus="enterField(this)"/>
                    </td> 
                    <td class="celldatakeylabel">
                        <label for="MIR-APPL-CTL-PRCES-DT">処理日</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-APPL-CTL-PRCES-DT" id="MIR-APPL-CTL-PRCES-DT" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)"/>
                    </td>
                </tr>
                <tr>
                   <td class="celldatakeylabel">
                      <label for="MIR-CO-RECV-DT">会社受付日</label>
                   </td>
                   <td class="celldatakey">
                      <input type="text" value=" " name="MIR-CO-RECV-DT" id="MIR-CO-RECV-DT" stype="Date" maxlength="10" onfocus="enterField(this)" onblur="validateField(this)"/>

                    <td class="celldatakeylabel">
                        <label for="MIR-DV-TRNXT-PAYO-MTHD-CD">支払方法</label>
                    </td>
                    <td class="celldatakey">
                        <select name="MIR-DV-TRNXT-PAYO-MTHD-CD" id="MIR-DV-TRNXT-PAYO-MTHD-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-JRNL-DT">日報計上日</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-JRNL-DT" id="MIR-JRNL-DT" stype="Date" maxlength="10" onfocus="enterField(this)" onblur="validateField(this)"/>
                    </td>
                </tr>
            </table>
            <br />
        </form>
