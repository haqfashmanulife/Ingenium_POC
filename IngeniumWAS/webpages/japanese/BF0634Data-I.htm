<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0634Data-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />

    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />

                        <label for="MIR-DV-OWN-CLI-NM">契約者名:</label>
                    </td>
                    <td colspan="3" class="celldisplaykey">
                        <span id="MIR-DV-OWN-CLI-NM" stype="Text" displayonly="yes">MIR-DV-OWN-CLI-NM</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>

                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">

                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>

                    <td class="celldisplaykey">
                        <span id="MIR-DV-CF-EFF-DT" stype="Date" displayonly="yes">MIR-DV-CF-EFF-DT</span>
                    </td>

                    <td class="celldisplaykeylabel">

                    <td class="celldisplaykey">
                        <span id="MIR-DV-CF-REASN-CD" stype="Text" displayonly="yes">MIR-DV-CF-REASN-CD</span>

                        <input type="checkbox" name="MIR-SUPRES-CNFRM-IND" id="MIR-SUPRES-CNFRM-IND" stype="Indicator" value="Y" disabled="yes" />

                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CF-FED-TAXWH-AMT">連邦源泉課税:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-CF-FED-TAXWH-AMT" stype="Currency" elength="13" displayonly="yes">MIR-CF-FED-TAXWH-AMT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CF-PROV-TAXWH-AMT">地方源泉課税:</label>

                        <input type="checkbox" name="MIR-DV-TAX-OVRID-IND" id="MIR-DV-TAX-OVRID-IND" stype="Indicator" value="Y" disabled="yes" />

                    <td class="celldisplaykeylabel">
                        <label for="MIR-DV-REDC-FACE-IND">自動額面金額減額更新:</label>

                    <td class="celldisplaykey">
                        <input type="checkbox" name="MIR-DV-REDC-FACE-IND" id="MIR-DV-REDC-FACE-IND" stype="Indicator" value="Y" disabled="yes" />

                </tr>
            </table>
            <br />

                    <td class="celldataentryheading">

                    <td class="celldataentryheading">
                        <label for="MIR-CF-FED-TAXWH-AMT-T[1]">連邦源泉課税</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-DV-TAX-OVRID-IND-T[1]">税更新</label>
                    </td>
                    <td class="celldataentryheading">
                        <label for="MIR-DV-DISPLAY-CD-T[1]">処理結果</label>
                    </td>
                </tr>
                <tr>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CVG-NUM-T[]" id="MIR-CVG-NUM-T[]" stype="Text" maxlength="2" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-CF-UNIT-QTY-T[]" stype="Text" displayonly="yes">MIR-CF-UNIT-QTY-T[]</span>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-DV-CF-UNIT-QTY-T[]" id="MIR-DV-CF-UNIT-QTY-T[]" stype="Text" maxlength="13" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabeldataentry">
                        <span id="MIR-CF-SURR-CHRG-AMT-T[]" stype="Currency" elength="15" signed="yes" displayonly="yes">MIR-CF-SURR-CHRG-AMT-T[]</span>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CF-FED-TAXWH-AMT-T[]" id="MIR-CF-FED-TAXWH-AMT-T[]" stype="Currency" elength="13" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />

                    <td class="celllabeldataentry">
                        <input type="checkbox" value="Y" name="MIR-DV-TAX-OVRID-IND-T[]" id="MIR-DV-TAX-OVRID-IND-T[]" stype="Indicator" index="1" onclick="onCheckBox()" onfocus="enterField(this)" />

                        <span id="MIR-DV-DISPLAY-CD-T[]" stype="Text" displayonly="yes">MIR-DV-DISPLAY-CD-T[]</span>
