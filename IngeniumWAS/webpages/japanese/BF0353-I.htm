    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">

                <label for="MIR-RAT-STD-AGE">最高年齢:</label>

                <label for="MIR-RAT-STD-HT-QTY">身長上限:</label>

            <p>
                <label for="MIR-RAT-STD-SEX-CD">性別:</label>
                <select name="MIR-RAT-STD-SEX-CD" id="MIR-RAT-STD-SEX-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-RAT-STD-WGT-QTY">体重上限:</label>

            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
