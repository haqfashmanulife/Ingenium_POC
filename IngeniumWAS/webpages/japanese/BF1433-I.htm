<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF1433-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-ACCT-BASE-ID">Account Number:</label>
                <input type="text" value=" " name="MIR-ACCT-BASE-ID" id="MIR-ACCT-BASE-ID" stype="Text" maxlength="6" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-ACCT-CRCY-CD">Currency:</label>
                <select name="MIR-ACCT-CRCY-CD" id="MIR-ACCT-CRCY-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-ACCT-CRNT-LOC-CD">Current Location:</label>
                <select name="MIR-ACCT-CRNT-LOC-CD" id="MIR-ACCT-CRNT-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-ACCT-ISS-LOC-CD">Issue Location:</label>
                <select name="MIR-ACCT-ISS-LOC-CD" id="MIR-ACCT-ISS-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-ACCT-YR">Year:</label>
                <input type="text" value=" " name="MIR-ACCT-YR" id="MIR-ACCT-YR" stype="Year" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" onkeypress="NumberKeyCheck()" />
            </p>
            <p>
                <label for="MIR-BR-OR-DEPT-ID">ファンド:</label>
                <select name="MIR-BR-OR-DEPT-ID" id="MIR-BR-OR-DEPT-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-PLAN-ID">Plan:</label>
                <select name="MIR-PLAN-ID" id="MIR-PLAN-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                <select name="MIR-SBSDRY-CO-ID" id="MIR-SBSDRY-CO-ID" size="1" stype="Selection" onfocus="enterField(this)"></select>
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
