<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0273-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <p>
                <label for="MIR-CASM-EFF-IDT-NUM">Effective Date:</label>
                <input type="text" value=" " name="MIR-CASM-EFF-IDT-NUM" id="MIR-CASM-EFF-IDT-NUM" stype="Date" mandatory="yes" onfocus="enterField(this)" onblur="validateField(this)" />
            </p>
            <p>
                <label for="MIR-CASM-ID">Assembly Pointer:</label>
                <select name="MIR-CASM-ID" id="MIR-CASM-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-CASM-REC-NUM">Record Number:</label>
                <input type="text" value=" " name="MIR-CASM-REC-NUM" id="MIR-CASM-REC-NUM" stype="Text" maxlength="2" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-CASM-REC-TYP-CD">Record Type:</label>
                <select name="MIR-CASM-REC-TYP-CD" id="MIR-CASM-REC-TYP-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-CASM-SEQ-NUM">Sequence Number:</label>
                <input type="text" value=" " name="MIR-CASM-SEQ-NUM" id="MIR-CASM-SEQ-NUM" stype="Text" maxlength="3" mandatory="yes" onfocus="enterField(this)" />
            </p>
            <p>
                <label for="MIR-LOC-GR-ID">Location Group:</label>
                <select name="MIR-LOC-GR-ID" id="MIR-LOC-GR-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <label for="MIR-SBSDRY-CO-ID">Sub Company:</label>
                <select name="MIR-SBSDRY-CO-ID" id="MIR-SBSDRY-CO-ID" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>
            </p>
            <p>
                <input type="hidden" name="action" id="action" stype="Hidden" />
            </p>
            <p>
                <input type="hidden" name="index" id="index" stype="Hidden" />
            </p>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
