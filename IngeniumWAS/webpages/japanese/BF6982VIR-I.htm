<html>
    <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>BF6982VIR-I</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
<!-- S22244 CHANGES STARTS HERE -->		
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
<!-- S22244 CHANGES ENDS HERE -->	
        <table class="tabledatakey">
		         <tr>
                    <td colspan="4" class="celldataentryheading">契約者貸付返済試算―バーチャル試算条件入力</td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-APPL-CTL-PRCES-DT">有効日:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-APPL-CTL-PRCES-DT" stype="Date" displayonly="yes">MIR-APPL-CTL-PRCES-DT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-TRAD-PD-TO-MO-NUM">次回払込年月:</label>
                    </td>
                    <td class="celldatakey">
                       <input type="text" value=" " name="MIR-VIR-TRAD-PD-TO-MO-NUM"  id="MIR-VIR-TRAD-PD-TO-MO-NUM" stype="Text" maxlength="7" onfocus="enterField(this)" onblur="validateField(this)"/>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-CI-FRST-ELAPS-YRS-DUR">経過年数:</label>
                    </td>
                    <td class="celldatakey">
                         <input type="text" value=" " name="MIR-VIR-CI-FRST-ELAPS-YRS-DUR"  id="MIR-VIR-CI-FRST-ELAPS-YRS-DUR" stype="Text" maxlength="7" onfocus="enterField(this)" onblur="validateField(this)"/>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-ACTV-IND">有効中:</label>
                    </td>
                    <td class="celldatakey">
                        <input name="MIR-VIR-ACTV-IND"  id="MIR-VIR-ACTV-IND" onclick="onCheckBox()" onfocus="enterField(this)" stype="Indicator" type="checkbox" value="Y">(有効中契約へ変更)</input>
                    </td>

                </tr>


                <tr>
                <td class="celldisplaykeylabel">
                   <label for="MIR-VIR-LOAN-AMT">契約者貸付残高貸付:</label>
                </td>
                <td class="celldatakey">
                   <input type="text" value=" " name="MIR-VIR-LOAN-AMT"  id="MIR-VIR-LOAN-AMT" stype="Currency" elength="13" signed="yes"  onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-INT-STR-DT">利息開始日:</label>
                    </td>
                    <td class="celldatakey">
                       <input type="text" value=" " name="MIR-VIR-INT-STR-DT"  id="MIR-VIR-INT-STR-DT" stype="Date" maxlength="10" onfocus="enterField(this)" onblur="validateField(this)"/>
                    </td>
                </tr>

                <tr>
                <td class="celldisplaykeylabel">
                   <label for="MIR-VIR-APL-LOAN-AMT">自動振替貸付残高:</label>
                </td>
                <td class="celldatakey">
                   <input type="text" value=" " name="MIR-VIR-APL-LOAN-AMT"  id="MIR-VIR-APL-LOAN-AMT" stype="Currency" elength="13" signed="yes"  onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" size="20"  />
                </td>
                <td class="celldisplaykeylabel">
                   <label for="MIR-VIR-POL-LOAN-EFF-DT">自動振替貸付日:</label>
                </td>
                <td class="celldisplaykey">
                   <input type="text" value=" " name="MIR-VIR-POL-LOAN-EFF-DT"  id="MIR-VIR-POL-LOAN-EFF-DT" stype="Date" maxlength="10" onfocus="enterField(this)" onblur="validateField(this)"/>
                </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-PREPAY-MNG-IND">前納管理:</label>
                    </td>
                    <td class="celldatakey">
                        <input name="MIR-VIR-PREPAY-MNG-IND"  id="MIR-VIR-PREPAY-MNG-IND" onclick="onCheckBox()" onfocus="enterField(this)" stype="Indicator" type="checkbox" value="Y">(ブランクは前納なし)</input>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-VIR-SEI-ASS-IND">差押・質権:</label>
                    </td>
                    <!-- S24056 CHANGES START -->
                    <!-- <td class="celldatakey"> -->
                    <td class="celldisplaykey">
                    <!-- S24056 CHANGES END -->
                        <input type="checkbox" name="MIR-VIR-SEI-ASS-IND"   stype="Indicator" value="Y" disabled="Yes" >(ブランクは差押・質権なし)</input>
                    </td>
                 </tr>				

</table>

</form>
