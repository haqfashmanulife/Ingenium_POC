<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
        <title>ButtonBarListsCRUD</title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="addButton" id="addButton" src="../japanese/images/but_add.gif" onclick="onClickedActionButton('ACTION_ADD')" width="72" height="27" tabindex="1" alt="Add" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                    <input type="image" name="inquireButton" id="inquireButton" src="../japanese/images/but_retr.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_INQUIRE')" width="72" height="27" tabindex="2" alt="Retrieve" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="updateButton" id="updateButton" src="../japanese/images/but_upd.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_UPDATE')" width="72" height="27" tabindex="3" alt="Update" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="deleteButton" id="deleteButton" src="../japanese/images/but_del.gif" onclick="onClickedActionButtonCheckForSelection('Please select an item', 'ACTION_DELETE')" width="72" height="27" tabindex="4" alt="Delete" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton">
                        <input type="image" name="prevButton" id="prevButton" src="../japanese/images/but_prev.gif" onclick="onClickedActionButton('ACTION_PREVIOUS')" width="72" height="27" tabindex="1" alt="Previous" />
                </td>
                <td width="72" class="cellbutton">
                    <input type="image" name="nextButton" id="nextButton" src="../japanese/images/but_nxt.gif" onclick="onClickedActionButton('ACTION_NEXT')" width="72" height="27" tabindex="2" alt="Next" defaultButton="yes" />
                </td>
                <td width="72" class="cellbutton" />
                <td width="72" class="cellbutton" />
            </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
</html>
