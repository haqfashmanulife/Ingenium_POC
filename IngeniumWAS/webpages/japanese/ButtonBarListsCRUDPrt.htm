<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
        <title></title>
    </head>
    <body class="bodybutton">
        <table class="tablebutton">
            <tr>
                <td width="103" class="cellbutton">
                    <input type="image" name="addButton" id="addButton" src="../japanese/images/but_add.gif" onclick="onClickedActionButton('ACTION_ADD')" width="103" height="26" tabindex="1" alt="追加" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="inquireButton" id="inquireButton" src="../japanese/images/but_retr.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_INQUIRE')" width="103" height="26" tabindex="2" alt="照会" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="updateButton" id="updateButton" src="../japanese/images/but_upd.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_UPDATE')" width="103" height="26" tabindex="3" alt="更新" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="deleteButton" id="deleteButton" src="../japanese/images/but_del.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_DELETE')" width="103" height="26" tabindex="4" alt="削除" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="copyButton" id="copyButton" src="../japanese/images/but_print.gif" onclick="onClickedActionButtonCheckForSelection('項目を選択してください', 'ACTION_PRINT')" width="103" height="26" tabindex="4" alt="印刷" />
                </td>
                <td width="103" class="cellbutton">
                    <input type="image" name="prevButton" id="prevButton" src="../japanese/images/but_can.gif" onclick="onClickedActionButton('ACTION_BACK')" width="103" height="26" tabindex="5" alt="キャンセル" />
                </td>
                <td width="116" class="cellbutton">
                    <input type="image" name="moreButton" id="moreButton" src="../japanese/images/but_more.gif" onclick="onClickedActionButton('ACTION_MORE')" width="116" height="26" tabindex="6" alt="さらに表示･･･" defaultButton="yes" />
                </td>
                <td width="103" class="cellbutton" />
                <td width="103" class="cellbutton" />
            </tr>
        </table>
    </body>
    <script src="../js/ButtonBar.js"></script>
