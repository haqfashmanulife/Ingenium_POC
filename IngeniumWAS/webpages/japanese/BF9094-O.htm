<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PRCES-DT-YYYY">処理日:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-PRCES-DT-YYYY" id="MIR-PRCES-DT-YYYY" stype="Text" maxlength="4" onfocus="enterField(this)" />
                        <label for="MIR-PRCES-DT-YYYY">年</label></td>
                    <td class="celldatakeylabel">
                    </td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-PRCES-DT-MM" id="MIR-PRCES-DT-MM" stype="Text" maxlength="2" onfocus="enterField(this)" />
                        <label for="MIR-PRCES-DT-MM">月</label></td>
                    <td class="celldatakey">
                        <input type="text" name="MIR-PRCES-DT-DD" id="MIR-PRCES-DT-DD" stype="Text" maxlength="2" onfocus="enterField(this)" />
                        <label for="MIR-PRCES-DT-DD">日</label></td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay" genrows="0" keyfield="5">
                <tr>
                    <td class="celldisplayheading">
                        <label for="SELECT-T[1]" />
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BT-BILL-RUN-DT-T[1]">口振案内作成日</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BT-BILL-HIGH-DT-T[1]">口振案内ハイデート</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BT-LOW-PICK-DY-T[1]">口振案内ローピックデー</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BT-HIGH-PICK-DY-T[1]">口振案内ハイピックデー</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input stype="Indicator" type="checkbox" name="SELECT-T[]" id="SELECT-T[]" value=" " index="1" onclick="onListCheckBox()" />
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BT-BILL-RUN-DT-T[]" stype="Date" displayonly="yes">MIR-BT-BILL-RUN-DT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BT-BILL-HIGH-DT-T[]" stype="Date" displayonly="yes">MIR-BT-BILL-HIGH-DT-T[]</span>

                    <td class="celldisplay">
                        <span id="MIR-BT-BILL-HIGH-PICK-DY-T[]" stype="Date" displayonly="yes">MIR-BT-BILL-HIGH-PICK-DY-T[]</span>
                    </td>
                </tr>

            <input type="hidden" name="index" id="index" stype="Hidden" />
