	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
        <input type="hidden" name="index" id="index" stype="Hidden"/>
	<input type="hidden" name="action" id="action" stype="Hidden"/>
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel"><label for="MIR-CLM-ID">死亡マスタークレームID:</label></td>
                    <td class="celldisplaykey"><span id="MIR-CLM-ID" stype="Text" displayonly="yes">MIR-CLM-ID</span></td>
                    <td class="celldisplaykeylabel"><label for="MIR-CLM-STAT-CD">マスタークレームステータス:</label></td>
                    <td class="celldisplaykey"><span id="MIR-CLM-STAT-CD" stype="Text" displayonly="yes">MIR-CLM-STAT-CD</span></td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel"><label for="MIR-POL-ID">証券番号:</label></td>
                    <td class="celldisplaykey"><span id="MIR-POL-ID" stype="Text" displayonly="yes">MIR-POL-ID</span></td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign">
                        <input type="radio" name="MIR-DTH-CLM-REQIR-OPT-CD" value="P" stype="YesNoUnanswered"  onclick="onYesNoUa('Yes')"  onfocus="saveValue(); enterField(this)" >契約要件</input>
                        <input type="radio" name="MIR-DTH-CLM-REQIR-OPT-CD" value="U" stype="YesNoUnanswered"  onclick="onYesNoUa('No')" onfocus="saveValue(); enterField(this)" >保障要件</input>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign"><label for="MIR-CVG-NUM">保障番号:</label></td>
                    <td class="celllabeldataentry"><input type="text" value=" " name="MIR-CVG-NUM" id="MIR-CVG-NUM" stype="text" onfocus="enterField(this)" onblur="validateField(this)" /></td>
                </tr>
                <tr>
                    <td class="celllabelrightalign"><label for="MIR-DTH-CLM-REQIR-ID">要件:</label></td>
                    <td class="celllabeldataentry"><select name="MIR-DTH-CLM-REQIR-ID" id="MIR-DTH-CLM-REQIR-ID" size="1" stype="Selection" mandatory="yes" onfocus="enterField(this)"></select></td>
                </tr>
                <tr>
                    <td class="celllabelrightalign"><label for="MIR-DTH-CRQT-STAT-CD">要件ステータス:</label></td>
                    <td class="celllabeldataentry"><select name="MIR-DTH-CRQT-STAT-CD" id="MIR-DTH-CRQT-STAT-CD" size="1" stype="Selection" mandatory="yes" onfocus="enterField(this)"></select></td>
                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celllabelrightalign"><label for="MIR-DTH-CRQT-ORDR-DT">要請日:</label></td>
                    <td class="celllabeldataentry"><input type="text" value=" " name="MIR-DTH-CRQT-ORDR-DT" id="MIR-DTH-CRQT-ORDR-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" /></td>
                    <td class="celllabelrightalign"><label for="MIR-DTH-CRQT-RECV-DT">受領日:</label></td>
                    <td class="celllabeldataentry"><input type="text" value=" " name="MIR-DTH-CRQT-RECV-DT" id="MIR-DTH-CRQT-RECV-DT" stype="Date" onfocus="enterField(this)" onblur="validateField(this)" /></td>
                </tr>
