<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>AppNonmedEmploymentJP</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onLoad="onLoad()">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <div align="right">
                <table>
                    <tr>
                        <td class="celldisplaykeylabel">
                            <label for="MIR-DV-INSRD-CLI-NM">申込者:</label>
                        </td>
                        <td class="celldisplaykey">
                            <span id="MIR-DV-INSRD-CLI-NM" stype="Text" displayonly="yes">MIR-DV-INSRD-CLI-NM</span>
                        </td>
                    </tr>
                </table>
            </div>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">現職に関する情報</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-OCCP-ID">職業:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-OCCP-ID" id="MIR-OCCP-ID" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                    <td class="celllabelrightalign" />
                    <td class="celllabeldataentry" />
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-OCCP-ID">勤め先（雇用主）:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-EMPLR-NM-T[1]" id="MIR-CLI-EMPLR-NM-T[1]" stype="Text" maxlength="50" onfocus="enterField(this)" size="43" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-EMPL-YR-DUR">勤続年数:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-EMPL-YR-DUR" id="MIR-CLI-EMPL-YR-DUR" stype="Text" maxlength="2" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-OCCP-ID">住所:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-EMPLR-ADDR-1-TXT-T[1]" id="MIR-EMPLR-ADDR-1-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td></td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-EMPLR-ADDR-2-TXT-T[1]" id="MIR-EMPLR-ADDR-2-TXT-T[1]" stype="Text" maxlength="25" onfocus="enterField(this)" />
                    </td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-EMPLR-LOC-CD">州/国:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-EMPLR-LOC-CD" id="MIR-CLI-EMPLR-LOC-CD" size="1" stype="Selection" onfocus="enterField(this)"></select>

                            <input type="image" name="refreshButton" id="refreshButton" border="0" src="../japanese/images/refresh.gif" align="bottom" width="70" height="26" onclick="doRefresh()" />
              </span>
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-EMPLR-CTRY-CD">国:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-CLI-EMPLR-CTRY-CD" id="MIR-CLI-EMPLR-CTRY-CD" size="1" stype="Selection" onfocus="enterField(this)" onchange="refreshButtonspan.style.display='';"></select>

                </tr>
            </table>
            <br />
            <table class="tabledataentry">
                <tr>
                    <td class="celldataentryheading" colspan="4">前職に関する情報</td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-PREV-EMPL-YR-DUR">勤め先（雇用主）:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-PREV-EMPLR-NM-T[1]" id="MIR-CLI-PREV-EMPLR-NM-T[1]" stype="Text" maxlength="50" onfocus="enterField(this)" size="44" />

                </tr>
            </table>

                <tr>

                    <td class="celldisplaykey">
                        <span id="MIR-CLI-INCM-EFF-DT" stype="Date" displayonly="yes">MIR-CLI-INCM-EFF-DT</span>

                    <td />

                        <label for="MIR-CLI-EARN-INCM-AMT">勤労所得:</label>

                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-EARN-INCM-AMT" id="MIR-CLI-EARN-INCM-AMT" stype="Currency" elength="13" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celllabelrightalign">
                        <label for="MIR-EARN-INCM-MODE-CD">収入形態:</label>
                    </td>
                    <td class="celllabeldataentry">
                        <select name="MIR-EARN-INCM-MODE-CD" id="MIR-EARN-INCM-MODE-CD" size="1" stype="Selection" onfocus="enterField(this)" />
                    </td>
                </tr>
                <tr>
                    <td class="celllabelrightalign">
                        <label for="MIR-CLI-OTHR-INCM-AMT">その他の所得:</label>

                    <td class="celllabeldataentry">
                        <input type="text" value=" " name="MIR-CLI-OTHR-INCM-AMT" id="MIR-CLI-OTHR-INCM-AMT" stype="Currency" elength="13" decimals="0" onkeypress="NumberKeyCheck()" onfocus="enterField(this)" onblur="validateField(this)" />

                        <label for="MIR-EARN-INCM-MODE-CD">収入形態:</label>

                    <td class="celllabeldataentry">
                        <select name="MIR-OTHR-INCM-MODE-CD" id="MIR-OTHR-INCM-MODE-CD" size="1" stype="Selection" onfocus="enterField(this)" />

                </tr>
