*
*********************************************************************************

*  23774B  CTS      Changes done for ie retirement project to make it

*********************************************************************************

<html>
    <head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF9C94SB-O</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-BASE" id="MIR-POL-ID-BASE" stype="Text" maxlength="9" onfocus="enterField(this)" size="20" tabindex="1" />
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-POL-ID-SFX">枝番:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-POL-ID-SFX" id="MIR-POL-ID-SFX" stype="Text" maxlength="1" onfocus="enterField(this)" size="20" tabindex="2" />
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PBRQ-EFF-DT">処理日:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PBRQ-EFF-DT" id="MIR-PBRQ-EFF-DT" stype="Date"  onfocus="enterField(this)" onblur="validateField(this)" />
                    </td>
                    <td class="celldisplaykeylabel">
<!-- following line commented and new line added below for Q09004
                        <label for="MIR-FTRQ-PREV-UPDT-DT">Process Date:</label>
 -->
                        <label for="MIR-FTRQ-PREV-UPDT-DT">処理日:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-FTRQ-PREV-UPDT-DT" stype="Date" displayonly="yes">MIR-FTRQ-PREV-UPDT-DT</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay" genrows="0">
                <tr>
                    <td class="celldisplayheading">
                        <label for="SELECT-T[1]" />
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-POL-ID-BASE-T[1]">証券番号</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PAYE-SUR-NM-T[1]">姓 (仮名)</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PBRQ-EFF-DT-T[1]">アクティビティ有効日</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PMT-RQST-AMT-T[1]">請求支払金額</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-PMT-RQST-TYP-CD-T[1]">請求支払タイプ</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BNK-NM-T[1]">銀行名</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BNK-BR-NM-T[1]">支店名</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BNK-ACCT-TYP-CD-T[1]">口座種目</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BNK-ACCT-ID-T[1]">口座番号</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-BNK-ACCT-HLDR-NM-T[1]">口座名義人名</label>
                    </td>
                    <td class="celldisplayheading">
                        <label for="MIR-POL-FUT-ACTV-STAT-CD-T[1]">ステータス</label>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplay">
                        <input stype="Indicator" type="checkbox" name="SELECT-T[]" id="SELECT-T[]" value=" " index="1" onclick="onListCheckBox()" />
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-ID-BASE-T[]" stype="Date" displayonly="yes">MIR-POL-ID-BASE-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PAYE-SUR-NM-T[]" stype="Text" displayonly="yes">MIR-PAYE-SUR-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PBRQ-EFF-DT-T[]" stype="Text" displayonly="yes">MIR-PBRQ-EFF-DT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PMT-RQST-AMT-T[]" stype="Currency" displayonly="yes">MIR-PMT-RQST-AMT-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PMT-RQST-TYP-CD-T[]" stype="Text" displayonly="yes">MIR-PMT-RQST-TYP-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BNK-NM-T[]" stype="Text" displayonly="yes">MIR-BNK-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BNK-BR-NM-T[]" stype="Text" displayonly="yes">MIR-BNK-BR-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BNK-ACCT-TYP-CD-T[]" stype="Text" displayonly="yes">MIR-BNK-ACCT-TYP-CD-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BNK-ACCT-ID-T[]" stype="Text" displayonly="yes">MIR-BNK-ACCT-ID-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-BNK-ACCT-HLDR-NM-T[]" stype="Text" displayonly="yes">MIR-BNK-ACCT-HLDR-NM-T[]</span>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-FUT-ACTV-STAT-CD-T[]" stype="Text" displayonly="yes">MIR-POL-FUT-ACTV-STAT-CD-T[]</span>
                    </td>
                </tr>
            </table>
        </form>
    </body>
    <script src="../js/ActionHandlers.js"></script>
    <script src="../js/MessageFunctions.js"></script>
    <script src="../js/MessagesJapanese.js"></script>
    <script src="../js/ClientLevelEdits.js"></script>
    <script src="../js/GlobalUserMethods.js"></script>
</html>
