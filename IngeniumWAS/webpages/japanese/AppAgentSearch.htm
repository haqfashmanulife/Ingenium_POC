                <tr>

                        <input type="radio" name="MIR-DV-SRCH-GR-CD" value="KJ"  onfocus="saveValue(); enterField(this)" />
                    </td>
                    <td class="celldatakey" ><b>漢字表記クライアント名を検索する</b></td>
                </tr>
                <tr>
                    <td class="celldatakey" width="4%">
