<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <title>BF0252-O</title>
        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws" onload="onLoad();">
        <form action="pageserver" method="post" id="inputForm" target="_parent" onsubmit="return(onSubmit());">
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-SFX">枝番:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-POL-ID-SFX" stype="Text" displayonly="yes">MIR-POL-ID-SFX</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="4">契約情報</td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-POL-ISS-EFF-DT">契約日:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-ISS-EFF-DT" stype="Date" displayonly="yes">MIR-POL-ISS-EFF-DT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-POL-DB-OPT-CD">死亡給付オプション:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-DB-OPT-CD" stype="Text" displayonly="yes">MIR-POL-DB-OPT-CD</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-DV-LMPSM-AMT">追加一時金:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-DV-LMPSM-AMT" stype="Currency" elength="13" displayonly="yes">MIR-DV-LMPSM-AMT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-POL-BILL-MODE-CD">保険料モード:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-POL-BILL-MODE-CD" stype="Text" displayonly="yes">MIR-POL-BILL-MODE-CD</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="4">保険料モード</td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-INIT-DPOS-INT-PCT">契約当初積立金利率:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-INIT-DPOS-INT-PCT" stype="Percent" elength="7" decimals="4" displayonly="yes">MIR-INIT-DPOS-INT-PCT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-CVG-GUAR-INT-PCT">利息保証期間       - 利率:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-CVG-GUAR-INT-PCT" stype="Percent" elength="7" decimals="4" signed="yes" displayonly="yes">MIR-CVG-GUAR-INT-PCT</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledisplay">
                <tr>
                    <td class="celldisplayheading" colspan="4">保険料</td>
                </tr>
                <tr>
                    <td class="celldisplaylabel">
                        <label for="MIR-PLAN-PERI-PREM-AMT">プラン保険料:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-PLAN-PERI-PREM-AMT" stype="Currency" elength="13" displayonly="yes">MIR-PLAN-PERI-PREM-AMT</span>
                    </td>
                    <td class="celldisplaylabel">
                        <label for="MIR-UL-INIT-PREM-AMT">予定当初保険料:</label>
                    </td>
                    <td class="celldisplay">
                        <span id="MIR-UL-INIT-PREM-AMT" stype="Currency" elength="13" displayonly="yes">MIR-UL-INIT-PREM-AMT</span>
                    </td>
                </tr>
            </table>
        </form>
    </body>
