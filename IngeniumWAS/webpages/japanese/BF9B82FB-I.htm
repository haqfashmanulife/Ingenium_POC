        <link rel="stylesheet" type="text/css" href="../japanese/Ingenium.css" charset="UTF-8" />
    </head>
    <body class="bodyws">

            <input type="hidden" name="MIR-DV-PRCES-STATE-CD" id="MIR-DV-PRCES-STATE-CD" stype="Hidden" />
            <input type="hidden" name="index" id="index" stype="Hidden" />
            <input type="hidden" name="action" id="action" stype="Hidden" />
            <table class="tabledisplaykey">
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-POL-ID-BASE">証券番号:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-POL-ID-BASE" stype="Text" displayonly="yes">MIR-POL-ID-BASE</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-EFF-DT">処理日:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-EFF-DT" stype="Date" displayonly="yes">MIR-EFF-DT</span>
                    </td>
                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-CO-RECV-DT">会社受付日:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-CO-RECV-DT" stype="Date" displayonly="yes">MIR-CO-RECV-DT</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-JRNL-DT">日報計上日:</label>
                    </td>
                    <td class="celldisplaykey" colspan="3">
                        <span id="MIR-JRNL-DT" stype="Text" displayonly="yes">MIR-JRNL-DT</span>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldataentryheading" colspan="4">漢字表記</td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-CLI-LAST-NM">姓:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-CLI-LAST-NM"  id="MIR-PAYE-CLI-LAST-NM" stype="Text" maxlength="25"   onfocus="enterField(this)"/>
                    </td>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-CLI-FRST-NM">名:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-CLI-FRST-NM" id="MIR-PAYE-CLI-FRST-NM" stype="Text" maxlength="25"   onfocus="enterField(this)"/>

                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-PAYE-CO-NM">会社名:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-PAYE-CO-NM" id="MIR-PAYE-CO-NM" stype="Text" maxlength="50"   onfocus="enterField(this)"/>
                    </td>
                </tr>
            </table>
            <br />
            <table class="tabledatakey">
                <tr>
                    <td class="celldataentryheading" colspan="4">住所</td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-ADDR-LOC-CD">住所コード:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-CLI-ADDR-LOC-CD" id="MIR-CLI-ADDR-LOC-CD" stype="Text" maxlength="8"   onfocus="enterField(this)"/>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-CLI-PSTL-CD">郵便番号:</label>

                        <span id="MIR-CLI-PSTL-CD" stype="Text" displayonly="yes">MIR-CLI-PSTL-CD</span>

                        <label for="MIR-CLI-ADDR-ADDL-TXT">住所カナ部:</label>

                    <td class="celldisplaykey">
                        <span id="MIR-BNK-NM" stype="Text" displayonly="yes">MIR-BNK-NM</span>

                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-BR-ID">支店番号:</label>

                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-BR-ID" id="MIR-BNK-BR-ID" stype="Text" maxlength="3"   onfocus="enterField(this)"/>

                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-BR-NM">支店名:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-BNK-BR-NM" stype="Text" displayonly="yes">MIR-BNK-BR-NM</span>

                        <select name="MIR-BNK-ACCT-TYP-CD" id="MIR-BNK-ACCT-TYP-CD" stype="Selection" maxlength="3"   onfocus="enterField(this)"></select>
                    </td>
                </tr>
                <tr>
                    <td class="celldatakeylabel">
                        <label for="MIR-BNK-ACCT-ID">口座番号:</label>
                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-ACCT-ID"  id="MIR-BNK-ACCT-ID" stype="Text" maxlength="7"   onfocus="enterField(this)"/>

                    </td>
                    <td class="celldatakey">
                        <input type="text" value=" " name="MIR-BNK-ACCT-HLDR-NM" id="MIR-BNK-ACCT-HLDR-NM" stype="Text" maxlength="50"
                               onkeypress="KanaKeyCheck()"
                               onchange="onlyKatakana()"
                               onfocus="enterField(this)" />
                    </td>
                </tr>
            </table>
