<html>

                <tr>

                        <label for="MIR-MSG-REF-ID">ソースナンバー:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-REF-ID" stype="Text" displayonly="yes">MIR-MSG-REF-ID</span>
                    </td>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-REF-NUM">メッセージ番号:</label>
                    </td>
                    <td class="celldisplaykey">
                        <span id="MIR-MSG-REF-NUM" stype="Text" displayonly="yes">MIR-MSG-REF-NUM</span>

                </tr>
                <tr>
                    <td class="celldisplaykeylabel">
                        <label for="MIR-MSG-LANG-CD">言語:</label>

                        <span id="MIR-MSG-LANG-CD" stype="Text" displayonly="yes">MIR-MSG-LANG-CD</span>

                    <td class="celllabeldataentry">
                        <select name="MIR-MSG-SEVRTY-CD" id="MIR-MSG-SEVRTY-CD" size="1" stype="Selection" onfocus="enterField(this)" mandatory="yes"></select>

                    <td class="celllabelleftalign">
