                    <td class="celldatakeylabel">
                        <label for="MIR-RAT-STD-SEX-CD">性別:</label>

                        <input type="text" value=" " name="MIR-RAT-STD-WGT-QTY" id="MIR-RAT-STD-WGT-QTY" stype="Text" maxlength="3" onfocus="enterField(this)" size="20" tabindex="4" />

                        <span id="MIR-RAT-STD-SEX-CD-T[]" stype="Text" displayonly="yes">MIR-RAT-STD-SEX-CD-T[]</span>

                        <span id="MIR-DV-RAT-STD-FT-HT-T[]" stype="Text" displayonly="yes">MIR-DV-RAT-STD-FT-HT-T[]</span>

                    <td class="celldisplay">
                        <span id="MIR-DV-RAT-STD-KG-WGT-T[]" stype="Text" displayonly="yes">MIR-DV-RAT-STD-KG-WGT-T[]</span>

                    </td>
                    <td class="celldisplay">

                        <span id="MIR-RECMND-RAT-QTY-T[]" stype="Text" displayonly="yes">MIR-RECMND-RAT-QTY-T[]</span>
