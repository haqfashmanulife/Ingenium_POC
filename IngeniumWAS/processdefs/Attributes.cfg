# This file contains the master list of all allowable attributes used in the
# PathFinder.  If an attribute is used on a Process, P-Step, S-Step or STEP
# statement and it doesn't appear in the ATTRIBUTES block, then a message
# will be written to the log file telling you that the attribute definition
# couldn't be found.  Attribute names are case sensitive.
#
# Many attributes only apply to an S-Step but will be defined on a P-Step field
# as well.  This allows UIGEN to generate S-Steps from P-Steps and
# have the attributes added to the generated S-Step fields.  In this case,
# the P-Step acts as a data dictionary.  Having the attribute on the P-Step
# variable will not cause the P-Step to behave any differently since only
# P-Step attributes with the "Runtime" flag are loaded at runtime.
#
# If a field is marked as applying to an S-Step, do not remove it from
# a P-Step since the S-Step will be incomplete when generated by UIGEN.
#
# Attributes marked with the "Client" flag are loaded at runtime as well, but
# the attribute is not used by the PathFinder.  The Attribute will be sent
# to the client application and may be used by it.
#
# Attributes marked with the "Custom" flag are attributes introduced by extensions to
# the PathFinder architecture, for example, with a customized p-step handler, there might be
# attributes introduced and those should have "Custom" flag - this will ensure that those
# attributes will be available for users who use Enterprise Designer to edit flows, steps.
#
# Attributes marked with the "Xml" flag are attributes that will be added to the resulting XML 
# document instance when PathFinder UIStep XML interface is used.  These attributes will also
# be added to the generated WSDL/XSD files for PStep/Headless flow when exposing P-Step/Headless flow
# as web services.  The XSD file will be used to validate service requests and (or) service responses 
# when validation is turned on in P-Step / Headless flow web service endpoints.
#
# When adding "Xml" flag to an attribute, ensure "Runtime" flag is added as well so the attribute
# will be loaded in runtime, also ensure the attribute being added "Xml" flag is properly described 
# in the UIStepSchema.xsd file located in %PathFinderHome%\data\xml\xsd.
#
# Attributes marked with the "Wsdl" flag are attributes that will be used to build flow properties
# inspector in Enterprise Designer. As a general rule, attributes that has "Xml" flag should also 
# has "Wsdl" flag. Attribute "Length", "Mandatory" should always have "Wsdl" flag.

ATTRIBUTES
{
	###############################################################################################
	#
	#	Attribute: Action	
	#
	#	Enterprise Designer Label:    Action
	#	                    Location: Step Editor - Field Properties Inspector
	#
	###############################################################################################
	# When used on an S-Step variable with the attribute "Link", then the value of
	# this attribute is a string that will be placed in the "action" field on the
	# web page.  When the page is submitted back to the server, the process flow
	# can check the value of the "action" variable to determine what should be done
	# next.
	#
	# Applies to:
	#	S-Step variables
	#		Used by UIGEN when generating HTML.
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#
	# OUT ReplacementCompanySearchLink
	# {
	#	Label = "Search for Replacement Company";
	#	Link;
	#	Action = "ACTION_SEARCH";
	# }

	Action
	{
		STypes = "Currency,Date,Day,Digit,Indicator,Month,Number,Percent,Selection,Text,TextArea,Time,Year,YesNo,YesNoUnanswered";
		DisplayType="Text";
		ToolTipResource="IDS_ActionToolTip";
		AttributeOrder="14";
	}

	###############################################################################################
	#
	#	Attribute: BusinessFunctionId
	#
	#	Enterprise Designer Label:    Business Function ID
	#	                    Location: Step Editor - P-Step Properties Inspector
	#
	###############################################################################################
	# Identifies the business function ID of the P-Step.  The business function ID
	# is used to tell the INGENIUM server which function is being executed when
	# the P-Step is invoked.
	#
	# Applies to:
	#	P-Step
	# 		This attribute is used by the PathFinder when invoking a P-Step.  If the
	# 		attribute doesn't exist on the P-Step definition, you will get an error.
	#
	# Example:
	#
	#	P-STEP BF0110-P
	#	{
	#		ATTRIBUTES
	#		{
	#			BusinessFunctionId = "0110";
	#			BusinessFunctionName = "Fund Unit Value Retrieve";
	#			BusinessFunctionType = "Retrieve";
	#			MirName = "SCWM0110";
	#		}
	#	...
	#	}

	BusinessFunctionId
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: BusinessFunctionName
	#
	#	Not used in Enterprise Designer
	#
	###############################################################################################
	# The value of this attribute is a description of the function performed by the
	# P-Step.  This attribute is not used by the system.  It is for documentation
	# purposes only.
	#
	# Applies to:
	#	P-Step
	#
	# Example:
	#	See BusinessFunctionId
	

	BusinessFunctionName
	{
	}

	###############################################################################################
	#
	#	Attribute: BusinessFunctionType
	#
	#	Enterprise Designer Label:    Business Function Type
	#	                    Location: Step Editor - Step Properties Inspector
	#
	###############################################################################################
	# This attribute is used by UIGEN when generating HTML pages from an S-Step.
	# UIGEN can customize the generated HTML based upon the type of business
	# function.  For example, if this is a list type, then UIGEN knows that it
	# should add the selection check box to any HTML tables that it creates.
	#
	# Applies to:
	#	S-Step
	#		Used by UIGEN when generating HTML
	#	P-Step
	#		Used by UIGEN when generating S-Steps
	#
	# Example:
	#	See BusinessFunctionId
	

	BusinessFunctionType
	{
	}

	################################################################################################
	#
	#	Attribute: CodeRefresh	
	#
	#	Enterprise Designer Label:    Refresh Values
	#	                    Location: Step Editor - Field Properties Inspector - Data Source Refresh
	#
	################################################################################################
	# This attribute is used to clear cached CodeServer items.  The PageServer
	# gets passed this attribute when the data for an S-Step is sent back to it from
	# the PathFinder.  The attributes are passed to the CodeServer when the PageServer
	# requests the data required to complete the HTML template.  If the CodeServer
	# sees that the CodeRefresh attribute is being passed to it, it clears the cached
	# entry for the requested item and reloads it from its data source.
	#
	# Applies to:
	#	S-Step variables
	#
	# Example:
	#
	#	IN MIR-ETBL-TYP-ID
	#	{
	#		DisplayOnly;
	#		Length = "5";
	#		CodeSource = "XTAB";
	#		CodeType = "BPFID";
	#		CodeRefresh;
	#		SType = "Text";
	#		Label = "Security Edit Table Name";
	#	}


	CodeRefresh
	{
		Client;
	}

	################################################################################################
	#
	#	Attribute: CodeSource
	#
	#	Enterprise Designer Label:    Code Source
	#	                    Location: Step Editor - Field Properties Inspector - Data Source Control
	#
	################################################################################################
	# The value of this attribute tells the CodeServer where to find the value
	# for a translated field or selection box.  The value must match the name
	# of a datasource in the CODESERVER.INI file.  The PageServer will send
	# this attribute to the CodeServer when it requests data to populate an
	# HTML template.
	#
	# Applies to:
	#	S-Step variables
	#
	# Example:
	#	INOUT MIR-CLI-SEX-CD
	#	{
	#		Length = "40";
	#		CodeSource = "DataModel";
	#		CodeType = "CLI-SEX-CD";
	#		CodeSubType = "INDV";
	#		SType = "Selection";
	#		Label = "Sex";
	#	}

	CodeSource
	{
		Client;
	}

	################################################################################################
	#
	#	Attribute: CodeSubType
	#
	#	Enterprise Designer Label:    Code Subtype
	#	                    Location: Step Editor - Field Properties Inspector - Data Source Control
	#
	################################################################################################
	# This attribute is used to specify the CodeServer code type.  The value for
	# this attribute must match one of the query types valid for the corresponding
	# CodeSource.  The PageServer will send this attribute to the CodeServer when
	# it requests data to populate an HTML template.
	#
	# Applies to:
	#	S-Step variables
	#
	# Example:
	#	See CodeRefresh

	CodeSubType
	{
		Client;
	}

	################################################################################################
	#
	#	Attribute: CodeType
	#
	#	Enterprise Designer Label:    Code Type
	#	                    Location: Step Editor - Field Properties Inspector - Data Source Control
	#
	################################################################################################
	# This attribute is used to specify the CodeServer code type.  The value for
	# this attribute must match one of the query types valid for the corresponding
	# CodeSource.  The PageServer will send this attribute to the CodeServer when
	# it requests data to populate an HTML template.
	#
	# Applies to:
	#	S-Step variables
	#
	# Example:
	#	See CodeRefresh

	CodeType
	{
		Client;
	}

	###############################################################################################
	#
	#	Attribute: Cols
	#
	#	Enterprise Designer Label:    Cols
	#	                    Location: Step Editor - Field Properties Inspector - HTML Attributes
	#
	###############################################################################################
	# This attribute indicates the width of a TextArea control by specifying the number
	# of columns that the html control should have. 
	#
	# Applies to:
	#	textArea control
	#
	# Example:
	#	Cols = "25"
	#
	Cols
	{
		Runtime;
		STypes = "TextArea";
		DisplayType="Numeric";
		DisplayName="Columns";
		ToolTipResource="IDS_ColumnsToolTip";
		AttributeOrder="7";
	}

	###############################################################################################
	#
	#	Attribute: Constant
	#
	#	Not used in Enterprise Designer
	#
	###############################################################################################
	# This attribute marks a session variable as being constant. The value of a constant
	# session variable cannot be changed in flows.
	#
	# Applies to:
	#	Session variables
	# Example:
	#	INOUT MIR-DV-ISO-DT-FRMT-IND
	#	{
	#		Constant;
	#	}
	# 	
	Constant
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: CurrencyCode
	#
	#	Enterprise Designer Label:    Currency Code
	#	                    Location: Step Editor - Field Properties Inspector - HTML Attributes
	#
	###############################################################################################
	# The CurrencyCode defines the way to display a customized currency format when the
	# user wants a format other than the default currency format.
	# Applies to:
	#	S-Step variables
	#		Used by PageServer when retrieving customized currency 
	#		formatting parameters.
	#	P-Step variables
	#		Used by UIGEN when generating S-Step from P-Step.
	# Example:
	#	SType = "Currency";
	#	CurrencyCode = "MIR-FUND-AMT-CRCY-CD";

	CurrencyCode
	{
		Client;
		STypes = "Currency";
		DisplayType="Combo";
		PopulateClass="com.solcorp.ide.pathfinder.edge.step.common.ui.inspector.StepVariableDataProvider";
		DisplayName="Currency Code";
		ToolTipResource="IDS_CurrencyCodeToolTip";
		AttributeOrder="3";
	}

	###############################################################################################
	#
	#	Attribute: DBTableName
	#
	#	Enterprise Designer Label:    Data Base Table Name
	#	                    Location: Step Editor - P-Step Field Properties Inspector - Basic Properties
	#
	###############################################################################################
	# For documentation purposes only.  Identifies the server database table that contains
	# this field.  A table name of "Derived" indicates a calculated field.
	#
	# Applies to:
	#	S-Step variables
	#	P-Step variables
	#
	# Example:
	#	DBTableName = "TBPFL";

	DBTableName
	{
		Client;
	}

	###############################################################################################
	#
	#	Attribute: Decimals
	#
	#	Enterprise Designer Label:    Decimals
	#	                    Location: Step Editor - Properties Inspector - HTML Attributes
	#
	###############################################################################################
	# Number of decimal places to display and enter.  UIGEN uses this attribute to add a
	# Decimals attribute to HTML fields or to the currency tag in a JSP page.  JavaScript at the 
	# client uses the value of this attribute to format numeric fields.
	#
	# Applies to:
	#	S-Step variables
	#		Used by UIGEN when generating HTML or JSP tags.
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	Decimals = "2";

	Decimals
	{
		STypes = "Currency,Number,Percent";
		DisplayType="Numeric";
		ToolTipResource="IDS_DecimalsToolTip";
		AttributeOrder="5";
	}

	###############################################################################################
	#
	#	Attribute: DefaultConstant
	#
	#	Enterprise Designer Label:    Default Constant
	#	                    Location: Step Editor - Properties Inspector - Field Value Runtime Properties
	#
	###############################################################################################
	# If a variable has the DefaultConstant attribute, then the PathFinder will set the field to the
	# value of the attribute if it is empty.  If the field already has a value, the value isn't changed.
	# The default value is only applied when the variable is being sent to a client application from
	# the PathFinder (i.e. executing an S-Step).  It is not applied when executing a P-Step.
	#
	# Applies to:
	#	S-Step variables
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	DefaultConstant = "100";

	DefaultConstant
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: DefaultSession
	#
	#	Enterprise Designer Label:    Default Session
	#	                    Location: Step Editor - Properties Inspector - Field Value Runtime Properties
	#
	###############################################################################################
	# This attribute causes the variable's value to be saved in or set from a session variable.
	# The file SESSION.CFG contains a list of all of the session variables.  If a session variable is
	# not marked as CONST in SESSION.CFG, its value will be updated whenever it's sent back from the browser.
	# If a step variable is marked DefaultSession, then it will be set to the session variable value if the
	# step variable is blank or empty.
	#
	# The default value is only applied when the step variable is being sent to a client application from
	# the PathFinder (i.e. executing an S-Step).  It is not applied when executing a P-Step.
	#
	# Applies to:
	#	S-Step variables
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	DefaultSession = "MIR-CLI-ID";

	DefaultSession
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: DelEmptyRows
	#
	#	Enterprise Designer Label:    Suppress Empty Rows
	#	                    Location: Step Editor - S-Step Properties Inspector - UIGEN Properties
	#
	###############################################################################################
 	# The DelEmptyRows attribute tells UIGEN if tables should have their empty rows removed or if the table should
	# be rendered with empty rows.  UIGEN uses this attribute when generating HTML tables from an S-Step.
	# If DelEmptyRows exists on an S-Step, then UIGEN will add a "genrows" attribute to the display table
	# with a value of 0.  Otherwise, "genrows" will have a value of the number of rows in the table so
	# that every row in the table is displayed, with or without data.  PageServer looks for the "genrows"
	# attribute when parsing the HTML template to determine how many table rows to generate.
	#
	# Applies to:
	#	S-Step
	#
	# Example:
	#	S-STEP BF0115-O
	#	{
	#  		ATTRIBUTES
	#		{
	#			DelEmptyRows;
 	#	...
	#		}
	#	}

	DelEmptyRows
	{
	}

	###############################################################################################
	#
	#	Attribute: Description
	#
	#	Not used in Enterprise Designer
	#
	###############################################################################################
 	# The Description attribute is no longer used but may appear on P-Steps.
	#
	# Applies to:
	#	P-Step

	Description
	{
	}

	###############################################################################################
	#
	#	Attribute: DisplayOnly
	#
	#	Enterprise Designer Label:    Display Only
	#	                    Location: Step Editor - Field Properties Inspector - HTML Attributes
	#
	###############################################################################################
 	# The DisplayOnly attribute is used by UIGEN when it generates HTML pages for an S-Step.  A variable
	# with the DisplayOnly will become plain text in HTML.  An HTML control is not created, rather the
	# text is placed inside an HTML span element.  The data cannot be edited.
	#
	# Applies to:
	#	S-Step variables
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	IN MIR-CLI-ID
	#	{
	#		DisplayOnly;
	#	}

	DisplayOnly
	{
		STypes = "Currency,Date,Day,Digit,Indicator,Month,Number,Percent,Selection,Text,TextArea,Time,Year,YesNo,YesNoUnanswered";
		DisplayType="YesNo";
		DisplayName="Display Only";
		ToolTipResource="IDS_DisplayOnlyToolTip";
		AttributeOrder="9";
	}

	###############################################################################################
	#
	#	Attribute: DynamicUpdate
	#
	#	Enterprise Designer Label:    Dynamic Update
	#	                    Location: Step Editor - Field Properties Inspector - HTML Attributes
	#
	###############################################################################################
	# This attribute defines a field on an S-Step whose value can be updated by changing the 
	# value of another field.  For example, if you add this field to a list of provinces and 
	# states, a change in the value of another field can be used to force this field to update
	# its list of allowed values.  This attribute can only be applied to selection boxes.
	#
	# Applies to:
	#	S-Step variables
	#		Used by UIGen as an indicator that the CodeServer related attributes like CodeSource,
	#		CodeType, CodeSubType and FieldFieldsX, need to be added to the HTML input element.  
	#		These attributes provide data required by JavaScript running in the browser to make a 
	#		call to the AjaxServer to dynamically retrieve an updated list of allowed values. 
	#	P-Step variables
	#		Used by UIGEN when generating S-Step from P-Step.
	# Example:
	#	INOUT MIR-CLI-CRNT-LOC-CD
	#	{
	#		SType = "Selection";
	#		CodeSource = "CTLC";
	#		CodeType = "CLOC";
	#		FilterFields = "1";
	#		FilterField1 = "MIR-CLI-CTRY-CD";
	#		DynamicUpdate;
	#	}
	
	DynamicUpdate
	{
		STypes = "Selection";
		DisplayType="YesNo";
		DisplayName="Dynamic Update";
		ToolTipResource="IDS_DynamicUpdateToolTip";
		AttributeOrder="15";
	}
	
	###############################################################################################
	#
	#	Attribute: DynamicUpdateTarget
	#
	#	Enterprise Designer Label:    Dynamic Update Target
	#	                    Location: Step Editor - Field Properties Inspector - HTML Attributes
	#
	###############################################################################################
	# When you add this attribute to a field on an S-Step you are indicating that the field
	# whose name is the value of the attribute should have its value dynamically updated when the
	# value of this field changes. 
	#
	# Applies to:
	#	S-Step variables
	#		Used by UIGen as an indicator that a call to a javascript function should be added
	#		to the HTML elements onblur() or onchange() attribute.  The value of the attribute
	#		must be another field on the same S-Step that has the DynamicUpdate attribute.
	#	P-Step variables
	#		Used by UIGEN when generating S-Step from P-Step.
	# Example:
	#	INOUT MIR-CLI-CTRY-CD
	#	{
	#		CodeSource = "XTAB";
	#		CodeType = "CNTRY";
	#		Label = "Country";
	#		Length = "40";
	#		SType = "Selection";
	#		DynamicUpdateTarget = "MIR-CLI-CRNT-LOC-CD";
	#	}
		
	DynamicUpdateTarget
	{
		STypes = "Currency,Date,Day,Digit,Indicator,Month,Number,Percent,Selection,Text,TextArea,Time,Year,YesNo,YesNoUnanswered";
		DisplayType="Combo";
		PopulateClass="com.solcorp.ide.pathfinder.edge.step.common.ui.inspector.StepVariableDataProvider";
		DisplayName="Dynamic Update Target";
		ToolTipResource="IDS_DynamicUpdateTargetToolTip";
		AttributeOrder="16";
	}
	
	###############################################################################################
	#
	#	Attribute: EndProcess
	#
	#	Enterprise Designer Label:    End Process
	#	                    Location: Flow Editor - S-Step Properties Inspector
	#
	###############################################################################################
 	# If an SStep statement has the "EndProcess" attribute it means that the data for the
	# SStep will be returned and the flow will be terminated.  No reply is expected
	# back from the client.
	#
	# Applies to:
	#	S-Step statement in a flow
	#
	# Example:
	#	STEP Foo 
	#	{
	#		USES S-STEP "Bar";
	# 	    ATTRIBUTES
	#		{
	#			EndProcess;
	#		}
	#	}

	EndProcess
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: Epilog
	#	Attribute: Prolog
	#
	#	Enterprise Designer Label:    Epilog
	#	Enterprise Designer Label:    Prolog
	#	                    Location: Flow Editor - Flow Properties Inspector
	#
	###############################################################################################
	# The Epilog and Prolog attributes are used on a process flow and allow you to
	# specify a specific flow that overrides the values specified in the configuration 
	# file.
	#
	# Applies to:
	#	ProcessDef
	#		Used by PathFinder at runtime.
	#
	# Example:
	#	Epilog = "PrcoessEpilogHeadless";
	#	Prolog = "ProcessPrologHeadless";

	Epilog
	{
		Runtime;
	}

	Prolog
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: Explicit
	#
	#	Enterprise Designer Label:    Step is Explicit
	#	                    Location: Flow Editor - P-Step, S-Step, Process Step Properties Inspectors
	#
	###############################################################################################
	# The Explicit attribute is used on a Step statement within a Process flow.  This attribute tells the
	# PathFinder that variable values should not be automatically transferred to the object being used.
	# For example, if the Process flow has a variable called MIR-CLI-ID and the Step statement uses a P-Step
	# that defines an IN MIR-CLI-ID then by default, the value of the MIR-CLI-ID variable will be moved
	# from the Process flow to the system used by the P-Step.  When the Explicit attribute is used on the
	# Step statement then the data is not automatically passed but the transfer must be explicitly stated.
	#
	# Applies to:
	#	Step statement
	#
	# Example:
	#	PROCESS BF0294List
	#	{
	#		STEP SelectItem
	#		{
	#			USES PROCESS "BF0290Retrieve";
	#			ATTRIBUTES
	#			{
	#				Explicit;
	#			}
	#			MIR-TTAB-ADMIN-APPL-ID -> MIR-TTAB-ADMIN-APPL-ID;
	#			MIR-ETBL-TYP-ID -> MIR-ETBL-TYP-ID;
	#	...
	#		}
	#	}

	Explicit
	{
		Runtime;
	}

	###############################################################################################
	#
	#	Attribute: FieldGroup
	#
	#	Enterprise Designer: Automatically maintained by the Step Editor - Table Properties Inspector    
	#
	###############################################################################################
	# The FieldGroup attribute is used to associate step variables so that UIGEN can group them together
	# in an HTML table when it generates the HTML for an S-Step.
	#
	# Applies to:
	#	S-Step variables
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	FieldGroup = "Table13";

	FieldGroup
	{
	}

	###############################################################################################
	#
	#	Attribute: FieldLayout
	#
	#	Enterprise Designer Label:    FieldLayout
	#	                    Location: Step Editor - Group Variable Properties Inspector
	#
	###############################################################################################
	# The FieldLayout attribute is used by UIGEN to determine the orientation of fields and labels in
	# GroupTables.  If FieldLayout is set to Vertical (default), the labels appear beside each field,
	# with a label being produced for each field in each table row.
	# If FieldLayout is set to Horizontal, the labels appear above the fields, with only one set of
	# labels being generated for each table.
	# Valid values are Vertical or Horizontal.  If this attribute isn't defined, or has an invalid value
	# Vertical will be used as the default value.
	#
	# Applies to:
	#	S-Step variables
	#		Used by UIGEN when generating HTML.
	#	P-Step variables
	#		Used by UIGEN when generating S-Step variables.
	#
	# Example:
	#	FieldLayout = "Vertical";

	FieldLayout
	{
